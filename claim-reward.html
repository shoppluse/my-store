<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopPlus - Claim Reward</title>

  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f7f7f8;
      --bg-2: #efeff2;
      --card-bg: #ffffff;
      --text: #111111;
      --muted: #777777;
      --muted-2: #9b9b9b;
      --primary: #111111;
      --primary-2: #2d2d2d;
      --border: #e9e9ec;
      --soft-border: #f0f0f2;
      --shadow: rgba(0, 0, 0, 0.06);
      --shadow-2: rgba(0, 0, 0, 0.09);
      --success: #15803d;
      --danger: #b91c1c;
      --success-bg: #f0fdf4;
      --success-border: #bbf7d0;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --note-bg: #f8fafc;
      --note-border: #e2e8f0;
    }

    [data-theme="dark"] {
      --bg: #0f1115;
      --bg-2: #171a20;
      --card-bg: #161a22;
      --text: #f8fafc;
      --muted: #a1a1aa;
      --muted-2: #8b95a7;
      --primary: #ffffff;
      --primary-2: #d1d5db;
      --border: #232833;
      --soft-border: #1d2330;
      --shadow: rgba(0, 0, 0, 0.25);
      --shadow-2: rgba(0, 0, 0, 0.32);
      --success: #4ade80;
      --danger: #f87171;
      --success-bg: rgba(22, 163, 74, 0.12);
      --success-border: rgba(74, 222, 128, 0.22);
      --danger-bg: rgba(239, 68, 68, 0.12);
      --danger-border: rgba(248, 113, 113, 0.22);
      --note-bg: rgba(255,255,255,0.03);
      --note-border: rgba(255,255,255,0.06);
    }

    * { 
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 24%, var(--bg) 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    /* UPDATED PREMIUM HEADER THEME */
    .main-header {
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(10px + env(safe-area-inset-top)) 10px 8px;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-shell {
      width: 100%;
      max-width: 700px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 24px;
      padding: 10px;
      box-shadow: 0 8px 24px var(--shadow);
    }

    [data-theme="dark"] .header-shell {
      background: rgba(22,26,34,0.88);
      border-color: rgba(255,255,255,0.04);
    }

    .shopplus-logo {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      background: var(--card-bg);
      padding: 12px 18px;
      border-radius: 18px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      border: 1px solid var(--border);
      box-shadow: 0 6px 16px var(--shadow);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .shopplus-logo .plus {
      color: var(--primary-2);
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1;
    }

    .header-actions {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      align-items: stretch;
    }

    .header-btn,
    .dark-mode-toggle {
      width: 100%;
      min-height: 52px;
      text-decoration: none;
      background: var(--card-bg);
      color: var(--text);
      font-weight: 700;
      font-size: 0.86rem;
      padding: 10px 8px;
      border-radius: 16px;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: inherit;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 4px 14px var(--shadow);
    }

    .header-btn:hover,
    .dark-mode-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px var(--shadow-2);
    }

    .dark-mode-toggle {
      font-size: 1.2rem;
      background: var(--card-bg);
    }

    .page-wrap {
      max-width: 760px;
      margin: 14px auto;
      padding: 0 10px 24px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 14px 34px var(--shadow);
      border: 1px solid var(--border);
    }

    .title {
      font-size: clamp(1.35rem, 4vw, 1.9rem);
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 8px;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 20px;
      line-height: 1.7;
      font-size: 0.93rem;
    }

    .field {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .input,
    .textarea {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
      font-size: 14px;
      font-family: inherit;
      background: rgba(17, 17, 17, 0.025);
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .textarea {
      min-height: 110px;
      resize: vertical;
    }

    .input:focus,
    .textarea:focus {
      border-color: var(--primary-2);
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
    }

    [data-theme="dark"] .input,
    [data-theme="dark"] .textarea {
      background: rgba(255,255,255,0.025);
      color: #f8fafc;
    }

    [data-theme="dark"] .input:focus,
    [data-theme="dark"] .textarea:focus {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .btn {
      width: 100%;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(120deg, #111111, #2d2d2d);
      color: #fff;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
      transition: 0.25s ease;
      margin-top: 8px;
    }

    [data-theme="dark"] .btn {
      background: linear-gradient(120deg, #ffffff, #e5e7eb);
      color: #111111;
      box-shadow: 0 12px 24px rgba(255, 255, 255, 0.08);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.9rem;
      display: none;
      line-height: 1.6;
      white-space: pre-line;
      font-weight: 600;
    }

    .message.success {
      display: block;
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid var(--success-border);
    }

    .message.error {
      display: block;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-border);
    }

    .note-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: var(--note-bg);
      border: 1px solid var(--note-border);
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      body {
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .main-header {
        padding: calc(10px + env(safe-area-inset-top)) 10px 8px;
        gap: 8px;
      }

      .header-shell {
        border-radius: 20px;
        padding: 8px;
      }

      .shopplus-logo {
        font-size: 1.25rem;
        padding: 10px 14px;
        border-radius: 16px;
        margin-bottom: 8px;
      }

      .shopplus-logo .plus {
        font-size: 1.5rem;
      }

      .header-actions {
        gap: 8px;
      }

      .header-btn,
      .dark-mode-toggle {
        min-height: 48px;
        font-size: 0.8rem;
        padding: 10px 6px;
        border-radius: 14px;
      }

      .dark-mode-toggle {
        font-size: 1.05rem;
      }

      .page-wrap {
        padding: 0 10px 20px;
        margin: 12px auto;
      }

      .card {
        padding: 16px;
        border-radius: 20px;
      }

      .title {
        font-size: 1.3rem;
      }

      .subtitle {
        font-size: 0.88rem;
      }

      .input,
      .textarea {
        border-radius: 12px;
      }

      .btn {
        min-height: 50px;
        border-radius: 14px;
      }

      .note-box,
      .message {
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="main-header">
    <div class="header-shell">
      <a href="./home.html" class="shopplus-logo">Shop<span class="plus">+</span></a>

      <div class="header-actions">
        <a href="./profile.html" class="header-btn">Profile</a>
        <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </div>

  <div class="page-wrap">
    <div class="card">
      <h1 class="title">Claim ShopPlus Reward</h1>
      <p class="subtitle">
        Submit your purchase details for manual verification.  
        After review, eligible reward amounts can be processed.
      </p>

      <form id="claimForm">
        <div class="grid">
          <div class="field">
            <label class="label">Full Name</label>
            <input class="input" type="text" id="name" readonly />
          </div>

          <div class="field">
            <label class="label">Email</label>
            <input class="input" type="email" id="email" readonly />
          </div>
        </div>

        <div class="grid">
          <div class="field">
            <label class="label">Mobile Number</label>
            <input class="input" type="text" id="mobile" readonly />
          </div>

          <div class="field">
            <label class="label">Product ID</label>
            <input class="input" type="text" id="productId" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Product Name</label>
          <input class="input" type="text" id="productName" required />
        </div>

        <div class="grid">
          <div class="field">
            <label class="label">Amazon Order Reference</label>
            <input class="input" type="text" id="orderReference" placeholder="Example: AMZ-4587" required />
          </div>

          <div class="field">
            <label class="label">Purchase Date</label>
            <input class="input" type="date" id="purchaseDate" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Proof / Note</label>
          <textarea class="textarea" id="proofNote" placeholder="Paste short proof details, screenshot note, or order info"></textarea>
        </div>

        <button class="btn" type="submit" id="submitBtn">Submit Reward Claim</button>
      </form>

      <div id="messageBox" class="message"></div>

      <div class="note-box">
        Tip: Keep your Product ID like <strong>SP1001</strong> and enter the exact order reference for faster manual verification.
      </div>
    </div>
  </div>

  <script>
    const currentUserRaw = localStorage.getItem("shopplusUser");
    if (!currentUserRaw) {
      window.location.href = "./login.html";
    }

    let currentUser = {};
    try {
      currentUser = JSON.parse(currentUserRaw);
    } catch (error) {
      localStorage.removeItem("shopplusUser");
      localStorage.removeItem("shopplusLoggedIn");
      window.location.href = "./login.html";
    }

    const BACKEND_URL = "https://my-store-e28j.onrender.com";
    const htmlEl = document.documentElement;
    const darkToggleBtn = document.getElementById("darkModeToggle");
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
      htmlEl.setAttribute("data-theme", savedTheme);
      darkToggleBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
    }

    darkToggleBtn.addEventListener("click", () => {
      const currentTheme = htmlEl.getAttribute("data-theme");

      if (currentTheme === "dark") {
        htmlEl.setAttribute("data-theme", "light");
        localStorage.setItem("theme", "light");
        darkToggleBtn.textContent = "🌙";
      } else {
        htmlEl.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        darkToggleBtn.textContent = "☀️";
      }
    });

    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const mobileInput = document.getElementById("mobile");
    const productIdInput = document.getElementById("productId");
    const productNameInput = document.getElementById("productName");
    const orderReferenceInput = document.getElementById("orderReference");
    const purchaseDateInput = document.getElementById("purchaseDate");
    const proofNoteInput = document.getElementById("proofNote");
    const claimForm = document.getElementById("claimForm");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(text, type = "success") {
      messageBox.className = "message " + type;
      messageBox.textContent = text;
    }

    nameInput.value = currentUser.name || "";
    emailInput.value = currentUser.email || "";
    mobileInput.value = currentUser.mobile || "";

    const params = new URLSearchParams(window.location.search);
    const productIdFromUrl = params.get("productId");
    const productNameFromUrl = params.get("productName");

    if (productIdFromUrl) productIdInput.value = productIdFromUrl;
    if (productNameFromUrl) productNameInput.value = productNameFromUrl;

    const today = new Date().toISOString().split("T")[0];
    purchaseDateInput.max = today;

    claimForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      showMessage("", "success");
      messageBox.style.display = "none";

      const userId = currentUser.id || currentUser._id;
      if (!userId) {
        showMessage("User ID not found. Please login again.", "error");
        return;
      }

      const payload = {
        userId: userId,
        name: nameInput.value.trim(),
        email: emailInput.value.trim(),
        mobile: mobileInput.value.trim(),
        productId: productIdInput.value.trim(),
        productName: productNameInput.value.trim(),
        orderReference: orderReferenceInput.value.trim(),
        purchaseDate: purchaseDateInput.value,
        proofNote: proofNoteInput.value.trim()
      };

      if (!payload.productId || !payload.productName || !payload.orderReference || !payload.purchaseDate) {
        showMessage("Please fill all required fields.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const res = await fetch(`${BACKEND_URL}/api/rewards/claim`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Failed to submit reward claim");
        }

        showMessage(data.message || "Reward claim submitted successfully! Redirecting to profile...", "success");

        setTimeout(() => {
          window.location.href = "./profile.html";
        }, 1800);

      } catch (error) {
        showMessage(error.message || "Something went wrong", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Reward Claim";
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
          .then((registration) => {
            console.log("Service Worker registered:", registration.scope);
          })
          .catch((error) => {
            console.error("Service Worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
