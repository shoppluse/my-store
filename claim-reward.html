<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopPlus - Claim Reward</title>

  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#0047ab" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg: #eef5ff;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --muted: #64748b;
      --primary: #0047ab;
      --primary-2: #0099ff;
      --border: #dbe7ff;
      --shadow: rgba(0, 71, 171, 0.14);
      --success: #16a34a;
      --danger: #dc2626;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #60a5fa;
      --primary-2: #38bdf8;
      --border: #1e3a8a;
      --shadow: rgba(56, 189, 248, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #f8fbff 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    /* HOME.HTML STYLE HEADER */
    .main-header {
      background: var(--gradient);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(18px + env(safe-area-inset-top)) 16px 20px;
      box-shadow: 0 6px 20px var(--shadow);
      gap: 14px;
    }

    .shopplus-logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      background: #ffffff;
      padding: 10px 22px;
      border-radius: 18px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      max-width: 700px;
    }

    .shopplus-logo .plus {
      color: var(--primary-2);
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1;
    }

    .header-actions {
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .header-btn,
    .dark-mode-toggle {
      width: 100%;
      min-height: 64px;
      text-decoration: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: inherit;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: none;
      backdrop-filter: blur(4px);
    }

    .header-btn:hover,
    .dark-mode-toggle:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.22);
    }

    .dark-mode-toggle {
      font-size: 1.5rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .page-wrap {
      max-width: 760px;
      margin: 36px auto;
      padding: 0 18px 40px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 50px var(--shadow);
      border: 1px solid var(--border);
    }

    .title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 22px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .input,
    .textarea {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      outline: none;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      color: #111827;
    }

    .textarea {
      min-height: 110px;
      resize: vertical;
    }

    .input:focus,
    .textarea:focus {
      border-color: var(--primary-2);
      box-shadow: 0 0 0 4px rgba(0, 153, 255, 0.12);
    }

    [data-theme="dark"] .input,
    [data-theme="dark"] .textarea {
      background: #0b1220;
      color: #f8fafc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .btn {
      width: 100%;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 10px 24px rgba(0, 71, 171, 0.22);
      transition: 0.25s ease;
      margin-top: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.92rem;
      display: none;
      line-height: 1.5;
      white-space: pre-line;
    }

    .message.success {
      display: block;
      background: rgba(22, 163, 74, 0.08);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.2);
    }

    .message.error {
      display: block;
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .note-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(0, 153, 255, 0.06);
      border: 1px solid rgba(0, 153, 255, 0.14);
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .main-header {
        padding: calc(14px + env(safe-area-inset-top)) 12px 18px;
        gap: 12px;
      }

      .shopplus-logo {
        font-size: 1.35rem;
        padding: 8px 14px;
        border-radius: 16px;
      }

      .shopplus-logo .plus {
        font-size: 1.7rem;
      }

      .header-actions {
        gap: 10px;
      }

      .header-btn,
      .dark-mode-toggle {
        min-height: 58px;
        font-size: 0.82rem;
        padding: 10px 6px;
        border-radius: 14px;
      }

      .dark-mode-toggle {
        font-size: 1.25rem;
      }

      .page-wrap {
        padding: 0 12px 24px;
        margin: 20px auto;
      }

      .card {
        padding: 20px 16px;
        border-radius: 18px;
      }

      .title {
        font-size: 1.45rem;
      }

      .subtitle {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-header">
    <a href="./home.html" class="shopplus-logo">Shop<span class="plus">+</span></a>

    <div class="header-actions">
      <a href="./profile.html" class="header-btn">Profile</a>
      <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <div class="page-wrap">
    <div class="card">
      <h1 class="title">Claim ShopPlus Reward</h1>
      <p class="subtitle">
        Submit your purchase details for manual verification.  
        After review, eligible reward amounts can be processed.
      </p>

      <form id="claimForm">
        <div class="grid">
          <div class="field">
            <label class="label">Full Name</label>
            <input class="input" type="text" id="name" readonly />
          </div>

          <div class="field">
            <label class="label">Email</label>
            <input class="input" type="email" id="email" readonly />
          </div>
        </div>

        <div class="grid">
          <div class="field">
            <label class="label">Mobile Number</label>
            <input class="input" type="text" id="mobile" readonly />
          </div>

          <div class="field">
            <label class="label">Product ID</label>
            <input class="input" type="text" id="productId" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Product Name</label>
          <input class="input" type="text" id="productName" required />
        </div>

        <div class="grid">
          <div class="field">
            <label class="label">Amazon Order Reference</label>
            <input class="input" type="text" id="orderReference" placeholder="Example: AMZ-4587" required />
          </div>

          <div class="field">
            <label class="label">Purchase Date</label>
            <input class="input" type="date" id="purchaseDate" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Proof / Note</label>
          <textarea class="textarea" id="proofNote" placeholder="Paste short proof details, screenshot note, or order info"></textarea>
        </div>

        <button class="btn" type="submit" id="submitBtn">Submit Reward Claim</button>
      </form>

      <div id="messageBox" class="message"></div>

      <div class="note-box">
        Tip: Keep your Product ID like <strong>SP1001</strong> and enter the exact order reference for faster manual verification.
      </div>
    </div>
  </div>

  <script>
    const currentUserRaw = localStorage.getItem("shopplusUser");
    if (!currentUserRaw) {
      window.location.href = "./login.html";
    }

    let currentUser = {};
    try {
      currentUser = JSON.parse(currentUserRaw);
    } catch (error) {
      localStorage.removeItem("shopplusUser");
      localStorage.removeItem("shopplusLoggedIn");
      window.location.href = "./login.html";
    }

    const BACKEND_URL = "https://my-store-e28j.onrender.com";
    const htmlEl = document.documentElement;
    const darkToggleBtn = document.getElementById("darkModeToggle");
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
      htmlEl.setAttribute("data-theme", savedTheme);
      darkToggleBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
    }

    darkToggleBtn.addEventListener("click", () => {
      const currentTheme = htmlEl.getAttribute("data-theme");

      if (currentTheme === "dark") {
        htmlEl.setAttribute("data-theme", "light");
        localStorage.setItem("theme", "light");
        darkToggleBtn.textContent = "🌙";
      } else {
        htmlEl.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        darkToggleBtn.textContent = "☀️";
      }
    });

    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const mobileInput = document.getElementById("mobile");
    const productIdInput = document.getElementById("productId");
    const productNameInput = document.getElementById("productName");
    const orderReferenceInput = document.getElementById("orderReference");
    const purchaseDateInput = document.getElementById("purchaseDate");
    const proofNoteInput = document.getElementById("proofNote");
    const claimForm = document.getElementById("claimForm");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(text, type = "success") {
      messageBox.className = "message " + type;
      messageBox.textContent = text;
    }

    nameInput.value = currentUser.name || "";
    emailInput.value = currentUser.email || "";
    mobileInput.value = currentUser.mobile || "";

    const params = new URLSearchParams(window.location.search);
    const productIdFromUrl = params.get("productId");
    const productNameFromUrl = params.get("productName");

    if (productIdFromUrl) productIdInput.value = productIdFromUrl;
    if (productNameFromUrl) productNameInput.value = productNameFromUrl;

    const today = new Date().toISOString().split("T")[0];
    purchaseDateInput.max = today;

    claimForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      showMessage("", "success");
      messageBox.style.display = "none";

      const userId = currentUser.id || currentUser._id;
      if (!userId) {
        showMessage("User ID not found. Please login again.", "error");
        return;
      }

      const payload = {
        userId: userId,
        name: nameInput.value.trim(),
        email: emailInput.value.trim(),
        mobile: mobileInput.value.trim(),
        productId: productIdInput.value.trim(),
        productName: productNameInput.value.trim(),
        orderReference: orderReferenceInput.value.trim(),
        purchaseDate: purchaseDateInput.value,
        proofNote: proofNoteInput.value.trim()
      };

      if (!payload.productId || !payload.productName || !payload.orderReference || !payload.purchaseDate) {
        showMessage("Please fill all required fields.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const res = await fetch(`${BACKEND_URL}/api/rewards/claim`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Failed to submit reward claim");
        }

        showMessage(data.message || "Reward claim submitted successfully! Redirecting to profile...", "success");

        setTimeout(() => {
          window.location.href = "./profile.html";
        }, 1800);

      } catch (error) {
        showMessage(error.message || "Something went wrong", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Reward Claim";
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
          .then((registration) => {
            console.log("Service Worker registered:", registration.scope);
          })
          .catch((error) => {
            console.error("Service Worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
