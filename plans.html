<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plans - ShopPlus</title>

  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link rel="icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", savedTheme === "dark" ? "dark" : "light");
    })();

    const isLoggedIn = localStorage.getItem("shopplusLoggedIn");
    const currentUserRaw = localStorage.getItem("shopplusUser");

    if (isLoggedIn !== "true" || !currentUserRaw) {
      window.location.href = "login.html";
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f7f7f8;
      --bg-end: #efeff2;
      --card-bg: #ffffff;
      --text: #111111;
      --muted: #777777;
      --primary: #111111;
      --primary-2: #2d2d2d;
      --border: #e9e9ec;
      --shadow: rgba(0, 0, 0, 0.06);

      --success-bg: #f0fdf4;
      --success-text: #15803d;
      --success-border: #bbf7d0;

      --warning-bg: #fff7ed;
      --warning-text: #c2410c;
      --warning-border: #fdba74;

      --danger-bg: #fef2f2;
      --danger-text: #b91c1c;
      --danger-border: #fecaca;

      --info-bg: #f5f5f5;
      --info-text: #3f3f46;
      --info-border: #e4e4e7;

      --btn-bg: linear-gradient(120deg, #111111, #2d2d2d);
      --btn-shadow: rgba(0, 0, 0, 0.16);

      --starter-bg: rgba(17, 17, 17, 0.025);
      --starter-border: rgba(17, 17, 17, 0.08);

      --growth-bg: rgba(17, 17, 17, 0.045);
      --growth-border: rgba(17, 17, 17, 0.10);

      --elite-bg: linear-gradient(180deg, rgba(17,17,17,0.96) 0%, rgba(38,38,38,0.96) 100%);
      --elite-border: rgba(17, 17, 17, 0.14);

      --upgrade-bg: linear-gradient(120deg, #111111, #2d2d2d);
      --upgrade-shadow: rgba(0, 0, 0, 0.18);
    }

    [data-theme="dark"] {
      --bg: #0f1115;
      --bg-end: #171a20;
      --card-bg: #161a22;
      --text: #f8fafc;
      --muted: #a1a1aa;
      --primary: #ffffff;
      --primary-2: #d1d5db;
      --border: #232833;
      --shadow: rgba(0, 0, 0, 0.22);

      --success-bg: rgba(22, 163, 74, 0.12);
      --success-text: #4ade80;
      --success-border: rgba(74, 222, 128, 0.22);

      --warning-bg: rgba(245, 158, 11, 0.12);
      --warning-text: #fbbf24;
      --warning-border: rgba(251, 191, 36, 0.22);

      --danger-bg: rgba(239, 68, 68, 0.12);
      --danger-text: #f87171;
      --danger-border: rgba(248, 113, 113, 0.22);

      --info-bg: rgba(255,255,255,0.04);
      --info-text: #d4d4d8;
      --info-border: rgba(255,255,255,0.06);

      --starter-bg: rgba(255,255,255,0.025);
      --starter-border: rgba(255,255,255,0.05);

      --growth-bg: rgba(255,255,255,0.04);
      --growth-border: rgba(255,255,255,0.08);

      --elite-bg: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%);
      --elite-border: rgba(255,255,255,0.08);

      --upgrade-bg: linear-gradient(120deg, #ffffff, #e5e7eb);
      --upgrade-shadow: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg-end) 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .main-header {
      background: transparent;
      padding: calc(10px + env(safe-area-inset-top)) 10px 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-shell {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 24px;
      padding: 10px;
      box-shadow: 0 8px 24px var(--shadow);
    }

    [data-theme="dark"] .header-shell {
      background: rgba(22,26,34,0.88);
      border-color: rgba(255,255,255,0.04);
    }

    .header-top {
      width: 100%;
      display: grid;
      grid-template-columns: 60px 1fr 60px;
      gap: 10px;
      align-items: center;
    }

    .header-icon-btn,
    .theme-btn {
      min-height: 50px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(17,17,17,0.04);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.25s ease;
      cursor: pointer;
      font-family: inherit;
    }

    [data-theme="dark"] .header-icon-btn,
    [data-theme="dark"] .theme-btn {
      background: rgba(255,255,255,0.03);
    }

    .header-icon-btn:hover,
    .theme-btn:hover {
      transform: translateY(-2px);
    }

    .header-title {
      min-height: 50px;
      background: rgba(17,17,17,0.03);
      color: var(--primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
      padding: 0 12px;
      text-align: center;
      letter-spacing: -0.2px;
      border: 1px solid var(--border);
    }

    [data-theme="dark"] .header-title {
      background: rgba(255,255,255,0.03);
    }

    .page-wrap {
      width: 100%;
      max-width: 1100px;
      margin: 14px auto 40px;
      padding: 0 10px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 14px 34px var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 3.8vw, 2rem);
      color: var(--primary);
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.3px;
    }

    .section-sub {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 0.94rem;
    }

    .status-box {
      border-radius: 18px;
      padding: 16px;
      border: 1px solid;
      margin-top: 12px;
    }

    .status-info {
      background: var(--info-bg);
      border-color: var(--info-border);
    }

    .status-warning {
      background: var(--warning-bg);
      border-color: var(--warning-border);
    }

    .status-danger {
      background: var(--danger-bg);
      border-color: var(--danger-border);
    }

    .status-success {
      background: var(--success-bg);
      border-color: var(--success-border);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.85rem;
      border: 1px solid;
      margin-bottom: 12px;
    }

    .pill-info {
      background: var(--info-bg);
      color: var(--info-text);
      border-color: var(--info-border);
    }

    .pill-warning {
      background: var(--warning-bg);
      color: var(--warning-text);
      border-color: var(--warning-border);
    }

    .pill-danger {
      background: var(--danger-bg);
      color: var(--danger-text);
      border-color: var(--danger-border);
    }

    .pill-success {
      background: var(--success-bg);
      color: var(--success-text);
      border-color: var(--success-border);
    }

    .plans-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 10px;
    }

    .plan-card {
      border-radius: 22px;
      padding: 18px;
      border: 1px solid;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      box-shadow: 0 10px 24px rgba(0,0,0,0.04);
    }

    .plan-card.starter {
      background: var(--starter-bg);
      border-color: var(--starter-border);
    }

    .plan-card.growth {
      background: var(--growth-bg);
      border-color: var(--growth-border);
    }

    .plan-card.elite {
      background: var(--elite-bg);
      border-color: var(--elite-border);
      color: #ffffff;
    }

    [data-theme="dark"] .plan-card.elite {
      color: var(--text);
    }

    .plan-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.65);
      margin-bottom: 12px;
    }

    .plan-card.elite .plan-badge {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.18);
      color: #ffffff;
    }

    [data-theme="dark"] .plan-card.elite .plan-badge {
      color: var(--text);
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.08);
    }

    .plan-name {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 8px;
      letter-spacing: -0.2px;
    }

    .plan-card.elite .plan-name {
      color: #ffffff;
    }

    [data-theme="dark"] .plan-card.elite .plan-name {
      color: var(--text);
    }

    .plan-price {
      font-size: 1.85rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
    }

    .plan-card.elite .plan-price {
      color: #ffffff;
    }

    [data-theme="dark"] .plan-card.elite .plan-price {
      color: var(--text);
    }

    .plan-price span {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
    }

    .plan-card.elite .plan-price span {
      color: rgba(255,255,255,0.75);
    }

    [data-theme="dark"] .plan-card.elite .plan-price span {
      color: var(--muted);
    }

    .plan-desc {
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.92rem;
      margin-bottom: 14px;
    }

    .plan-card.elite .plan-desc {
      color: rgba(255,255,255,0.8);
    }

    [data-theme="dark"] .plan-card.elite .plan-desc {
      color: var(--muted);
    }

    .plan-features {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
      flex: 1;
    }

    .plan-features li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.6;
      color: var(--text);
      font-size: 0.9rem;
    }

    .plan-card.elite .plan-features li {
      color: #ffffff;
    }

    [data-theme="dark"] .plan-card.elite .plan-features li {
      color: var(--text);
    }

    .plan-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 14px;
      font-size: 0.92rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: transform 0.2s ease, opacity 0.2s ease;
      min-height: 52px;
      color: white;
    }

    .plan-btn:hover {
      transform: translateY(-2px);
    }

    .plan-btn.current {
      background: rgba(22, 163, 74, 0.12);
      color: var(--success-text);
      border: 1px solid var(--success-border);
      box-shadow: none;
    }

    .plan-btn.free {
      background: var(--btn-bg);
      box-shadow: 0 12px 24px var(--btn-shadow);
    }

    .plan-btn.upgrade {
      background: var(--upgrade-bg);
      box-shadow: 0 12px 24px var(--upgrade-shadow);
      color: #ffffff;
    }

    [data-theme="dark"] .plan-btn.upgrade {
      color: #111111;
    }

    .loading-box {
      text-align: center;
      padding: 18px;
      color: var(--muted);
      font-weight: 600;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      background: transparent;
      padding: 10px 12px calc(18px + env(safe-area-inset-bottom));
      font-size: 13px;
      font-weight: 600;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .plans-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .card {
        border-radius: 20px;
        padding: 16px;
      }

      .header-top {
        grid-template-columns: 52px 1fr 52px;
        gap: 8px;
      }

      .header-title {
        font-size: 0.92rem;
        min-height: 46px;
      }

      .header-icon-btn,
      .theme-btn {
        min-height: 46px;
        font-size: 1.15rem;
        border-radius: 14px;
      }

      .plan-name {
        font-size: 1.18rem;
      }

      .plan-price {
        font-size: 1.55rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-header">
    <div class="header-shell">
      <div class="header-top">
        <a href="profile.html" class="header-icon-btn" title="Back to Profile">‹</a>
        <div class="header-title">Choose Your Plan</div>
        <button id="themeToggleBtn" class="theme-btn" title="Toggle Theme">🌙</button>
      </div>
    </div>
  </div>

  <div class="page-wrap">
    <section class="card">
      <h1 class="section-title">Starter • Growth • Elite Plans</h1>
      <p class="section-sub">
        Select your ShopPlus affiliate plan. Starter is free, Growth is ₹29/month, and Elite is ₹79/month.
      </p>

      <div id="accessStateRoot" class="loading-box">Checking your affiliate access...</div>

      <div id="plansRoot" style="display:none;">
        <div class="plans-grid" id="plansGrid"></div>
      </div>
    </section>
  </div>

  <div class="footer">© 2026 ShopPlus. All rights reserved.</div>

  <script>
    const API_BASE = "https://my-store-e28j.onrender.com";
    const WHATSAPP_UPGRADE_NUMBER = "919945243930";
    let storedUser = JSON.parse(localStorage.getItem("shopplusUser") || "{}");

    const htmlEl = document.documentElement;
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const accessStateRoot = document.getElementById("accessStateRoot");
    const plansRoot = document.getElementById("plansRoot");
    const plansGrid = document.getElementById("plansGrid");

    function setThemeButton() {
      const currentTheme = htmlEl.getAttribute("data-theme");
      themeToggleBtn.textContent = currentTheme === "dark" ? "☀️" : "🌙";
    }

    themeToggleBtn.addEventListener("click", () => {
      const currentTheme = htmlEl.getAttribute("data-theme");
      const nextTheme = currentTheme === "dark" ? "light" : "dark";
      htmlEl.setAttribute("data-theme", nextTheme);
      localStorage.setItem("theme", nextTheme);
      setThemeButton();
    });

    setThemeButton();

    function normalizePlan(plan) {
      const safePlan = (plan || "").toLowerCase();
      if (["starter", "growth", "elite"].includes(safePlan)) return safePlan;
      return "";
    }

    function titleCase(text = "") {
      if (!text) return "";
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function buildWhatsAppLink(message) {
      return `https://wa.me/${WHATSAPP_UPGRADE_NUMBER}?text=${encodeURIComponent(message)}`;
    }

    function getPlanConfig(planKey) {
      const plans = {
        starter: {
          key: "starter",
          name: "Starter",
          badge: "Free Plan",
          price: "₹0",
          suffix: "/month",
          limit: 3,
          desc: "Best for new ShopPlus affiliates starting their first curated product promotions.",
          features: [
            "Up to 3 product listings",
            "Perfect for beginners",
            "Start free immediately",
            "Simple onboarding"
          ]
        },
        growth: {
          key: "growth",
          name: "Growth",
          badge: "Pro Plan",
          price: "₹29",
          suffix: "/month",
          limit: 20,
          desc: "For affiliates who want more product capacity and stronger promotional growth.",
          features: [
            "Up to 20 product listings",
            "Ideal for active affiliates",
            "Better scaling than free plan",
            "Great for WhatsApp / Instagram promoters"
          ]
        },
        elite: {
          key: "elite",
          name: "Elite",
          badge: "Premium Plan",
          price: "₹79",
          suffix: "/month",
          limit: -1,
          desc: "For serious ShopPlus affiliates who want unlimited product freedom and future-ready growth.",
          features: [
            "Unlimited product listings",
            "Best for serious promoters",
            "Highest flexibility",
            "Premium-ready affiliate scaling"
          ]
        }
      };

      return plans[planKey];
    }

    function formatLimit(limit) {
      if (limit === -1) return "Unlimited Products";
      return `${limit} Product${limit > 1 ? "s" : ""}`;
    }

    function updateLocalUser(patch = {}) {
      const current = JSON.parse(localStorage.getItem("shopplusUser") || "{}");
      const updated = { ...current, ...patch };
      localStorage.setItem("shopplusUser", JSON.stringify(updated));
      storedUser = updated;
      return updated;
    }

    function renderAccessMessage(type, title, text, btnText = "", btnHref = "") {
      let boxClass = "status-info";
      let pillClass = "pill-info";
      let pillText = "ℹ️ Info";

      if (type === "warning") {
        boxClass = "status-warning";
        pillClass = "pill-warning";
        pillText = "⏳ Pending";
      } else if (type === "danger") {
        boxClass = "status-danger";
        pillClass = "pill-danger";
        pillText = "❌ Blocked";
      } else if (type === "success") {
        boxClass = "status-success";
        pillClass = "pill-success";
        pillText = "✅ Approved";
      }

      accessStateRoot.className = "";
      accessStateRoot.innerHTML = `
        <div class="status-box ${boxClass}">
          <div class="status-pill ${pillClass}">${pillText}</div>
          <h3 style="margin:0 0 8px; color: var(--primary);">${title}</h3>
          <p style="margin:0; color: var(--muted); line-height:1.8;">${text}</p>
          ${btnText && btnHref ? `<a href="${btnHref}" class="plan-btn free" style="margin-top:14px; max-width:240px;">${btnText}</a>` : ""}
        </div>
      `;
    }

    function goToCurrentPlanAction(currentPlan, currentPlanStatus) {
      if (!currentPlan) {
        window.location.href = "profile.html";
        return;
      }

      if ((currentPlan === "starter" || currentPlan === "growth" || currentPlan === "elite") && currentPlanStatus === "active") {
        window.location.href = "add-product.html";
      } else {
        window.location.href = "profile.html";
      }
    }

    function renderPlans(currentPlan = "", planStatus = "") {
      const order = ["starter", "growth", "elite"];

      plansGrid.innerHTML = order.map((key) => {
        const plan = getPlanConfig(key);
        const isCurrent = currentPlan === key;

        let buttonHtml = "";

        if (isCurrent) {
          const currentLabel = planStatus === "active"
            ? `Current Plan • Go Add Product`
            : `Current Plan • Pending Activation`;

          buttonHtml = `
            <button class="plan-btn current" type="button" onclick="goToCurrentPlanAction('${key}', '${planStatus}')">
              ${currentLabel}
            </button>
          `;
        } else if (key === "starter") {
          buttonHtml = `
            <button class="plan-btn free" type="button" onclick="selectStarterPlan()">
              Continue Free
            </button>
          `;
        } else {
          const msg = key === "growth"
            ? "Hello ShopPlus, I want to upgrade to the Growth plan (₹29/month). Please guide me."
            : "Hello ShopPlus, I want to upgrade to the Elite plan (₹79/month). Please guide me.";

          buttonHtml = `
            <a class="plan-btn upgrade" href="${buildWhatsAppLink(msg)}" target="_blank" rel="noopener noreferrer">
              Upgrade via WhatsApp
            </a>
          `;
        }

        return `
          <div class="plan-card ${plan.key}">
            <div class="plan-badge">${plan.badge}</div>
            <h3 class="plan-name">${plan.name}</h3>
            <div class="plan-price">${plan.price} <span>${plan.suffix}</span></div>
            <div class="plan-desc">${plan.desc}</div>

            <ul class="plan-features">
              ${plan.features.map(item => `<li><span>✔️</span><span>${item}</span></li>`).join("")}
              <li><span>📦</span><span><strong>${formatLimit(plan.limit)}</strong></span></li>
            </ul>

            ${buttonHtml}
          </div>
        `;
      }).join("");
    }

    async function selectStarterPlan() {
      const starterButtons = document.querySelectorAll(".plan-btn.free");

      starterButtons.forEach(btn => {
        btn.disabled = true;
        btn.textContent = "Activating...";
      });

      try {
        if (!storedUser.id) {
          throw new Error("Please login again.");
        }

        const response = await fetch(`${API_BASE}/api/affiliate/select-plan`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Cache-Control": "no-cache"
          },
          body: JSON.stringify({
            userId: storedUser.id,
            plan: "starter"
          }),
          cache: "no-store"
        });

        let data = {};
        try {
          data = await response.json();
        } catch (_) {}

        if (!response.ok) {
          throw new Error(data.message || "Failed to activate starter plan");
        }

        const backendUser = data?.user || {};

        updateLocalUser({
          isAffiliate: backendUser.isAffiliate,
          affiliateStatus: backendUser.affiliateStatus,
          affiliatePlan: backendUser.affiliatePlan,
          planStatus: backendUser.planStatus,
          maxProducts: backendUser.maxProducts
        });

        alert("Starter plan activated successfully!");
        window.location.href = "add-product.html";
      } catch (error) {
        console.error("Starter plan activation failed:", error);
        alert(error.message || "Starter plan activation failed. Please try again.");
        starterButtons.forEach(btn => {
          btn.disabled = false;
          btn.textContent = "Continue Free";
        });
      }
    }

    window.selectStarterPlan = selectStarterPlan;
    window.goToCurrentPlanAction = goToCurrentPlanAction;

    async function initPlansPage() {
      try {
        if (!storedUser.id) {
          throw new Error("Please login again.");
        }

        const response = await fetch(`${API_BASE}/api/auth/user/${storedUser.id}`, {
          method: "GET",
          headers: {
            "Content-Type": "application/json",
            "Cache-Control": "no-cache"
          },
          cache: "no-store"
        });

        const data = await response.json();

        console.log("Plans page user verify response:", response.status, data);

        if (!response.ok || !data.user) {
          throw new Error(data.message || "Failed to fetch affiliate status");
        }

        const user = data.user;
        const affiliateStatus = (user.affiliateStatus || "none").toLowerCase();
        const isAffiliate = user.isAffiliate === true;
        const currentPlan = normalizePlan(user.affiliatePlan || "");
        const currentPlanStatus = (user.planStatus || "").toLowerCase();

        updateLocalUser({
          id: user.id,
          name: user.name,
          email: user.email,
          mobile: user.mobile,
          isAffiliate,
          affiliateStatus,
          affiliatePlan: currentPlan,
          planStatus: currentPlanStatus,
          maxProducts: user.maxProducts ?? 0
        });

        if (affiliateStatus === "approved" || isAffiliate) {
          let successText = "You are approved to choose your ShopPlus plan. Select Starter for free or upgrade via WhatsApp.";

          if (currentPlan) {
            successText = `You are already on the ${titleCase(currentPlan)} plan${currentPlanStatus ? ` (${titleCase(currentPlanStatus)})` : ""}. You can continue with your current plan or upgrade.`;
          }

          renderAccessMessage(
            "success",
            "Affiliate Approved",
            successText
          );

          plansRoot.style.display = "block";
          renderPlans(currentPlan, currentPlanStatus);
          return;
        }

        if (affiliateStatus === "pending") {
          plansRoot.style.display = "none";
          renderAccessMessage(
            "warning",
            "Application Pending",
            "Your affiliate application is still under review. Please wait until approval before choosing a plan.",
            "Go to Profile",
            "profile.html"
          );
          return;
        }

        if (affiliateStatus === "rejected") {
          plansRoot.style.display = "none";
          renderAccessMessage(
            "danger",
            "Application Rejected",
            "Your affiliate application was rejected. Please apply again before choosing a plan.",
            "Apply Again",
            "apply-affiliate.html"
          );
          return;
        }

        plansRoot.style.display = "none";
        renderAccessMessage(
          "danger",
          "Affiliate Approval Required",
          "You must apply and get approved as a ShopPlus affiliate before selecting a plan.",
          "Apply for Affiliate",
          "apply-affiliate.html"
        );
      } catch (error) {
        console.error("Plans page init error:", error);
        plansRoot.style.display = "none";
        renderAccessMessage(
          "danger",
          "Unable to Load Plans",
          error.message || "Could not verify your affiliate account right now. Please try again after a moment."
        );
      }
    }

    // remove old service workers to avoid stale cached JS
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        registrations.forEach((registration) => registration.unregister());
      });
    }

    initPlansPage();
  </script>
</body>
</html>
