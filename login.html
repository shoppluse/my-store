<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopPlus - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg: #f4f8ff;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --muted: #6b7280;
      --primary: #0047ab;
      --primary-2: #0099ff;
      --border: #dbe7ff;
      --shadow: rgba(0, 71, 171, 0.14);
      --success: #16a34a;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, #f8fbff 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 460px;
    }

    .brand {
      text-align: center;
      margin-bottom: 18px;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff;
      color: var(--primary);
      padding: 10px 18px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1.6rem;
      box-shadow: 0 10px 30px rgba(0, 71, 171, 0.14);
    }

    .brand-badge .plus {
      color: var(--primary-2);
      font-size: 1.9rem;
      font-weight: 900;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0, 71, 171, 0.14);
      border: 1px solid var(--border);
    }

    .title {
      font-size: 1.7rem;
      font-weight: 700;
      margin: 0 0 6px 0;
      color: var(--primary);
      text-align: center;
    }

    .subtitle {
      text-align: center;
      margin: 0 0 22px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #334155;
    }

    .input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      outline: none;
      font-size: 15px;
      font-family: inherit;
      transition: 0.25s ease;
      background: #fff;
    }

    .input:focus {
      border-color: var(--primary-2);
      box-shadow: 0 0 0 4px rgba(0, 153, 255, 0.12);
    }

    .btn {
      width: 100%;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 10px 24px rgba(0, 71, 171, 0.22);
      transition: 0.25s ease;
      margin-top: 4px;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.92rem;
      display: none;
      line-height: 1.5;
      white-space: pre-line;
    }

    .message.success {
      display: block;
      background: rgba(22, 163, 74, 0.08);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.2);
    }

    .message.error {
      display: block;
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .footer-link {
      text-align: center;
      margin-top: 18px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 520px) {
      body { padding: 16px; }
      .card { padding: 22px 18px; border-radius: 20px; }
      .title { font-size: 1.45rem; }
      .brand-badge { font-size: 1.35rem; }
      .brand-badge .plus { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="brand">
      <div class="brand-badge">Shop<span class="plus">+</span></div>
    </div>

    <div class="card">
      <h1 class="title">Welcome Back</h1>
      <p class="subtitle">Login with your email or mobile</p>

      <form id="loginForm">
        <div class="field">
          <label class="label" for="identifier">Email or Mobile</label>
          <input class="input" type="text" id="identifier" placeholder="Enter email or mobile" required />
        </div>

        <div class="field">
          <label class="label" for="password">Password</label>
          <input class="input" type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button class="btn" type="submit" id="loginBtn">Login</button>
      </form>

      <div id="messageBox" class="message"></div>

      <div class="footer-link">
        Don’t have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://my-store-e28j.onrender.com";
    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(text, type = "success") {
      messageBox.className = "message " + type;
      messageBox.textContent = text;
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      const identifier = document.getElementById("identifier").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ identifier, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Login failed");
        }

        localStorage.setItem("shopplusUser", JSON.stringify(data.user || data));

        showMessage(data.message || "Login successful!", "success");

        setTimeout(() => {
          window.location.href = "home.html";
        }, 1400);

      } catch (error) {
        showMessage(error.message || "Something went wrong", "error");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
