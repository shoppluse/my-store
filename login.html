<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ShopPlus</title>
  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#0047ab" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gradient-light: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg-light: #f8f9fb;
      --card-bg: #ffffff;
      --text-dark: #1f1f1f;
      --accent: #0099ff;
      --accent-dark: #0047ab;
      --input-bg: #f2f4fc;
      --border: #d8e3f2;
      --success: #2e7d32;
      --error: #d32f2f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--gradient-light);
      color: white;
      padding: calc(18px + env(safe-area-inset-top)) 24px 18px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .auth-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0, 71, 171, 0.15);
      padding: 28px 24px;
    }

    .auth-card h2 {
      margin: 0 0 8px;
      color: var(--accent-dark);
      text-align: center;
      font-size: 28px;
    }

    .auth-card p {
      margin: 0 0 24px;
      color: #555;
      text-align: center;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.12);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--gradient-light);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      margin-top: 8px;
      font-family: inherit;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      font-weight: 600;
      line-height: 1.5;
      min-height: 22px;
      word-break: break-word;
    }

    .success {
      color: var(--success);
    }

    .error {
      color: var(--error);
    }

    .link-text {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }

    .link-text a {
      color: var(--accent-dark);
      text-decoration: none;
      font-weight: 700;
    }

    footer {
      background: var(--gradient-light);
      color: white;
      text-align: center;
      padding: 14px 10px calc(14px + env(safe-area-inset-bottom));
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .container {
        padding: 20px 16px;
      }

      .auth-card {
        padding: 22px 18px;
        border-radius: 16px;
      }

      header {
        font-size: 20px;
        padding: calc(24px + env(safe-area-inset-top)) 16px 16px;
      }

      .auth-card h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <header>ShopPlus - Welcome Back</header>

  <div class="container">
    <div class="auth-card">
      <h2>Login</h2>
      <p>Login with your Email or Mobile Number</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="emailOrMobile">Email or Mobile Number</label>
          <input type="text" id="emailOrMobile" placeholder="Enter email or mobile number" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" id="loginBtn">Login</button>
      </form>

      <div id="message" class="message"></div>

      <div class="link-text">
        New user? <a href="signup.html">Create Account</a>
      </div>
    </div>
  </div>

  <footer>© 2026 ShopPlus. All rights reserved.</footer>

  <script>
    const BACKEND_URL = "https://my-store-e28j.onrender.com";

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.textContent = "";
      message.className = "message";
      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      const emailOrMobile = document.getElementById("emailOrMobile").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ emailOrMobile, password })
        });

        const data = await res.json();

        if (!res.ok) {
          message.textContent = data.message || "Login failed";
          message.classList.add("error");
          loginBtn.disabled = false;
          loginBtn.textContent = "Login";
          return;
        }

        // Save login state + user data
        localStorage.setItem("shopplusLoggedIn", "true");
        localStorage.setItem("shopplusUser", JSON.stringify(data.user));

        // This tells home.html user just logged in
        sessionStorage.setItem("shopplusJustLoggedIn", "true");

        message.textContent = "Login successful! Redirecting...";
        message.classList.add("success");

        setTimeout(() => {
          window.location.href = "home.html";
        }, 1200);

      } catch (error) {
        console.error("Login error:", error);
        message.textContent = "Something went wrong. Please try again.";
        message.classList.add("error");
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });

    // Register Firebase Messaging Service Worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const registration = await navigator.serviceWorker.register(
            "/my-store/firebase-messaging-sw.js",
            { scope: "/my-store/" }
          );
          console.log("Firebase Messaging Service Worker registered:", registration.scope);
        } catch (error) {
          console.error("Firebase Messaging Service Worker registration failed:", error);
        }
      });
    }
  </script>
</body>
</html>
