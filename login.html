<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ShopPlus</title>
  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link rel="icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <script>
    (function () {
      const t = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
    })();
    // If already logged in, skip login page
    if (localStorage.getItem("shopplusLoggedIn") === "true" && localStorage.getItem("shopplusUser")) {
      window.location.replace("home.html");
    }
  </script>

  <style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

:root {
  --bg:          #f4f3f0;
  --bg-2:        #eceae5;
  --surface:     #ffffff;
  --surface-2:   #f9f8f6;
  --text:        #111010;
  --text-2:      #3d3c3a;
  --muted:       #8a8884;
  --muted-2:     #b5b3af;
  --border:      #e3e1dc;
  --accent:      #e8520a;
  --accent-2:    #ff7a3d;
  --accent-glow: rgba(232,82,10,0.18);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.06);
  --shadow-md:   0 6px 20px rgba(0,0,0,0.09);
  --shadow-lg:   0 14px 36px rgba(0,0,0,0.12);
  --radius-sm:   16px;
  --radius-md:   22px;
  --pad:         clamp(12px,3vw,28px);
  --font-display:'Syne', sans-serif;
  --font-body:   'DM Sans', sans-serif;
  --success-bg:     #f0fdf4;
  --success-text:   #15803d;
  --success-border: #bbf7d0;
  --danger-bg:      #fef2f2;
  --danger-text:    #b91c1c;
  --danger-border:  #fecaca;
  --warn-bg:        #fffbeb;
  --warn-text:      #b45309;
  --warn-border:    #fde68a;
}

[data-theme="dark"] {
  --bg:          #0d0d0b;
  --bg-2:        #141410;
  --surface:     #1a1916;
  --surface-2:   #201f1c;
  --text:        #f5f3ee;
  --text-2:      #ccc9c2;
  --muted:       #7a7870;
  --muted-2:     #504f4a;
  --border:      #2a2925;
  --accent:      #ff6b25;
  --accent-2:    #ff9060;
  --accent-glow: rgba(255,107,37,0.22);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.3);
  --shadow-md:   0 6px 20px rgba(0,0,0,0.4);
  --shadow-lg:   0 14px 36px rgba(0,0,0,0.5);
  --success-bg:     rgba(22,163,74,0.12);
  --success-text:   #4ade80;
  --success-border: rgba(74,222,128,0.22);
  --danger-bg:      rgba(239,68,68,0.12);
  --danger-text:    #f87171;
  --danger-border:  rgba(248,113,113,0.22);
  --warn-bg:        rgba(245,158,11,0.12);
  --warn-text:      #fbbf24;
  --warn-border:    rgba(251,191,36,0.22);
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background 0.3s, color 0.3s;
}

a { text-decoration: none; color: inherit; }
button { border: none; background: none; cursor: pointer; font-family: inherit; }
input  { font-family: inherit; }

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: calc(env(safe-area-inset-top) + 10px) var(--pad) 10px;
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
}

.header-pill {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: min(100%, 520px);
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 16px;
  box-shadow: var(--shadow-md);
}

.header-logo {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
}
.header-logo .plus { color: var(--accent); }

.theme-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}
.theme-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }

/* ===== CONTAINER ===== */
.container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px var(--pad) 24px;
}

/* ===== CARD ===== */
.auth-card {
  background: var(--surface);
  width: 100%;
  max-width: 420px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  padding: 28px 24px;
  animation: card-in 0.35s ease forwards;
  opacity: 0;
  transform: translateY(10px);
}
@keyframes card-in { to { opacity: 1; transform: translateY(0); } }

/* ===== SERVER STATUS BAR ===== */
.server-status {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  font-size: 0.82rem;
  font-weight: 600;
  font-family: var(--font-display);
}
.server-status.waking {
  display: flex;
  background: var(--warn-bg);
  color: var(--warn-text);
  border: 1px solid var(--warn-border);
}
.server-status.online {
  display: flex;
  background: var(--success-bg);
  color: var(--success-text);
  border: 1px solid var(--success-border);
}
.status-spinner {
  width: 14px; height: 14px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.card-title {
  font-family: var(--font-display);
  font-size: 1.65rem;
  font-weight: 800;
  color: var(--text);
  text-align: center;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}
.card-sub {
  text-align: center;
  color: var(--muted);
  font-size: 0.86rem;
  line-height: 1.6;
  margin-bottom: 22px;
}

/* ===== FORM ===== */
.field { margin-bottom: 14px; }

.label {
  display: block;
  font-size: 0.72rem;
  font-weight: 700;
  font-family: var(--font-display);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 7px;
}

.input {
  width: 100%;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  outline: none;
  font-size: 0.9rem;
  background: var(--surface-2);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.input::placeholder { color: var(--muted-2); }

.pw-wrap { position: relative; }
.pw-wrap .input { padding-right: 48px; }
.toggle-pw {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 1.1rem;
  color: var(--muted);
  background: none; border: none;
  cursor: pointer; padding: 0; line-height: 1;
}

/* ===== SUBMIT BUTTON ===== */
.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(120deg, var(--accent), var(--accent-2));
  color: white;
  font-size: 0.92rem;
  font-weight: 700;
  font-family: var(--font-display);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  margin-top: 6px;
  min-height: 50px;
  box-shadow: 0 8px 20px var(--accent-glow);
  letter-spacing: 0.1px;
}
.submit-btn:hover  { transform: translateY(-2px); box-shadow: 0 12px 28px var(--accent-glow); }
.submit-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

/* ===== MESSAGES ===== */
.message {
  margin-top: 14px;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.86rem;
  font-weight: 600;
  line-height: 1.55;
  display: none;
  text-align: center;
}
.message.success { display: block; background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
.message.error   { display: block; background: var(--danger-bg);  color: var(--danger-text);  border: 1px solid var(--danger-border); }
.message.warning { display: block; background: var(--warn-bg);    color: var(--warn-text);    border: 1px solid var(--warn-border); }

.link-row {
  margin-top: 18px;
  text-align: center;
  font-size: 0.86rem;
  color: var(--muted);
}
.link-row a {
  color: var(--accent);
  font-weight: 700;
  text-decoration: none;
}
.link-row a:hover { opacity: 0.8; }

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  color: var(--muted-2);
  font-size: 0.78rem;
  font-weight: 600;
  font-family: var(--font-display);
  padding: 8px 12px calc(20px + env(safe-area-inset-bottom));
}

@media (max-width: 480px) {
  :root { --pad: 12px; }
  .auth-card { padding: 20px 16px; border-radius: var(--radius-sm); }
  .card-title { font-size: 1.4rem; }
  .submit-btn { min-height: 48px; }
}
  </style>
</head>
<body>

<header class="header">
  <div class="header-pill">
    <div class="header-logo">Shop<span class="plus">+</span></div>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
  </div>
</header>

<div class="container">
  <div class="auth-card">

    <!-- Server wake-up status bar -->
    <div class="server-status" id="serverStatus">
      <div class="status-spinner" id="statusSpinner"></div>
      <span id="statusText">Waking up server, please wait…</span>
    </div>

    <div class="card-title">Welcome Back</div>
    <p class="card-sub">Login with your Email or Mobile Number</p>

    <form id="loginForm">
      <div class="field">
        <label class="label" for="emailOrMobile">Email or Mobile</label>
        <input class="input" type="text" id="emailOrMobile" placeholder="Enter email or mobile number" required autocomplete="username" />
      </div>

      <div class="field">
        <label class="label" for="password">Password</label>
        <div class="pw-wrap">
          <input class="input" type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁️</button>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="loginBtn">Login</button>
    </form>

    <div class="message" id="message"></div>

    <div class="link-row">
      New user? <a href="signup.html">Create Account</a>
    </div>
  </div>
</div>

<div class="footer">© 2026 ShopPlus. All rights reserved.</div>

<script>
"use strict";

const BACKEND_URL = "https://my-store-e28j.onrender.com";

/* ===== THEME ===== */
const htmlEl   = document.documentElement;
const themeBtn = document.getElementById("themeBtn");

function syncTheme() {
  themeBtn.textContent = htmlEl.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
}
themeBtn.addEventListener("click", () => {
  const next = htmlEl.getAttribute("data-theme") === "dark" ? "light" : "dark";
  htmlEl.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  syncTheme();
});
syncTheme();

/* ===== ELEMENTS ===== */
const form         = document.getElementById("loginForm");
const loginBtn     = document.getElementById("loginBtn");
const messageBox   = document.getElementById("message");
const passwordInput= document.getElementById("password");
const togglePw     = document.getElementById("togglePw");
const serverStatus = document.getElementById("serverStatus");
const statusText   = document.getElementById("statusText");
const statusSpinner= document.getElementById("statusSpinner");

/* ===== PASSWORD TOGGLE ===== */
togglePw.addEventListener("click", () => {
  const show = passwordInput.type === "password";
  passwordInput.type = show ? "text" : "password";
  togglePw.textContent = show ? "🙈" : "👁️";
});

/* ===== MESSAGE ===== */
function showMessage(text, type = "error") {
  messageBox.textContent  = text;
  messageBox.className    = "message " + type;
}
function hideMessage() {
  messageBox.className = "message";
  messageBox.textContent = "";
}

/* ===== SERVER STATUS UI ===== */
function showWaking() {
  serverStatus.className = "server-status waking";
  statusSpinner.style.display = "block";
  statusText.textContent = "⏳ Server is waking up, please wait…";
}
function showOnline() {
  serverStatus.className = "server-status online";
  statusSpinner.style.display = "none";
  statusText.textContent = "✅ Server is ready!";
  setTimeout(() => { serverStatus.className = "server-status"; }, 2000);
}
function hideStatus() {
  serverStatus.className = "server-status";
}

/* ===== LOGIN WITH AUTO-RETRY ===== */
// Retries up to 3 times with 5s gap — handles Render cold start
async function loginWithRetry(payload, maxRetries = 3) {
  let lastError = null;

  for (let attempt = 1; attempt <= maxRetries; attempt++) {
    try {
      statusText.textContent = attempt === 1
        ? "⏳ Connecting to server…"
        : `⏳ Server waking up… attempt ${attempt} of ${maxRetries}`;

      const controller = new AbortController();
      // 30s timeout per attempt — enough for Render cold start
      const timer = setTimeout(() => controller.abort(), 30000);

      const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(payload),
        signal:  controller.signal
      });

      clearTimeout(timer);

      let data = {};
      try { data = await res.json(); } catch { throw new Error("Invalid server response"); }

      return { res, data }; // ✅ success — return immediately

    } catch (err) {
      lastError = err;
      const isAbort = err.name === "AbortError";
      const isFetch = err.message === "Failed to fetch" || err.message === "fetch failed" || err.message === "NetworkError when attempting to fetch resource.";

      if ((isAbort || isFetch) && attempt < maxRetries) {
        // Server is still waking — wait 6s then retry
        statusText.textContent = `⏳ Server is starting up… retrying in 6s (${attempt}/${maxRetries})`;
        await new Promise(r => setTimeout(r, 6000));
        continue;
      }

      throw lastError; // out of retries or non-network error
    }
  }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  hideMessage();

  const emailOrMobile = document.getElementById("emailOrMobile").value.trim();
  const password      = passwordInput.value.trim();

  if (!emailOrMobile || !password) {
    showMessage("Please fill in all fields.", "error");
    return;
  }

  loginBtn.disabled    = true;
  loginBtn.textContent = "Logging in…";
  showWaking();

  try {
    const { res, data } = await loginWithRetry({ emailOrMobile, password });

    if (!res.ok || !data.success) {
      hideStatus();
      showMessage(data.message || "Login failed. Please check your credentials.", "error");
      loginBtn.disabled    = false;
      loginBtn.textContent = "Login";
      return;
    }

    // ✅ Success
    showOnline();
    localStorage.setItem("shopplusLoggedIn", "true");
    localStorage.setItem("shopplusToken",    data.token || "");
    localStorage.setItem("shopplusUser",     JSON.stringify(data.user || {}));

    showMessage("✅ Login successful! Redirecting…", "success");
    setTimeout(() => { window.location.href = "home.html"; }, 1000);

  } catch (err) {
    hideStatus();
    const msg = err?.message || "";

    if (msg.includes("Failed to fetch") || msg.includes("fetch failed") || msg.includes("NetworkError")) {
      showMessage("❌ Could not reach server after 3 attempts. Please check your internet and try again.", "error");
    } else if (err.name === "AbortError") {
      showMessage("❌ Request timed out. Server may be busy — please try again.", "error");
    } else {
      showMessage("❌ " + (msg || "Something went wrong. Please try again."), "error");
    }

    loginBtn.disabled    = false;
    loginBtn.textContent = "Login";
  }
});

/* ===== SILENT PRE-WARM on page load ===== */
// Wakes Render server in background while user fills the form
setTimeout(() => {
  fetch(`${BACKEND_URL}/health`).catch(() => {});
}, 500);
</script>
</body>
</html>
