<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ShopPlus</title>
  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f7f8;
      --bg-2: #efeff2;
      --card-bg: #ffffff;
      --text: #111111;
      --muted: #777777;
      --muted-2: #9b9b9b;
      --primary: #111111;
      --primary-2: #2d2d2d;
      --border: #e9e9ec;
      --soft-border: #f0f0f2;
      --shadow: rgba(0, 0, 0, 0.06);
      --shadow-2: rgba(0, 0, 0, 0.09);
      --input-bg: rgba(17, 17, 17, 0.025);
      --success: #15803d;
      --error: #b91c1c;
      --success-bg: #f0fdf4;
      --success-border: #bbf7d0;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
    }

    [data-theme="dark"] {
      --bg: #0f1115;
      --bg-2: #171a20;
      --card-bg: #161a22;
      --text: #f8fafc;
      --muted: #a1a1aa;
      --muted-2: #8b95a7;
      --primary: #ffffff;
      --primary-2: #d1d5db;
      --border: #232833;
      --soft-border: #1d2330;
      --shadow: rgba(0, 0, 0, 0.25);
      --shadow-2: rgba(0, 0, 0, 0.32);
      --input-bg: rgba(255,255,255,0.025);
      --success: #4ade80;
      --error: #f87171;
      --success-bg: rgba(22, 163, 74, 0.12);
      --success-border: rgba(74, 222, 128, 0.22);
      --error-bg: rgba(239, 68, 68, 0.12);
      --error-border: rgba(248, 113, 113, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 24%, var(--bg) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
    }

    header {
      background: transparent;
      padding: calc(10px + env(safe-area-inset-top)) 10px 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-shell {
      max-width: 520px;
      margin: 0 auto;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 24px;
      padding: 14px 18px;
      box-shadow: 0 8px 24px var(--shadow);
      text-align: center;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.2px;
    }

    [data-theme="dark"] .header-shell {
      background: rgba(22,26,34,0.88);
      border-color: rgba(255,255,255,0.04);
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px 10px 20px;
    }

    .auth-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 420px;
      border-radius: 24px;
      box-shadow: 0 14px 34px var(--shadow);
      border: 1px solid var(--border);
      padding: 22px 18px;
    }

    .auth-card h2 {
      margin: 0 0 8px;
      color: var(--primary);
      text-align: center;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .auth-card p {
      margin: 0 0 20px;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 14px;
      outline: none;
      font-family: inherit;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: var(--primary-2);
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
    }

    [data-theme="dark"] input:focus {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 50px;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      margin: 0;
      width: auto;
      color: var(--muted);
      line-height: 1;
      user-select: none;
    }

    .toggle-password:hover {
      transform: translateY(-50%);
      opacity: 0.8;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(120deg, #111111, #2d2d2d);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      margin-top: 8px;
      font-family: inherit;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    [data-theme="dark"] button[type="submit"] {
      background: linear-gradient(120deg, #ffffff, #e5e7eb);
      color: #111111;
      box-shadow: 0 12px 24px rgba(255, 255, 255, 0.08);
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      font-size: 0.88rem;
      text-align: center;
      font-weight: 600;
      line-height: 1.6;
      min-height: 22px;
      word-break: break-word;
      padding: 0;
      border-radius: 14px;
    }

    .message.success {
      color: var(--success);
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      padding: 12px 14px;
    }

    .message.error {
      color: var(--error);
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      padding: 12px 14px;
    }

    .link-text {
      margin-top: 18px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .link-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .link-text a:hover {
      opacity: 0.8;
    }

    footer {
      text-align: center;
      color: var(--muted);
      background: transparent;
      padding: 10px 12px calc(18px + env(safe-area-inset-bottom));
      font-size: 13px;
      font-weight: 600;
    }

    @media (max-width: 520px) {
      .container {
        padding: 12px 10px 18px;
      }

      .auth-card {
        padding: 18px 14px;
        border-radius: 20px;
      }

      header {
        padding: calc(10px + env(safe-area-inset-top)) 10px 8px;
      }

      .header-shell {
        font-size: 1rem;
        padding: 12px 14px;
        border-radius: 20px;
      }

      .auth-card h2 {
        font-size: 1.45rem;
      }

      input {
        border-radius: 12px;
      }

      button[type="submit"] {
        border-radius: 14px;
        min-height: 50px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-shell">ShopPlus - Welcome Back</div>
  </header>

  <div class="container">
    <div class="auth-card">
      <h2>Login</h2>
      <p>Login with your Email or Mobile Number</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="emailOrMobile">Email or Mobile Number</label>
          <input type="text" id="emailOrMobile" placeholder="Enter email or mobile number" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required />
            <button type="button" id="togglePassword" class="toggle-password" aria-label="Show password">👁️</button>
          </div>
        </div>

        <button type="submit" id="loginBtn">Login</button>
      </form>

      <div id="message" class="message"></div>

      <div class="link-text">
        New user? <a href="signup.html">Create Account</a>
      </div>
    </div>
  </div>

  <footer>© 2026 ShopPlus. All rights reserved.</footer>

  <script>
    const BACKEND_URL = "https://my-store-e28j.onrender.com";

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");
    const passwordInput = document.getElementById("password");
    const togglePasswordBtn = document.getElementById("togglePassword");

    function showMessage(text, type = "error") {
      message.textContent = text;
      message.className = "message";
      message.classList.add(type);
    }

    function resetButton() {
      loginBtn.disabled = false;
      loginBtn.textContent = "Login";
    }

    // SHOW / HIDE PASSWORD
    togglePasswordBtn.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";

      if (isPassword) {
        passwordInput.type = "text";
        togglePasswordBtn.textContent = "🙈";
        togglePasswordBtn.setAttribute("aria-label", "Hide password");
      } else {
        passwordInput.type = "password";
        togglePasswordBtn.textContent = "👁️";
        togglePasswordBtn.setAttribute("aria-label", "Show password");
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const emailOrMobile = document.getElementById("emailOrMobile").value.trim();
      const password = passwordInput.value.trim();

      message.textContent = "";
      message.className = "message";

      if (!emailOrMobile || !password) {
        showMessage("Please fill in all fields.", "error");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      try {
        const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ emailOrMobile, password })
        });

        let data = {};
        try {
          data = await res.json();
        } catch (jsonError) {
          console.error("Invalid JSON response:", jsonError);
          throw new Error("Server returned invalid response");
        }

        if (!res.ok || !data.success) {
          showMessage(data.message || "Login failed. Please try again.", "error");
          resetButton();
          return;
        }

        // Save login state + token + user
        localStorage.setItem("shopplusLoggedIn", "true");
        localStorage.setItem("shopplusToken", data.token || "");
        localStorage.setItem("shopplusUser", JSON.stringify(data.user || {}));

        showMessage("Login successful! Redirecting...", "success");

        setTimeout(() => {
          window.location.href = "home.html";
        }, 1200);

      } catch (error) {
        console.error("Login error:", error);
        showMessage("Server not reachable or something went wrong. Please try again.", "error");
        resetButton();
      }
    });
  </script>
</body>
</html>
