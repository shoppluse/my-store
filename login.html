<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ShopPlus</title>

  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#0047ab" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg: #f8f9fb;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --muted: #64748b;
      --primary: #0047ab;
      --primary-2: #0099ff;
      --border: #d8e3f2;
      --input-bg: #f2f4fc;
      --success: #2e7d32;
      --error: #d32f2f;
      --shadow: rgba(0, 71, 171, 0.14);
    }

    [data-theme="dark"] {
      --bg: #121212;
      --card-bg: #1c1c2b;
      --text: #eaeaea;
      --muted: #94a3b8;
      --primary: #66b0ff;
      --primary-2: #3a8dde;
      --border: #1e3a8a;
      --input-bg: #0f172a;
      --shadow: rgba(51, 153, 255, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* HOME.HTML STYLE HEADER */
    .main-header {
      background: var(--gradient);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(18px + env(safe-area-inset-top)) 16px 20px;
      box-shadow: 0 6px 20px var(--shadow);
      gap: 14px;
    }

    .shopplus-logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      background: #ffffff;
      padding: 10px 22px;
      border-radius: 18px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      max-width: 700px;
    }

    .shopplus-logo .plus {
      color: var(--primary-2);
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1;
    }

    .header-actions {
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .header-btn,
    .dark-mode-toggle {
      width: 100%;
      min-height: 64px;
      text-decoration: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: inherit;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: none;
      backdrop-filter: blur(4px);
    }

    .header-btn:hover,
    .dark-mode-toggle:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.22);
    }

    .dark-mode-toggle {
      font-size: 1.5rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 24px;
    }

    .auth-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 420px;
      border-radius: 22px;
      box-shadow: 0 14px 36px var(--shadow);
      padding: 28px 24px;
      border: 1px solid var(--border);
    }

    .auth-card h2 {
      margin: 0 0 8px;
      color: var(--primary);
      text-align: center;
      font-size: 28px;
    }

    .auth-card p {
      margin: 0 0 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 15px;
      outline: none;
      font-family: inherit;
      color: var(--text);
    }

    input:focus {
      border-color: var(--primary-2);
      box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.12);
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--gradient);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      margin-top: 8px;
      font-family: inherit;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      font-weight: 600;
      line-height: 1.5;
      min-height: 22px;
      word-break: break-word;
    }

    .success {
      color: var(--success);
    }

    .error {
      color: var(--error);
    }

    .link-text {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .link-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .footer {
      background: var(--gradient);
      color: white;
      text-align: center;
      padding: 14px 10px;
      font-size: 14px;
      margin-top: auto;
    }

    @media (max-width: 700px) {
      .main-header {
        padding: calc(14px + env(safe-area-inset-top)) 12px 18px;
        gap: 12px;
      }

      .shopplus-logo {
        font-size: 1.35rem;
        padding: 8px 14px;
        border-radius: 16px;
      }

      .shopplus-logo .plus {
        font-size: 1.7rem;
      }

      .header-actions {
        gap: 10px;
      }

      .header-btn,
      .dark-mode-toggle {
        min-height: 58px;
        font-size: 0.82rem;
        padding: 10px 6px;
        border-radius: 14px;
      }

      .dark-mode-toggle {
        font-size: 1.25rem;
      }

      .container {
        padding: 16px;
      }

      .auth-card {
        padding: 22px 18px;
        border-radius: 18px;
      }

      .auth-card h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="main-header">
    <a href="./index.html" class="shopplus-logo">Shop<span class="plus">+</span></a>

    <div class="header-actions">
      <a href="./signup.html" class="header-btn">Create Account</a>
      <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <div class="container">
    <div class="auth-card">
      <h2>Login</h2>
      <p>Login with your Email or Mobile Number</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="emailOrMobile">Email or Mobile Number</label>
          <input type="text" id="emailOrMobile" placeholder="Enter email or mobile number" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" id="loginBtn">Login</button>
      </form>

      <div id="message" class="message"></div>

      <div class="link-text">
        New user? <a href="./signup.html">Create Account</a>
      </div>
    </div>
  </div>

  <div class="footer">© 2026 ShopPlus. All rights reserved.</div>

  <script>
    const BACKEND_URL = "https://my-store-e28j.onrender.com";

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");

    // DARK MODE
    const htmlEl = document.documentElement;
    const darkToggleBtn = document.getElementById("darkModeToggle");
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
      htmlEl.setAttribute("data-theme", savedTheme);
      darkToggleBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
    }

    darkToggleBtn.addEventListener("click", () => {
      const currentTheme = htmlEl.getAttribute("data-theme");

      if (currentTheme === "dark") {
        htmlEl.setAttribute("data-theme", "light");
        localStorage.setItem("theme", "light");
        darkToggleBtn.textContent = "🌙";
      } else {
        htmlEl.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        darkToggleBtn.textContent = "☀️";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.textContent = "";
      message.className = "message";
      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      const emailOrMobile = document.getElementById("emailOrMobile").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ emailOrMobile, password })
        });

        const data = await res.json();

        if (!res.ok) {
          message.textContent = data.message || "Login failed";
          message.classList.add("error");
          loginBtn.disabled = false;
          loginBtn.textContent = "Login";
          return;
        }

        // Save login state and user data
        localStorage.setItem("shopplusLoggedIn", "true");
        localStorage.setItem("shopplusUser", JSON.stringify(data.user));

        message.textContent = "Login successful! Redirecting...";
        message.classList.add("success");

        setTimeout(() => {
          window.location.href = "./home.html";
        }, 1500);

      } catch (error) {
        message.textContent = "Something went wrong. Please try again.";
        message.classList.add("error");
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });

    // SERVICE WORKER
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
          .then((registration) => {
            console.log("Service Worker registered:", registration.scope);
          })
          .catch((error) => {
            console.error("Service Worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
