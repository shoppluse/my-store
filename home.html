<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shopplus</title>

<link rel="manifest" href="/my-store/manifest.json" />
<meta name="theme-color" content="#0047ab" />
<link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
<link rel="icon" href="/my-store/icons/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

<!-- LOGIN PROTECTION -->
<script>
  const isLoggedIn = localStorage.getItem("shopplusLoggedIn");
  const currentUser = localStorage.getItem("shopplusUser");

  if (isLoggedIn !== "true" || !currentUser) {
    window.location.href = "login.html";
  }
</script>

<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
    --bg: #f5f7fb;
    --bg-deep: #0e1a39;
    --card-bg: #ffffff;
    --text: #1f1f1f;
    --muted: #64748b;
    --primary: #0047ab;
    --primary-2: #0099ff;
    --border: #dbe7ff;
    --shadow: rgba(0, 71, 171, 0.14);
    --product-border: #2f80ed;
    --product-name-red: #d62828;
    --rating-color: #ff9800;
  }

  body {
    font-family: 'Poppins', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .main-header {
    background: var(--gradient);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(12px + env(safe-area-inset-top)) 12px 14px;
    box-shadow: 0 4px 14px var(--shadow);
    gap: 10px;
  }

  .shopplus-logo {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
    background: #ffffff;
    padding: 8px 16px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    max-width: 700px;
    min-height: 52px;
  }

  .shopplus-logo .plus {
    color: var(--primary-2);
    font-size: 1.9rem;
    font-weight: 900;
    line-height: 1;
  }

  .header-actions {
    width: 100%;
    max-width: 700px;
    display: grid;
    grid-template-columns: 1.5fr 0.9fr;
    gap: 10px;
    align-items: stretch;
  }

  .header-btn,
  .brand-toggle-btn {
    width: 100%;
    min-height: 54px;
    text-decoration: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 10px 8px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: inherit;
    cursor: pointer;
    transition: 0.25s ease;
    backdrop-filter: blur(4px);
    outline: none;
  }

  .header-btn:hover,
  .brand-toggle-btn:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.22);
  }

  .icon-only-btn {
    font-size: 1.45rem;
    padding: 0;
  }

  .profile-btn {
    font-size: 1.45rem;
  }

  .brand-filter-wrapper {
    position: relative;
    width: 100%;
  }

  .brand-toggle-btn {
    gap: 8px;
  }

  .brand-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    width: 100%;
    min-width: 170px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    z-index: 1000;
    padding: 8px 0;
    max-height: 300px;
    overflow-y: auto;
  }

  .brand-dropdown.hidden {
    display: none;
  }

  .brand-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: background 0.2s ease;
  }

  .brand-item:hover {
    background: rgba(0, 153, 255, 0.1);
  }

  .brand-item.active {
    background: rgba(0, 153, 255, 0.14);
    color: var(--primary);
    font-weight: 700;
  }

  .search-section {
    background: var(--bg-deep);
    padding: 14px 12px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .search-form {
    width: 100%;
    max-width: 700px;
    display: flex;
  }

  .search-form input {
    width: 100%;
    border-radius: 16px;
    border: none;
    padding: 13px 14px;
    font-size: 15px;
    outline: none;
    font-family: inherit;
  }

  .category-icons {
    margin: 12px 0 0;
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-wrap: nowrap;
    justify-content: flex-start;
    gap: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 2px 2px 8px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .category-icons::-webkit-scrollbar {
    display: none;
  }

  .category-icons {
    scrollbar-width: none;
  }

  .category-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    border-radius: 50%;
    width: 74px;
    height: 74px;
    min-width: 74px;
    min-height: 74px;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
    cursor: pointer;
    transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
    color: #1f1f1f;
    flex-shrink: 0;
    padding: 7px;
  }

  .category-icon.selected,
  .category-icon:hover {
    background: var(--primary-2);
    color: white;
    transform: scale(1.05);
    box-shadow: 0 8px 18px rgba(0, 153, 255, 0.24);
  }

  .category-icon svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
    flex-shrink: 0;
  }

  .category-label {
    font-size: 0.66rem;
    margin-top: 4px;
    font-weight: 700;
    color: inherit;
    text-align: center;
    line-height: 1.05;
    max-width: 62px;
    white-space: normal;
    word-break: break-word;
  }

  /* APP SHORTCUTS */
  .app-shortcuts-section {
    width: 100%;
    max-width: 1280px;
    margin: 10px auto 4px;
    padding: 0 12px;
  }

  .app-shortcuts-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--primary);
    margin: 0 0 8px;
  }

  .app-shortcuts-row {
    display: flex;
    flex-wrap: nowrap;
    gap: 16px;
    align-items: flex-start;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 4px 2px 8px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .app-shortcuts-row::-webkit-scrollbar {
    display: none;
  }

  .app-shortcuts-row {
    scrollbar-width: none;
  }

  .app-shortcut-card {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    flex: 0 0 auto;
    min-width: 82px;
    max-width: 82px;
    padding: 2px 0;
    background: transparent;
    border: none;
    box-shadow: none;
  }

  .app-shortcut-logo-wrap {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    background: #eef4ff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 5px;
    padding: 7px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .app-shortcut-card:hover .app-shortcut-logo-wrap {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0, 71, 171, 0.14);
  }

  .app-shortcut-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .app-shortcut-name {
    font-size: 0.74rem;
    font-weight: 700;
    text-align: center;
    color: var(--primary);
    line-height: 1.1;
    word-break: break-word;
  }

  .app-shortcut-fallback {
    min-width: 100%;
    text-align: center;
    padding: 10px;
    color: var(--muted);
    font-weight: 600;
  }

  /* PRODUCTS */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    padding: 8px 6px 18px;
    max-width: 1280px;
    margin: 0 auto;
    min-height: 300px;
  }

  .product-card {
    background: #ffffff;
    border: 1.4px solid var(--product-border);
    border-radius: 10px;
    box-shadow: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    transition: transform 0.18s ease, opacity 0.25s ease;
    opacity: 0;
    transform: translateY(8px);
    min-height: auto;
    text-decoration: none;
    overflow: hidden;
  }

  .product-card:hover {
    transform: translateY(-2px);
  }

  .product-image-box {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #ffffff;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    margin-bottom: 0;
    overflow: hidden;
  }

  .product-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .product-info {
    padding: 6px 6px 8px;
    border-top: 1px solid rgba(47, 128, 237, 0.18);
  }

  .product-card h2 {
    font-size: 13px;
    font-weight: 700;
    color: var(--product-name-red);
    margin: 0 0 4px;
    text-align: center;
    line-height: 1.2;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .product-rating {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--rating-color);
    line-height: 1.1;
  }

  .loading-text,
  .empty-text,
  .error-text {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    grid-column: 1 / -1;
    margin-top: 40px;
  }

  .loading-text { color: #666; }
  .empty-text { color: #888; }
  .error-text { color: red; }

  .token-box {
    display: none;
    max-width: 1200px;
    margin: 0 auto 20px;
    padding: 16px;
    background: #fff3cd;
    color: #333;
    border: 1px solid #ffeeba;
    border-radius: 12px;
    font-family: monospace;
    font-size: 12px;
    word-break: break-all;
  }

  /* TABLET */
  @media (min-width: 701px) and (max-width: 1024px) {
    .product-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 10px 10px 22px;
    }

    .app-shortcuts-section {
      padding: 0 16px;
    }
  }

  /* LAPTOP / DESKTOP */
  @media (min-width: 1025px) {
    .main-header {
      padding: 10px 18px 14px;
      gap: 12px;
    }

    .shopplus-logo {
      max-width: 680px;
    }

    .header-actions {
      max-width: 680px;
    }

    .search-form,
    .category-icons {
      max-width: 680px;
    }

    .app-shortcuts-section {
      max-width: 1280px;
      padding: 0 18px;
      margin-top: 12px;
    }

    .app-shortcuts-title {
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .app-shortcuts-row {
      gap: 20px;
      padding-bottom: 10px;
    }

    .app-shortcut-card {
      min-width: 90px;
      max-width: 90px;
    }

    .app-shortcut-logo-wrap {
      width: 58px;
      height: 58px;
    }

    .product-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      padding: 12px 18px 28px;
      max-width: 1280px;
    }

    .product-card h2 {
      font-size: 14px;
      min-height: 36px;
    }

    .product-rating {
      font-size: 12px;
    }
  }

  /* MOBILE */
  @media (max-width: 700px) {
    .main-header {
      padding: calc(12px + env(safe-area-inset-top)) 12px 14px;
      gap: 10px;
    }

    .shopplus-logo {
      font-size: 1.3rem;
      padding: 8px 14px;
      border-radius: 16px;
      min-height: 50px;
    }

    .shopplus-logo .plus {
      font-size: 1.6rem;
    }

    .header-actions {
      gap: 10px;
      grid-template-columns: 1.45fr 0.9fr;
    }

    .header-btn,
    .brand-toggle-btn {
      min-height: 50px;
      font-size: 0.82rem;
      padding: 8px 6px;
      border-radius: 14px;
    }

    .icon-only-btn,
    .profile-btn {
      font-size: 1.35rem;
    }

    .brand-dropdown {
      width: 100%;
    }

    .search-section {
      padding: 14px 12px 12px;
    }

    .search-form input {
      padding: 12px 14px;
      font-size: 14px;
      border-radius: 14px;
    }

    .category-icons {
      gap: 10px;
      margin-top: 12px;
      padding: 2px 2px 6px;
    }

    .category-icon {
      width: 70px;
      height: 70px;
      min-width: 70px;
      min-height: 70px;
      padding: 6px;
    }

    .category-icon svg {
      width: 20px;
      height: 20px;
    }

    .category-label {
      font-size: 0.62rem;
      margin-top: 4px;
      max-width: 58px;
    }

    .app-shortcuts-section {
      padding: 0 10px;
      margin-top: 8px;
      margin-bottom: 2px;
    }

    .app-shortcuts-title {
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .app-shortcuts-row {
      gap: 14px;
      padding-bottom: 6px;
    }

    .app-shortcut-card {
      min-width: 76px;
      max-width: 76px;
    }

    .app-shortcut-logo-wrap {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      margin-bottom: 4px;
      padding: 6px;
    }

    .app-shortcut-name {
      font-size: 0.68rem;
      line-height: 1.05;
    }

    .product-grid {
      gap: 6px;
      padding: 6px 4px 14px;
    }

    .product-card {
      border-radius: 8px;
      border-width: 1.2px;
    }

    .product-image-box {
      padding: 3px;
    }

    .product-info {
      padding: 5px 5px 7px;
    }

    .product-card h2 {
      font-size: 12px;
      min-height: 30px;
      line-height: 1.15;
      margin-bottom: 3px;
    }

    .product-rating {
      font-size: 10px;
    }
  }
</style>
</head>

<body>
  <div class="main-header">
    <a href="home.html" class="shopplus-logo">Shop<span class="plus">+</span></a>

    <div class="header-actions" id="headerActions">
      <!-- BRAND -->
      <div class="brand-filter-wrapper">
        <button id="brandToggleBtn" class="brand-toggle-btn" type="button">
          <span id="brandBtnText">🏷️ Brand</span>
          <span id="brandArrow">▼</span>
        </button>

        <div id="brandDropdown" class="brand-dropdown hidden">
          <div class="brand-item active" data-brand="all">All Brands</div>
          <div class="brand-item" data-brand="Apple">Apple</div>
          <div class="brand-item" data-brand="Samsung">Samsung</div>
          <div class="brand-item" data-brand="Nike">Nike</div>
          <div class="brand-item" data-brand="Puma">Puma</div>
          <div class="brand-item" data-brand="Boat">Boat</div>
          <div class="brand-item" data-brand="Adidas">Adidas</div>
          <div class="brand-item" data-brand="Sony">Sony</div>
          <div class="brand-item" data-brand="Realme">Realme</div>
          <div class="brand-item" data-brand="OnePlus">OnePlus</div>
        </div>
      </div>

      <!-- PROFILE -->
      <a href="profile.html" class="header-btn icon-only-btn profile-btn" title="Profile">👤</a>
    </div>
  </div>

  <div class="search-section">
    <form class="search-form" onsubmit="event.preventDefault();">
      <input id="searchBar" type="text" placeholder="Search for phones, gadgets, etc." />
    </form>

    <div class="category-icons" id="categoryBar"></div>
  </div>

  <!-- APP SHORTCUTS -->
  <section class="app-shortcuts-section">
    <h2 class="app-shortcuts-title">Top Shopping Apps</h2>
    <div class="app-shortcuts-row" id="appShortcutsRow">
      <div class="app-shortcut-fallback">Loading app shortcuts...</div>
    </div>
  </section>

  <div class="product-grid" id="product-list">
    <p class="loading-text">Loading products...</p>
  </div>

  <div id="tokenBox" class="token-box">
    <strong>FCM Token:</strong>
    <div id="tokenText" style="margin-top: 10px;"></div>
  </div>

<script>
  const categories = [
    { name: 'Overall', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>' },
    { name: 'Electronics', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="7" y="4" width="10" height="4" rx="1"/><rect x="9" y="10" width="6" height="10" rx="2"/></svg>' },
    { name: 'Fashion', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 4h10v14H7z"/><ellipse cx="12" cy="18" rx="4" ry="2" /></svg>' },
    { name: 'Home', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9v9a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3z"/></svg>' },
    { name: 'Accessories', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="8" cy="12" r="1"/><circle cx="16" cy="12" r="1"/></svg>' },
    { name: 'Sports', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4l3 7h7l-5 5 2 7-6-4-6 4 2-7-5-5h7z"/></svg>' },
    { name: 'Beauty', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/><path d="M12 18v6M12 6V0"/></svg>' },
    { name: 'Gadgets', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2"/><circle cx="12" cy="21" r="1"/></svg>' }
  ];

  const categoryBar = document.getElementById('categoryBar');
  const searchInput = document.getElementById('searchBar');
  const productList = document.getElementById('product-list');
  const appShortcutsRow = document.getElementById('appShortcutsRow');

  const brandToggleBtn = document.getElementById('brandToggleBtn');
  const brandDropdown = document.getElementById('brandDropdown');
  const brandArrow = document.getElementById('brandArrow');
  const brandBtnText = document.getElementById('brandBtnText');
  const brandItems = document.querySelectorAll('.brand-item');

  let selectedCategory = 'Overall';
  let allProducts = [];

  function createCategoryIcon(cat) {
    const el = document.createElement('div');
    el.className = 'category-icon' + (cat.name === selectedCategory ? ' selected' : '');
    el.setAttribute('data-cat', cat.name);
    el.innerHTML = cat.icon + '<div class="category-label">' + cat.name + '</div>';

    el.addEventListener('click', () => {
      if (selectedCategory === cat.name) return;
      selectedCategory = cat.name;
      updateCategorySelection();
      filterProducts();
    });

    return el;
  }

  function updateCategorySelection() {
    Array.from(categoryBar.children).forEach(el => {
      el.classList.toggle('selected', el.getAttribute('data-cat') === selectedCategory);
    });
  }

  categories.forEach(cat => categoryBar.appendChild(createCategoryIcon(cat)));

  searchInput.addEventListener('input', () => {
    selectedCategory = 'Overall';
    updateCategorySelection();
    syncBrandSelectionFromSearch();
    filterProducts();
  });

  async function loadAppShortcuts() {
    try {
      const response = await fetch("/my-store/apps.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`apps.json error: ${response.status}`);

      const apps = await response.json();

      if (!Array.isArray(apps)) {
        throw new Error("apps.json must contain an array");
      }

      if (apps.length === 0) {
        appShortcutsRow.innerHTML = '<div class="app-shortcut-fallback">No apps added yet.</div>';
        return;
      }

      appShortcutsRow.innerHTML = '';

      apps.forEach(app => {
        const appCard = document.createElement('a');
        appCard.className = 'app-shortcut-card';
        appCard.href = app.link || '#';

        if (/^https?:\/\//i.test(app.link || '')) {
          appCard.target = '_blank';
          appCard.rel = 'noopener noreferrer';
        }

        appCard.innerHTML = `
          <div class="app-shortcut-logo-wrap">
            <img src="${app.image || 'https://via.placeholder.com/100'}" alt="${app.name || 'App'}" class="app-shortcut-logo" />
          </div>
          <div class="app-shortcut-name">${app.name || 'App'}</div>
        `;

        appShortcutsRow.appendChild(appCard);
      });
    } catch (error) {
      console.error("apps.json fetch error:", error);
      appShortcutsRow.innerHTML = '<div class="app-shortcut-fallback">Error loading app shortcuts.</div>';
    }
  }

  async function loadProducts() {
    try {
      const response = await fetch("/my-store/products.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`JSON error: ${response.status}`);

      const data = await response.json();

      if (!Array.isArray(data)) {
        throw new Error("products.json must contain an array");
      }

      // 🔥 LATEST ADDED PRODUCT FIRST
      const latestFirstData = [...data].reverse();

      allProducts = latestFirstData.map((p, index) => ({
        id: p.id ?? (index + 1),
        name: p.name || 'Unnamed Product',
        price: p.price ?? 0,
        image: p.image || (Array.isArray(p.images) && p.images.length ? p.images[0] : 'https://via.placeholder.com/200'),
        description: p.description || 'No description available.',
        category: p.category || 'Overall',
        brand: p.brand || '',
        rating: p.rating ?? 4.0,
        link: p.link || '#'
      }));

      displayProducts(allProducts);
    } catch (err) {
      productList.innerHTML = '<p class="error-text">Error loading products from products.json.<br>Please check file path and JSON format.</p>';
      console.error('products.json fetch error:', err);
    }
  }

  function displayProducts(products) {
    if (products.length === 0) {
      productList.innerHTML = '<p class="empty-text">No products found.</p>';
      return;
    }

    productList.innerHTML = '';

    products.forEach((p, i) => {
      const card = document.createElement('a');
      card.className = 'product-card';
      card.style.opacity = 0;
      card.href = `product.html?id=${encodeURIComponent(p.id)}`;

      const ratingValue = Number(p.rating || 4.0).toFixed(1);

      card.innerHTML = `
        <div class="product-image-box">
          <img src="${p.image}" alt="${p.name}" />
        </div>
        <div class="product-info">
          <h2>${p.name}</h2>
          <div class="product-rating">${ratingValue} ⭐</div>
        </div>
      `;

      productList.appendChild(card);

      setTimeout(() => {
        card.style.opacity = 1;
        card.style.transform = 'translateY(0)';
      }, i * 40);
    });
  }

  function filterProducts() {
    const searchText = searchInput.value.trim().toLowerCase();
    let filtered = [...allProducts];

    if (selectedCategory !== 'Overall') {
      filtered = filtered.filter(p => (p.category || '').toLowerCase() === selectedCategory.toLowerCase());
    }

    if (searchText.length > 0) {
      filtered = filtered.filter(p =>
        (p.name || '').toLowerCase().includes(searchText) ||
        (p.description || '').toLowerCase().includes(searchText) ||
        (p.brand || '').toLowerCase().includes(searchText)
      );
    }

    displayProducts(filtered);
  }

  function setActiveBrand(selectedBrand) {
    brandItems.forEach(item => {
      item.classList.toggle('active', item.getAttribute('data-brand').toLowerCase() === selectedBrand.toLowerCase());
    });
  }

  function syncBrandSelectionFromSearch() {
    const searchText = searchInput.value.trim().toLowerCase();

    let matchedBrand = 'all';
    brandItems.forEach(item => {
      const brand = item.getAttribute('data-brand').toLowerCase();
      if (brand !== 'all' && brand === searchText) {
        matchedBrand = brand;
      }
    });

    setActiveBrand(matchedBrand);

    if (matchedBrand === 'all') {
      brandBtnText.textContent = '🏷️ Brand';
    } else {
      const activeItem = Array.from(brandItems).find(item => item.getAttribute('data-brand').toLowerCase() === matchedBrand);
      brandBtnText.textContent = `🏷️ ${activeItem.getAttribute('data-brand')}`;
    }
  }

  brandToggleBtn.addEventListener('click', () => {
    brandDropdown.classList.toggle('hidden');
    brandArrow.textContent = brandDropdown.classList.contains('hidden') ? '▼' : '▲';
  });

  brandItems.forEach(item => {
    item.addEventListener('click', () => {
      const selectedBrand = item.getAttribute('data-brand');

      setActiveBrand(selectedBrand);

      if (selectedBrand === 'all') {
        searchInput.value = '';
        brandBtnText.textContent = '🏷️ Brand';
      } else {
        searchInput.value = selectedBrand;
        brandBtnText.textContent = `🏷️ ${selectedBrand}`;
      }

      selectedCategory = 'Overall';
      updateCategorySelection();

      searchInput.dispatchEvent(new Event('input'));

      brandDropdown.classList.add('hidden');
      brandArrow.textContent = '▼';
    });
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.brand-filter-wrapper')) {
      brandDropdown.classList.add('hidden');
      brandArrow.textContent = '▼';
    }
  });

  window.addEventListener("DOMContentLoaded", () => {
    loadAppShortcuts();
    loadProducts();
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
        .then((registration) => {
          console.log("Service Worker registered:", registration.scope);
        })
        .catch((error) => {
          console.error("Service Worker registration failed:", error);
        });
    });
  }
</script>
