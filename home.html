<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shop+</title>
<link rel="manifest" href="/my-store/manifest.json" />
<meta name="theme-color" content="#0047ab" />
<link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --gradient-light: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
    --bg-light: #f8f9fb;
    --bg-deep-light: #0e1a39;
    --text-dark-light: #1f1f1f;
    --accent-light: #0099ff;
    --accent-dark-light: #0047ab;
    --logo-bg-light: #fff;
    --logo-shadow-light: rgba(0, 71, 171, 0.12);
    --btn-bg-view: #43a047;
    --btn-bg-view-hover: #38733b;
    --btn-bg-buy: #0099ff;
    --btn-bg-buy-hover: #006cc0;
    --card-bg-dark: #1c1c2b;
  }

  [data-theme="dark"] {
    --gradient-light: linear-gradient(120deg, #1a1a2e 60%, #16213e 100%);
    --bg-light: #121212;
    --bg-deep-light: #16213e;
    --text-dark-light: #eaeaea;
    --accent-light: #66b0ff;
    --accent-dark-light: #3a8dde;
    --logo-bg-light: #222;
    --logo-shadow-light: rgba(51, 153, 255, 0.35);
    --btn-bg-view: #2abf6a;
    --btn-bg-view-hover: #1e8f3f;
    --btn-bg-buy: #3a8dde;
    --btn-bg-buy-hover: #2a5e9d;
  }

  body {
    font-family: 'Poppins', Arial, sans-serif;
    background: var(--bg-light);
    color: var(--text-dark-light);
    margin: 0;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
    overflow-x: hidden;
  }

  .main-header {
    background: var(--gradient-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px;
    box-shadow: 0 4px 12px var(--logo-shadow-light);
    gap: 12px;
    flex-wrap: wrap;
  }

  .shopplus-logo {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent-dark-light);
    background: var(--logo-bg-light);
    padding: 10px 18px;
    border-radius: 16px;
    letter-spacing: 0.4px;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-decoration: none;
    max-width: 100%;
    width: fit-content;
    box-shadow: 0 4px 12px var(--logo-shadow-light);
  }

  .shopplus-logo .plus {
    color: var(--accent-light);
    font-size: 2.4rem;
    font-weight: 900;
    margin-left: 2px;
    user-select: none;
    line-height: 1;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    width: 100%;
    justify-content: flex-end;
  }

  .profile-btn,
  .install-btn {
    text-decoration: none;
    background: var(--logo-bg-light);
    color: var(--accent-dark-light);
    font-weight: 700;
    font-size: 0.95rem;
    padding: 10px 18px;
    border-radius: 12px;
    box-shadow: 0 4px 12px var(--logo-shadow-light);
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: none;
    font-family: inherit;
    cursor: pointer;
  }

  .profile-btn:hover,
  .install-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0, 71, 171, 0.18);
  }

  .install-btn {
    display: none;
  }

  .dark-mode-toggle {
    cursor: pointer;
    font-size: 1.15rem;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    padding: 10px 14px;
    border-radius: 12px;
    transition: background 0.25s ease, transform 0.25s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 48px;
    min-height: 44px;
  }

  .dark-mode-toggle:hover {
    background: rgba(255,255,255,0.22);
    transform: translateY(-2px);
  }

  .search-section {
    background: var(--bg-deep-light);
    padding: 28px 20px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .search-form {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 12px;
  }

  .search-form input {
    flex-grow: 1;
    border-radius: 12px;
    border: none;
    padding: 14px 16px;
    font-size: 16px;
    outline: none;
    font-family: inherit;
  }

  .category-icons {
    margin: 18px 0 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    max-width: 900px;
  }

  .category-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg-light);
    border-radius: 50%;
    width: 68px;
    height: 68px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    cursor: pointer;
    transition: background 0.25s ease, transform 0.2s ease;
    user-select: none;
    color: var(--text-dark-light);
    flex-shrink: 0;
  }

  .category-icon.selected,
  .category-icon:hover {
    background: var(--accent-light);
    color: white;
    transform: scale(1.08);
  }

  .category-icon svg {
    width: 28px;
    height: 28px;
    fill: currentColor;
  }

  .category-label {
    font-size: 0.68rem;
    margin-top: 4px;
    font-weight: 600;
    color: inherit;
    text-align: center;
    line-height: 1.1;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
    padding: 24px 24px 48px;
    max-width: 1280px;
    margin: 0 auto;
    min-height: 300px;
  }

  @media (max-width: 1100px) {
    .product-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 780px) {
    .product-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  .product-card {
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 6px 20px rgba(0, 71, 171, 0.12);
    padding: 16px 14px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.35s ease, box-shadow 0.35s ease, opacity 0.35s ease;
    opacity: 0;
    transform: translateY(20px);
    min-height: 340px;
  }

  .product-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 36px rgba(0, 71, 171, 0.22);
  }

  .product-card img {
    width: 100%;
    height: 190px;
    object-fit: contain;
    border-radius: 12px;
    background: #f2f4fc;
    padding: 10px;
    margin-bottom: 14px;
  }

  .product-card h2 {
    font-size: 17px;
    font-weight: 600;
    color: var(--accent-dark-light);
    margin: 0 0 14px;
    text-align: center;
    line-height: 1.3;
    min-height: 44px;
  }

  .card-actions {
    margin-top: auto;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 11px 8px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
    border: none;
    outline: none;
    transition: background-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    user-select: none;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    font-family: inherit;
  }

  .btn:hover {
    transform: translateY(-2px);
  }

  .view-details {
    background-color: var(--btn-bg-view);
    color: white;
  }

  .view-details:hover {
    background-color: var(--btn-bg-view-hover);
  }

  .buy-now {
    background-color: var(--btn-bg-buy);
    color: white;
  }

  .buy-now:hover {
    background-color: var(--btn-bg-buy-hover);
  }

  .loading-text,
  .empty-text,
  .error-text {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    grid-column: 1 / -1;
    margin-top: 40px;
  }

  .loading-text { color: #666; }
  .empty-text { color: #888; }
  .error-text { color: red; }

  /* MOBILE PREMIUM */
  @media (max-width: 600px) {
    .main-header {
      padding: 12px;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      overflow: hidden;
    }

    .shopplus-logo {
      width: 100%;
      max-width: 100%;
      font-size: 1.35rem;
      padding: 10px 12px;
      border-radius: 14px;
      justify-content: center;
      text-align: center;
    }

    .shopplus-logo .plus {
      font-size: 1.9rem;
      margin-left: 2px;
    }

    .header-actions {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 56px;
      gap: 10px;
      align-items: stretch;
      justify-content: stretch;
    }

    .profile-btn {
      width: 100%;
      min-width: 0;
      min-height: 46px;
      font-size: 0.95rem;
      padding: 12px 10px;
      border-radius: 12px;
    }

    .dark-mode-toggle {
      width: 56px;
      min-width: 56px;
      max-width: 56px;
      min-height: 46px;
      font-size: 1.1rem;
      padding: 0;
      border-radius: 12px;
    }

    .install-btn {
      grid-column: 1 / -1;
      width: 100%;
      min-height: 46px;
      font-size: 0.9rem;
      padding: 12px 10px;
      border-radius: 12px;
      display: none;
    }

    .search-section {
      padding: 18px 14px 16px;
    }

    .search-form {
      max-width: 100%;
      gap: 10px;
    }

    .search-form input {
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 12px;
    }

    .category-icons {
      gap: 12px;
      margin-top: 16px;
    }

    .category-icon {
      width: 60px;
      height: 60px;
    }

    .category-icon svg {
      width: 24px;
      height: 24px;
    }

    .category-label {
      font-size: 0.62rem;
      margin-top: 3px;
    }

    .product-grid {
      padding: 16px 12px 28px;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .product-card {
      min-height: 280px;
      padding: 12px 10px 14px;
      border-radius: 16px;
    }

    .product-card img {
      height: 120px;
      padding: 8px;
      margin-bottom: 10px;
    }

    .product-card h2 {
      font-size: 14px;
      min-height: 38px;
      margin-bottom: 10px;
    }

    .card-actions {
      gap: 8px;
    }

    .btn {
      font-size: 12px;
      padding: 10px 4px;
      border-radius: 9px;
    }
  }

  [data-theme="dark"] .main-header {
    background: linear-gradient(120deg, #121a2f 60%, #16213e 100%);
  }

  [data-theme="dark"] .shopplus-logo {
    background: #222;
    color: #88b5ff;
    box-shadow: 0 4px 14px rgba(51, 102, 255, 0.35);
  }

  [data-theme="dark"] .profile-btn,
  [data-theme="dark"] .install-btn {
    background: #222;
    color: #88b5ff;
    box-shadow: 0 4px 14px rgba(51, 102, 255, 0.28);
  }

  [data-theme="dark"] .search-section {
    background: #0c1b47;
  }

  [data-theme="dark"] .product-card {
    background: var(--card-bg-dark);
    box-shadow: 0 6px 22px rgba(10, 75, 200, 0.35);
  }

  [data-theme="dark"] .product-card img {
    background: #25253a;
  }

  [data-theme="dark"] .product-card h2 {
    color: #a3bbff;
  }
</style>
</head>

<body>
  <div class="main-header">
    <a href="home.html" class="shopplus-logo">Shop <span class="plus">+</span></a>

    <div class="header-actions">
      <a href="profile.html" class="profile-btn">Profile</a>
      <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
      <button id="installAppBtn" class="install-btn">Install App</button>
    </div>
  </div>

  <div class="search-section">
    <form class="search-form" onsubmit="event.preventDefault();">
      <input id="searchBar" type="text" placeholder="Search for phones, gadgets, etc." />
    </form>

    <div class="category-icons" id="categoryBar"></div>
  </div>

  <div class="product-grid" id="product-list">
    <p class="loading-text">Loading products...</p>
  </div>

<script>
  const currentUser = localStorage.getItem("shopplusUser");

  if (!currentUser) {
    window.location.href = "login.html";
  }

  const BACKEND_URL = "https://my-store-e28j.onrender.com";

  const categories = [
    { name: 'Overall', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>' },
    { name: 'Electronics', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="7" y="4" width="10" height="4" rx="1"/><rect x="9" y="10" width="6" height="10" rx="2"/></svg>' },
    { name: 'Fashion', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 4h10v14H7z"/><ellipse cx="12" cy="18" rx="4" ry="2" /></svg>' },
    { name: 'Home', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9v9a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3z"/></svg>' },
    { name: 'Accessories', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="8" cy="12" r="1"/><circle cx="16" cy="12" r="1"/></svg>' },
    { name: 'Sports', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4l3 7h7l-5 5 2 7-6-4-6 4 2-7-5-5h7z"/></svg>' },
    { name: 'Beauty', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/><path d="M12 18v6M12 6V0"/></svg>' },
    { name: 'Gadgets', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2"/><circle cx="12" cy="21" r="1"/></svg>' }
  ];

  const categoryBar = document.getElementById('categoryBar');
  const searchInput = document.getElementById('searchBar');
  const productList = document.getElementById('product-list');
  const installBtn = document.getElementById("installAppBtn");

  let selectedCategory = 'Overall';
  let allProducts = [];
  let deferredPrompt = null;

  function createCategoryIcon(cat) {
    const el = document.createElement('div');
    el.className = 'category-icon' + (cat.name === selectedCategory ? ' selected' : '');
    el.setAttribute('data-cat', cat.name);
    el.innerHTML = cat.icon + '<div class="category-label">' + cat.name + '</div>';

    el.addEventListener('click', () => {
      if (selectedCategory === cat.name) return;
      selectedCategory = cat.name;
      updateCategorySelection();
      filterProducts();
    });

    return el;
  }

  function updateCategorySelection() {
    Array.from(categoryBar.children).forEach(el => {
      el.classList.toggle('selected', el.getAttribute('data-cat') === selectedCategory);
    });
  }

  categories.forEach(cat => categoryBar.appendChild(createCategoryIcon(cat)));

  searchInput.addEventListener('input', () => {
    selectedCategory = 'Overall';
    updateCategorySelection();
    filterProducts();
  });

  async function loadProducts() {
    try {
      const response = await fetch(`${BACKEND_URL}/api/products`);
      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }

      const data = await response.json();

      if (!Array.isArray(data)) {
        throw new Error("Products response is not an array");
      }

      allProducts = data.map((p, index) => ({
        id: p.id ?? p._id ?? (index + 1),
        name: p.name || 'Unnamed Product',
        price: p.price ?? 0,
        image: p.image || (Array.isArray(p.images) && p.images.length ? p.images[0] : 'https://via.placeholder.com/200'),
        description: p.description || 'No description available.',
        category: p.category || 'Overall',
        link: p.link || '#'
      }));

      displayProducts(allProducts);
    } catch (err) {
      productList.innerHTML = '<p class="error-text">Error loading products from backend.<br>Please try again later.</p>';
      console.error('Backend fetch error:', err);
    }
  }

  function displayProducts(products) {
    if (products.length === 0) {
      productList.innerHTML = '<p class="empty-text">No products found.</p>';
      return;
    }

    productList.innerHTML = '';

    products.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.style.opacity = 0;
      card.style.transform = 'translateY(20px)';

      const buyNowButton = p.link && p.link !== '#'
        ? `<a class="btn buy-now" href="${p.link}" target="_blank" rel="noopener noreferrer">Buy Now</a>`
        : `<button class="btn buy-now" onclick="alert('Buy link not added yet for this product')">Buy Now</button>`;

      card.innerHTML = `
        <img src="${p.image}" alt="${p.name}" />
        <h2>${p.name}</h2>
        <div class="card-actions">
          <a class="btn view-details" href="product.html?id=${encodeURIComponent(p.id)}">View Details</a>
          ${buyNowButton}
        </div>
      `;

      productList.appendChild(card);

      setTimeout(() => {
        card.style.opacity = 1;
        card.style.transform = 'none';
      }, i * 60);
    });
  }

  function filterProducts() {
    const searchText = searchInput.value.trim().toLowerCase();
    let filtered = [...allProducts];

    if (selectedCategory !== 'Overall') {
      filtered = filtered.filter(p => (p.category || '').toLowerCase() === selectedCategory.toLowerCase());
    }

    if (searchText.length > 0) {
      filtered = filtered.filter(p =>
        (p.name || '').toLowerCase().includes(searchText) ||
        (p.description || '').toLowerCase().includes(searchText)
      );
    }

    displayProducts(filtered);
  }

  const darkToggleBtn = document.getElementById('darkModeToggle');
  const htmlEl = document.documentElement;
  const savedTheme = localStorage.getItem('theme');

  if (savedTheme) {
    htmlEl.setAttribute('data-theme', savedTheme);
    darkToggleBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
  }

  darkToggleBtn.addEventListener('click', () => {
    const currentTheme = htmlEl.getAttribute('data-theme');

    if (currentTheme === 'dark') {
      htmlEl.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
      darkToggleBtn.textContent = '🌙';
    } else {
      htmlEl.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      darkToggleBtn.textContent = '☀️';
    }
  });

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = "flex";
  });

  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log("Install prompt result:", outcome);

    deferredPrompt = null;
    installBtn.style.display = "none";
  });

  window.addEventListener("appinstalled", () => {
    console.log("ShopPlus installed successfully");
    installBtn.style.display = "none";
  });

  window.addEventListener('DOMContentLoaded', () => {
    loadProducts();
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
        .then((registration) => {
          console.log("Service Worker registered:", registration.scope);
        })
        .catch((error) => {
          console.error("Service Worker registration failed:", error);
        });
    });
  }
</script>
</body>
</html>
