<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shop+</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --gradient-light: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
    --bg-light: #f8f9fb;
    --bg-deep-light: #0e1a39;
    --text-dark-light: #1f1f1f;
    --accent-light: #0099ff;
    --accent-dark-light: #0047ab;
    --logo-bg-light: #fff;
    --logo-shadow-light: rgba(0, 71, 171, 0.12);
    --btn-bg-view: #43a047;
    --btn-bg-view-hover: #38733b;
    --btn-bg-buy: #0099ff;
    --btn-bg-buy-hover: #006cc0;
  }

  [data-theme="dark"] {
    --gradient-light: linear-gradient(120deg, #1a1a2e 60%, #16213e 100%);
    --bg-light: #121212;
    --bg-deep-light: #1a1a2e;
    --text-dark-light: #eaeaea;
    --accent-light: #66b0ff;
    --accent-dark-light: #3a8dde;
    --logo-bg-light: #222;
    --logo-shadow-light: rgba(51, 153, 255, 0.4);
    --btn-bg-view: #2abf6a;
    --btn-bg-view-hover: #1e8f3f;
    --btn-bg-buy: #3a8dde;
    --btn-bg-buy-hover: #2a5e9d;
  }

  body {
    font-family: 'Poppins', Arial, sans-serif;
    background: var(--bg-light);
    color: var(--text-dark-light);
    margin: 0;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
  }

  .main-header {
    background: var(--gradient-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px;
    box-shadow: 0 4px 12px var(--logo-shadow-light);
  }

  .shopplus-logo {
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--accent-dark-light);
    background: var(--logo-bg-light);
    padding: 0 30px 0 22px;
    border-radius: 16px;
    letter-spacing: 0.6px;
    user-select: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
  }

  .shopplus-logo .plus {
    color: var(--accent-light);
    font-size: 2.6rem;
    font-weight: 900;
    margin-left: 4px;
    user-select: none;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .profile-btn {
    text-decoration: none;
    background: var(--logo-bg-light);
    color: var(--accent-dark-light);
    font-weight: 700;
    font-size: 0.95rem;
    padding: 10px 18px;
    border-radius: 12px;
    box-shadow: 0 4px 12px var(--logo-shadow-light);
    transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
  }

  .profile-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0, 71, 171, 0.18);
  }

  .dark-mode-toggle {
    cursor: pointer;
    font-size: 1.6rem;
    background: transparent;
    border: none;
    color: var(--accent-light);
    padding: 6px 12px;
    border-radius: 20px;
    transition: background 0.3s ease;
  }

  .dark-mode-toggle:hover {
    background: rgba(255 255 255 / 0.25);
  }

  .search-section {
    background: var(--bg-deep-light);
    padding: 32px 24px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .category-icons {
    margin: 18px 0 18px 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
  }

  .category-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg-light);
    border-radius: 50%;
    width: 62px;
    height: 62px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
    user-select: none;
    color: var(--text-dark-light);
  }

  .category-icon.selected,
  .category-icon:hover {
    background: var(--accent-light);
    color: white;
    transform: scale(1.15);
  }

  .category-icon svg {
    width: 28px;
    height: 28px;
    fill: currentColor;
  }

  .category-label {
    font-size: 0.7rem;
    margin-top: 4px;
    font-weight: 600;
    color: inherit;
    text-align: center;
  }

  .search-form {
    width: 100%;
    max-width: 500px;
    display: flex;
    gap: 14px;
  }

  .search-form input {
    flex-grow: 1;
    border-radius: 8px;
    border: none;
    padding: 13px 18px;
    font-size: 16px;
    outline: none;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
    padding: 24px 30px 48px 30px;
    max-width: 1280px;
    margin: 0 auto;
    min-height: 300px;
  }

  @media (max-width: 1100px) {
    .product-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 650px) {
    .product-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  .product-card {
    background: var(--bg-light);
    border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0, 71, 171, 0.12);
    padding: 18px 15px 20px 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
    opacity: 0;
    transform: translateY(20px);
    height: 340px;
  }

  .product-card:hover {
    transform: translateY(-8px) scale(1.07);
    box-shadow: 0 14px 36px rgba(0, 71, 171, 0.26);
  }

  .product-card img {
    height: 70%;
    width: auto;
    max-width: 95%;
    object-fit: contain;
    border-radius: 12px;
    background: #f2f4fc;
    padding: 9px;
    box-sizing: border-box;
    margin-bottom: 14px;
  }

  .product-card h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent-dark-light);
    margin: 0 0 14px 0;
    text-align: center;
    line-height: 1.28;
  }

  .card-actions {
    margin-top: auto;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 14px;
  }

  .btn {
    flex: 1 1 auto;
    max-width: 160px;
    padding: 12px 0;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
    cursor: pointer;
    border: none;
    outline: none;
    transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
    user-select: none;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
  }

  .view-details {
    background-color: var(--btn-bg-view);
    color: white;
  }

  .view-details:hover {
    background-color: var(--btn-bg-view-hover);
  }

  .buy-now {
    background-color: var(--btn-bg-buy);
    color: white;
  }

  .buy-now:hover {
    background-color: var(--btn-bg-buy-hover);
  }

  .loading-text,
  .empty-text,
  .error-text {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    grid-column: 1 / -1;
    margin-top: 40px;
  }

  .loading-text {
    color: #666;
  }

  .empty-text {
    color: #888;
  }

  .error-text {
    color: red;
  }

  @media (max-width: 600px) {
    .main-header {
      padding: 14px 20px;
    }

    .shopplus-logo {
      font-size: 1.6rem;
      padding: 0 20px 0 16px;
      letter-spacing: 0.4px;
    }

    .shopplus-logo .plus {
      font-size: 2rem;
    }

    .header-actions {
      gap: 8px;
    }

    .profile-btn {
      font-size: 0.85rem;
      padding: 8px 14px;
    }

    .dark-mode-toggle {
      font-size: 1.3rem;
      padding: 5px 10px;
    }

    .search-section {
      padding: 20px 16px 16px 16px;
    }

    .search-form {
      max-width: 90%;
      gap: 10px;
    }

    .search-form input {
      padding: 10px 14px;
      font-size: 15px;
    }

    .product-grid {
      padding: 18px 20px 36px 20px;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .product-card {
      height: 280px;
      padding: 14px 12px 14px 12px;
    }

    .product-card h2 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .btn {
      max-width: 140px;
      font-size: 14px;
      padding: 10px 0;
    }
  }

  [data-theme="dark"] {
    background: #121212;
    color: #eee;
  }

  [data-theme="dark"] .main-header {
    background: linear-gradient(120deg, #121a2f 60%, #16213e 100%);
  }

  [data-theme="dark"] .shopplus-logo {
    background: #222;
    color: #88b5ff;
    box-shadow: 0 4px 14px rgba(51, 102, 255, 0.45);
  }

  [data-theme="dark"] .profile-btn {
    background: #222;
    color: #88b5ff;
    box-shadow: 0 4px 14px rgba(51, 102, 255, 0.35);
  }

  [data-theme="dark"] .profile-btn:hover {
    box-shadow: 0 8px 20px rgba(51, 102, 255, 0.5);
  }

  [data-theme="dark"] .search-section {
    background: #16213e;
  }

  [data-theme="dark"] .product-card {
    background: #1c1c2b;
    box-shadow: 0 6px 22px rgba(10, 75, 200, 0.6);
  }

  [data-theme="dark"] .product-card h2 {
    color: #a3bbff;
  }

  [data-theme="dark"] .btn.view-details {
    background: #3caf70;
    box-shadow: 0 4px 20px #238028;
  }

  [data-theme="dark"] .btn.view-details:hover {
    background: #277129;
  }

  [data-theme="dark"] .btn.buy-now {
    background: #4a8de7;
    box-shadow: 0 4px 20px #205d99;
  }

  [data-theme="dark"] .btn.buy-now:hover {
    background: #235885;
  }

  [data-theme="dark"] .product-card:hover {
    box-shadow: 0 12px 36px rgba(12, 63, 150, 0.8);
  }
</style>
</head>

<body>
  <div class="main-header">
    <a href="index.html" class="shopplus-logo">Shop<span class="plus">+</span></a>

    <div class="header-actions">
      <a href="profile.html" class="profile-btn">Profile</a>
      <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <div class="search-section">
    <form class="search-form" onsubmit="event.preventDefault();">
      <input id="searchBar" type="text" placeholder="Search for phones, gadgets, etc." />
    </form>

    <div class="category-icons" id="categoryBar"></div>
  </div>

  <div class="product-grid" id="product-list">
    <p class="loading-text">Loading products...</p>
  </div>

<script>
  const BACKEND_URL = "https://my-store-e28j.onrender.com";

  const categories = [
    { name: 'Overall', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>' },
    { name: 'Electronics', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="7" y="4" width="10" height="4" rx="1"/><rect x="9" y="10" width="6" height="10" rx="2"/></svg>' },
    { name: 'Fashion', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 4h10v14H7z"/><ellipse cx="12" cy="18" rx="4" ry="2" /></svg>' },
    { name: 'Home', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9v9a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3z"/></svg>' },
    { name: 'Accessories', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="8" cy="12" r="1"/><circle cx="16" cy="12" r="1"/></svg>' },
    { name: 'Sports', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4l3 7h7l-5 5 2 7-6-4-6 4 2-7-5-5h7z"/></svg>' },
    { name: 'Beauty', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/><path d="M12 18v6M12 6V0"/></svg>' },
    { name: 'Gadgets', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2"/><circle cx="12" cy="21" r="1"/></svg>' }
  ];

  const categoryBar = document.getElementById('categoryBar');
  const searchInput = document.getElementById('searchBar');
  const productList = document.getElementById('product-list');

  let selectedCategory = 'Overall';
  let allProducts = [];

  function createCategoryIcon(cat) {
    const el = document.createElement('div');
    el.className = 'category-icon' + (cat.name === selectedCategory ? ' selected' : '');
    el.setAttribute('data-cat', cat.name);
    el.innerHTML = cat.icon + '<div class="category-label">' + cat.name + '</div>';

    el.addEventListener('click', () => {
      if (selectedCategory === cat.name) return;
      selectedCategory = cat.name;
      updateCategorySelection();
      filterProducts();
    });

    return el;
  }

  function updateCategorySelection() {
    Array.from(categoryBar.children).forEach(el => {
      el.classList.toggle('selected', el.getAttribute('data-cat') === selectedCategory);
    });
  }

  categories.forEach(cat => categoryBar.appendChild(createCategoryIcon(cat)));

  searchInput.addEventListener('input', () => {
    selectedCategory = 'Overall';
    updateCategorySelection();
    filterProducts();
  });

  async function loadProducts() {
    try {
      const response = await fetch(`${BACKEND_URL}/api/products`);
      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }

      const data = await response.json();

      if (!Array.isArray(data)) {
        throw new Error("Products response is not an array");
      }

      allProducts = data.map((p, index) => ({
        id: p.id ?? p._id ?? (index + 1),
        name: p.name || 'Unnamed Product',
        price: p.price ?? 0,
        image: p.image || (Array.isArray(p.images) && p.images.length ? p.images[0] : 'https://via.placeholder.com/200'),
        description: p.description || 'No description available.',
        category: p.category || 'Overall',
        link: p.link || '#'
      }));

      displayProducts(allProducts);
    } catch (err) {
      productList.innerHTML = '<p class="error-text">Error loading products from backend.<br>Please try again later.</p>';
      console.error('Backend fetch error:', err);
    }
  }

  function displayProducts(products) {
    if (products.length === 0) {
      productList.innerHTML = '<p class="empty-text">No products found.</p>';
      return;
    }

    productList.innerHTML = '';

    products.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.style.opacity = 0;
      card.style.transform = 'translateY(20px)';

      const buyNowButton = p.link && p.link !== '#'
        ? `<a class="btn buy-now" href="${p.link}" target="_blank" rel="noopener noreferrer">Buy Now</a>`
        : `<button class="btn buy-now" onclick="alert('Buy link not added yet for this product')">Buy Now</button>`;

      card.innerHTML = `
        <img src="${p.image}" alt="${p.name}" />
        <h2>${p.name}</h2>
        <div class="card-actions">
          <a class="btn view-details" href="product.html?id=${encodeURIComponent(p.id)}">View Details</a>
          ${buyNowButton}
        </div>
      `;

      productList.appendChild(card);

      setTimeout(() => {
        card.style.opacity = 1;
        card.style.transform = 'none';
      }, i * 70);
    });
  }

  function filterProducts() {
    const searchText = searchInput.value.trim().toLowerCase();
    let filtered = [...allProducts];

    if (selectedCategory !== 'Overall') {
      filtered = filtered.filter(p => (p.category || '').toLowerCase() === selectedCategory.toLowerCase());
    }

    if (searchText.length > 0) {
      filtered = filtered.filter(p =>
        (p.name || '').toLowerCase().includes(searchText) ||
        (p.description || '').toLowerCase().includes(searchText)
      );
    }

    displayProducts(filtered);
  }

  const darkToggleBtn = document.getElementById('darkModeToggle');
  const htmlEl = document.documentElement;
  const savedTheme = localStorage.getItem('theme');

  if (savedTheme) {
    htmlEl.setAttribute('data-theme', savedTheme);
    darkToggleBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
  }

  darkToggleBtn.addEventListener('click', () => {
    const currentTheme = htmlEl.getAttribute('data-theme');

    if (currentTheme === 'dark') {
      htmlEl.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
      darkToggleBtn.textContent = '🌙';
    } else {
      htmlEl.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      darkToggleBtn.textContent = '☀️';
    }
  });

  window.addEventListener('DOMContentLoaded', () => {
    loadProducts();
  });
</script>
</body>
</html>
