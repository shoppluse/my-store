<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shopplus</title>

<link rel="manifest" href="/my-store/manifest.json" />
<meta name="theme-color" content="#0047ab" />
<link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
<link rel="icon" href="/my-store/icons/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

<!-- LOGIN PROTECTION -->
<script>
  const isLoggedIn = localStorage.getItem("shopplusLoggedIn");
  const currentUser = localStorage.getItem("shopplusUser");

  if (isLoggedIn !== "true" || !currentUser) {
    window.location.href = "login.html";
  }
</script>

<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
    --bg: #f8f9fb;
    --bg-deep: #0e1a39;
    --card-bg: #ffffff;
    --text: #1f1f1f;
    --muted: #64748b;
    --primary: #0047ab;
    --primary-2: #0099ff;
    --border: #dbe7ff;
    --shadow: rgba(0, 71, 171, 0.14);
    --btn-bg-view: #43a047;
    --btn-bg-view-hover: #38733b;
    --btn-bg-buy: #0099ff;
    --btn-bg-buy-hover: #006cc0;
  }

  [data-theme="dark"] {
    --gradient: linear-gradient(120deg, #1a1a2e 60%, #16213e 100%);
    --bg: #121212;
    --bg-deep: #16213e;
    --card-bg: #1c1c2b;
    --text: #eaeaea;
    --muted: #94a3b8;
    --primary: #66b0ff;
    --primary-2: #3a8dde;
    --border: #1e3a8a;
    --shadow: rgba(51, 153, 255, 0.22);
    --btn-bg-view: #2abf6a;
    --btn-bg-view-hover: #1e8f3f;
    --btn-bg-buy: #3a8dde;
    --btn-bg-buy-hover: #2a5e9d;
  }

  body {
    font-family: 'Poppins', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
    overflow-x: hidden;
  }

  .main-header {
    background: var(--gradient);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(18px + env(safe-area-inset-top)) 16px 20px;
    box-shadow: 0 6px 20px var(--shadow);
    gap: 14px;
  }

  .shopplus-logo {
    font-size: 2rem;
    font-weight: 700;
    color: var(--primary);
    background: #ffffff;
    padding: 10px 22px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    max-width: 700px;
  }

  .shopplus-logo .plus {
    color: var(--primary-2);
    font-size: 2.2rem;
    font-weight: 900;
    line-height: 1;
  }

  .notify-prompt-bar {
    width: 100%;
    max-width: 700px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.22);
    color: #fff;
    border-radius: 14px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    backdrop-filter: blur(4px);
  }

  .notify-prompt-bar.hidden {
    display: none;
  }

  .notify-prompt-text {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .notify-prompt-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .notify-mini-btn,
  .notify-close-btn {
    border: none;
    outline: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    border-radius: 10px;
  }

  .notify-mini-btn {
    background: #ffffff;
    color: #0047ab;
    padding: 7px 12px;
    font-size: 0.82rem;
  }

  .notify-close-btn {
    background: rgba(255,255,255,0.18);
    color: #fff;
    padding: 6px 8px;
    font-size: 0.9rem;
  }

  .header-actions {
    width: 100%;
    max-width: 700px;
    display: grid;
    grid-template-columns: 1.4fr 0.9fr 0.9fr 0.9fr;
    gap: 12px;
    align-items: stretch;
  }

  .header-btn,
  .dark-mode-toggle,
  .brand-toggle-btn,
  .notify-btn {
    width: 100%;
    min-height: 64px;
    text-decoration: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    padding: 12px 10px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: inherit;
    cursor: pointer;
    transition: 0.25s ease;
    box-shadow: none;
    backdrop-filter: blur(4px);
    outline: none;
  }

  .header-btn:hover,
  .brand-toggle-btn:hover,
  .dark-mode-toggle:hover,
  .notify-btn:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.22);
  }

  .icon-only-btn {
    font-size: 1.7rem;
    padding: 0;
  }

  .profile-btn {
    font-size: 1.7rem;
  }

  .dark-mode-toggle,
  .notify-btn {
    border: none;
    outline: none;
  }

  .notify-enabled {
    box-shadow: 0 0 0 2px rgba(255,255,255,0.12), 0 0 16px rgba(255, 215, 0, 0.35);
  }

  .brand-filter-wrapper {
    position: relative;
    width: 100%;
  }

  .brand-toggle-btn {
    gap: 8px;
  }

  .brand-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    width: 100%;
    min-width: 170px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    z-index: 1000;
    padding: 8px 0;
    max-height: 300px;
    overflow-y: auto;
  }

  .brand-dropdown.hidden {
    display: none;
  }

  .brand-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: background 0.2s ease;
  }

  .brand-item:hover {
    background: rgba(0, 153, 255, 0.1);
  }

  .brand-item.active {
    background: rgba(0, 153, 255, 0.14);
    color: var(--primary);
    font-weight: 700;
  }

  .search-section {
    background: var(--bg-deep);
    padding: 22px 14px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .search-form {
    width: 100%;
    max-width: 700px;
    display: flex;
  }

  .search-form input {
    width: 100%;
    border-radius: 16px;
    border: none;
    padding: 15px 16px;
    font-size: 16px;
    outline: none;
    font-family: inherit;
  }

  .category-icons {
    margin: 18px 0 0;
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-wrap: nowrap;
    justify-content: flex-start;
    gap: 14px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 6px 2px 10px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .category-icons::-webkit-scrollbar {
    display: none;
  }

  .category-icons {
    scrollbar-width: none;
  }

  .category-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    border-radius: 50%;
    width: 78px;
    height: 78px;
    min-width: 78px;
    min-height: 78px;
    box-shadow: 0 4px 12px rgba(0,0,0,.10);
    cursor: pointer;
    transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
    color: #1f1f1f;
    flex-shrink: 0;
    padding: 8px;
  }

  .category-icon.selected,
  .category-icon:hover {
    background: var(--primary-2);
    color: white;
    transform: scale(1.06);
    box-shadow: 0 8px 18px rgba(0, 153, 255, 0.24);
  }

  .category-icon svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
    flex-shrink: 0;
  }

  .category-label {
    font-size: 0.7rem;
    margin-top: 5px;
    font-weight: 700;
    color: inherit;
    text-align: center;
    line-height: 1.1;
    max-width: 68px;
    white-space: normal;
    word-break: break-word;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
    padding: 24px 24px 48px;
    max-width: 1280px;
    margin: 0 auto;
    min-height: 300px;
  }

  @media (max-width: 1100px) {
    .product-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 780px) {
    .product-grid {
      grid-template-columns: repeat(2, 1fr);
      padding: 16px 12px 28px;
      gap: 12px;
    }
  }

  .product-card {
    background: var(--card-bg);
    border-radius: 18px;
    box-shadow: 0 6px 20px rgba(0, 71, 171, 0.12);
    padding: 14px 12px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.35s ease, box-shadow 0.35s ease, opacity 0.35s ease;
    opacity: 0;
    transform: translateY(20px);
    min-height: 330px;
  }

  .product-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 36px rgba(0, 71, 171, 0.22);
  }

  .product-image-box {
    width: 100%;
    height: 170px;
    background: #eef2fb;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  [data-theme="dark"] .product-image-box {
    background: #25253a;
  }

  .product-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .product-card h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
    margin: 0 0 12px;
    text-align: center;
    line-height: 1.3;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-actions {
    margin-top: auto;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 11px 6px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    text-align: center;
    cursor: pointer;
    border: none;
    outline: none;
    transition: background-color 0.25s ease, transform 0.25s ease;
    user-select: none;
    font-family: inherit;
    color: white;
  }

  .btn:hover {
    transform: translateY(-2px);
  }

  .view-details {
    background-color: var(--btn-bg-view);
  }

  .view-details:hover {
    background-color: var(--btn-bg-view-hover);
  }

  .buy-now {
    background-color: var(--btn-bg-buy);
  }

  .buy-now:hover {
    background-color: var(--btn-bg-buy-hover);
  }

  .loading-text,
  .empty-text,
  .error-text {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    grid-column: 1 / -1;
    margin-top: 40px;
  }

  .loading-text { color: #666; }
  .empty-text { color: #888; }
  .error-text { color: red; }

  .token-box {
    display: none;
    max-width: 1200px;
    margin: 0 auto 20px;
    padding: 16px;
    background: #fff3cd;
    color: #333;
    border: 1px solid #ffeeba;
    border-radius: 12px;
    font-family: monospace;
    font-size: 12px;
    word-break: break-all;
  }

  @media (max-width: 700px) {
    .main-header {
      padding: calc(14px + env(safe-area-inset-top)) 12px 18px;
      gap: 12px;
    }

    .shopplus-logo {
      font-size: 1.35rem;
      padding: 8px 14px;
      border-radius: 16px;
    }

    .shopplus-logo .plus {
      font-size: 1.7rem;
    }

    .header-actions {
      gap: 10px;
      grid-template-columns: 1.35fr 0.9fr 0.9fr 0.9fr;
    }

    .header-btn,
    .dark-mode-toggle,
    .brand-toggle-btn,
    .notify-btn {
      min-height: 58px;
      font-size: 0.82rem;
      padding: 10px 6px;
      border-radius: 14px;
    }

    .icon-only-btn,
    .profile-btn {
      font-size: 1.4rem;
    }

    .brand-dropdown {
      width: 100%;
    }

    .notify-prompt-bar {
      flex-direction: column;
      align-items: flex-start;
      padding: 10px;
      gap: 8px;
    }

    .notify-prompt-actions {
      width: 100%;
      justify-content: flex-end;
    }

    .search-section {
      padding: 18px 12px 16px;
    }

    .search-form input {
      padding: 13px 14px;
      font-size: 15px;
    }

    .category-icons {
      gap: 12px;
      margin-top: 16px;
      padding: 4px 2px 8px;
    }

    .category-icon {
      width: 74px;
      height: 74px;
      min-width: 74px;
      min-height: 74px;
      padding: 7px;
    }

    .category-icon svg {
      width: 22px;
      height: 22px;
    }

    .category-label {
      font-size: 0.66rem;
      margin-top: 4px;
      max-width: 62px;
    }

    .product-card {
      min-height: 290px;
      padding: 10px 10px 14px;
      border-radius: 16px;
    }

    .product-image-box {
      height: 140px;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 12px;
    }

    .product-card h2 {
      font-size: 14px;
      min-height: 38px;
      margin-bottom: 10px;
    }

    .card-actions {
      gap: 8px;
    }

    .btn {
      font-size: 11px;
      padding: 10px 4px;
      border-radius: 10px;
    }
  }
</style>
</head>

<body>
  <div class="main-header">
    <a href="home.html" class="shopplus-logo">Shop<span class="plus">+</span></a>

    <div id="notifyPromptBar" class="notify-prompt-bar hidden">
      <span class="notify-prompt-text">🔔 Enable notifications for latest ShopPlus updates</span>
      <div class="notify-prompt-actions">
        <button id="enableNotifyNowBtn" class="notify-mini-btn" type="button">Enable</button>
        <button id="closeNotifyPromptBtn" class="notify-close-btn" type="button">❌</button>
      </div>
    </div>

    <div class="header-actions" id="headerActions">
      <!-- BRAND -->
      <div class="brand-filter-wrapper">
        <button id="brandToggleBtn" class="brand-toggle-btn" type="button">
          <span id="brandBtnText">🏷️ Brand</span>
          <span id="brandArrow">▼</span>
        </button>

        <div id="brandDropdown" class="brand-dropdown hidden">
          <div class="brand-item active" data-brand="all">All Brands</div>
          <div class="brand-item" data-brand="Apple">Apple</div>
          <div class="brand-item" data-brand="Samsung">Samsung</div>
          <div class="brand-item" data-brand="Nike">Nike</div>
          <div class="brand-item" data-brand="Puma">Puma</div>
          <div class="brand-item" data-brand="Boat">Boat</div>
          <div class="brand-item" data-brand="Adidas">Adidas</div>
          <div class="brand-item" data-brand="Sony">Sony</div>
          <div class="brand-item" data-brand="Realme">Realme</div>
          <div class="brand-item" data-brand="OnePlus">OnePlus</div>
        </div>
      </div>

      <!-- DARK/LIGHT -->
      <button id="darkModeToggle" class="dark-mode-toggle icon-only-btn" title="Toggle dark mode" type="button">🌙</button>

      <!-- NOTIFY -->
      <button id="notifyBtn" class="notify-btn icon-only-btn" type="button" title="Notifications">🔕</button>

      <!-- PROFILE -->
      <a href="profile.html" class="header-btn icon-only-btn profile-btn" title="Profile">👤</a>
    </div>
  </div>

  <div class="search-section">
    <form class="search-form" onsubmit="event.preventDefault();">
      <input id="searchBar" type="text" placeholder="Search for phones, gadgets, etc." />
    </form>

    <div class="category-icons" id="categoryBar"></div>
  </div>

  <div class="product-grid" id="product-list">
    <p class="loading-text">Loading products...</p>
  </div>

  <div id="tokenBox" class="token-box">
    <strong>FCM Token:</strong>
    <div id="tokenText" style="margin-top: 10px;"></div>
  </div>

<script>
  const categories = [
    { name: 'Overall', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>' },
    { name: 'Electronics', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="7" y="4" width="10" height="4" rx="1"/><rect x="9" y="10" width="6" height="10" rx="2"/></svg>' },
    { name: 'Fashion', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 4h10v14H7z"/><ellipse cx="12" cy="18" rx="4" ry="2" /></svg>' },
    { name: 'Home', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9v9a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3z"/></svg>' },
    { name: 'Accessories', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="8" cy="12" r="1"/><circle cx="16" cy="12" r="1"/></svg>' },
    { name: 'Sports', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4l3 7h7l-5 5 2 7-6-4-6 4 2-7-5-5h7z"/></svg>' },
    { name: 'Beauty', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/><path d="M12 18v6M12 6V0"/></svg>' },
    { name: 'Gadgets', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2"/><circle cx="12" cy="21" r="1"/></svg>' }
  ];

  const categoryBar = document.getElementById('categoryBar');
  const searchInput = document.getElementById('searchBar');
  const productList = document.getElementById('product-list');

  const brandToggleBtn = document.getElementById('brandToggleBtn');
  const brandDropdown = document.getElementById('brandDropdown');
  const brandArrow = document.getElementById('brandArrow');
  const brandBtnText = document.getElementById('brandBtnText');
  const brandItems = document.querySelectorAll('.brand-item');

  const darkToggleBtn = document.getElementById('darkModeToggle');
  const htmlEl = document.documentElement;
  const savedTheme = localStorage.getItem('theme');

  const notifyPromptBar = document.getElementById("notifyPromptBar");
  const enableNotifyNowBtn = document.getElementById("enableNotifyNowBtn");
  const closeNotifyPromptBtn = document.getElementById("closeNotifyPromptBtn");

  let selectedCategory = 'Overall';
  let allProducts = [];

  function createCategoryIcon(cat) {
    const el = document.createElement('div');
    el.className = 'category-icon' + (cat.name === selectedCategory ? ' selected' : '');
    el.setAttribute('data-cat', cat.name);
    el.innerHTML = cat.icon + '<div class="category-label">' + cat.name + '</div>';

    el.addEventListener('click', () => {
      if (selectedCategory === cat.name) return;
      selectedCategory = cat.name;
      updateCategorySelection();
      filterProducts();
    });

    return el;
  }

  function updateCategorySelection() {
    Array.from(categoryBar.children).forEach(el => {
      el.classList.toggle('selected', el.getAttribute('data-cat') === selectedCategory);
    });
  }

  categories.forEach(cat => categoryBar.appendChild(createCategoryIcon(cat)));

  searchInput.addEventListener('input', () => {
    selectedCategory = 'Overall';
    updateCategorySelection();
    syncBrandSelectionFromSearch();
    filterProducts();
  });

  async function loadProducts() {
    try {
      const response = await fetch("/my-store/products.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`JSON error: ${response.status}`);

      const data = await response.json();

      if (!Array.isArray(data)) {
        throw new Error("products.json must contain an array");
      }

      allProducts = data.map((p, index) => ({
        id: p.id ?? (index + 1),
        name: p.name || 'Unnamed Product',
        price: p.price ?? 0,
        image: p.image || (Array.isArray(p.images) && p.images.length ? p.images[0] : 'https://via.placeholder.com/200'),
        description: p.description || 'No description available.',
        category: p.category || 'Overall',
        brand: p.brand || '',
        link: p.link || '#'
      }));

      displayProducts(allProducts);
    } catch (err) {
      productList.innerHTML = '<p class="error-text">Error loading products from products.json.<br>Please check file path and JSON format.</p>';
      console.error('products.json fetch error:', err);
    }
  }

  function displayProducts(products) {
    if (products.length === 0) {
      productList.innerHTML = '<p class="empty-text">No products found.</p>';
      return;
    }

    productList.innerHTML = '';

    products.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.style.opacity = 0;
      card.style.transform = 'translateY(20px)';

      const buyNowButton = p.link && p.link !== '#'
        ? `<a class="btn buy-now" href="${p.link}" target="_blank" rel="noopener noreferrer">Buy Now</a>`
        : `<button class="btn buy-now" onclick="alert('Buy link not added yet for this product')">Buy Now</button>`;

      card.innerHTML = `
        <div class="product-image-box">
          <img src="${p.image}" alt="${p.name}" />
        </div>
        <h2>${p.name}</h2>
        <div class="card-actions">
          <a class="btn view-details" href="product.html?id=${encodeURIComponent(p.id)}">View Details</a>
          ${buyNowButton}
        </div>
      `;

      productList.appendChild(card);

      setTimeout(() => {
        card.style.opacity = 1;
        card.style.transform = 'none';
      }, i * 60);
    });
  }

  function filterProducts() {
    const searchText = searchInput.value.trim().toLowerCase();
    let filtered = [...allProducts];

    if (selectedCategory !== 'Overall') {
      filtered = filtered.filter(p => (p.category || '').toLowerCase() === selectedCategory.toLowerCase());
    }

    if (searchText.length > 0) {
      filtered = filtered.filter(p =>
        (p.name || '').toLowerCase().includes(searchText) ||
        (p.description || '').toLowerCase().includes(searchText) ||
        (p.brand || '').toLowerCase().includes(searchText)
      );
    }

    displayProducts(filtered);
  }

  function setActiveBrand(selectedBrand) {
    brandItems.forEach(item => {
      item.classList.toggle('active', item.getAttribute('data-brand').toLowerCase() === selectedBrand.toLowerCase());
    });
  }

  function syncBrandSelectionFromSearch() {
    const searchText = searchInput.value.trim().toLowerCase();

    let matchedBrand = 'all';
    brandItems.forEach(item => {
      const brand = item.getAttribute('data-brand').toLowerCase();
      if (brand !== 'all' && brand === searchText) {
        matchedBrand = brand;
      }
    });

    setActiveBrand(matchedBrand);

    if (matchedBrand === 'all') {
      brandBtnText.textContent = '🏷️ Brand';
    } else {
      const activeItem = Array.from(brandItems).find(item => item.getAttribute('data-brand').toLowerCase() === matchedBrand);
      brandBtnText.textContent = `🏷️ ${activeItem.getAttribute('data-brand')}`;
    }
  }

  brandToggleBtn.addEventListener('click', () => {
    brandDropdown.classList.toggle('hidden');
    brandArrow.textContent = brandDropdown.classList.contains('hidden') ? '▼' : '▲';
  });

  brandItems.forEach(item => {
    item.addEventListener('click', () => {
      const selectedBrand = item.getAttribute('data-brand');

      setActiveBrand(selectedBrand);

      if (selectedBrand === 'all') {
        searchInput.value = '';
        brandBtnText.textContent = '🏷️ Brand';
      } else {
        searchInput.value = selectedBrand;
        brandBtnText.textContent = `🏷️ ${selectedBrand}`;
      }

      selectedCategory = 'Overall';
      updateCategorySelection();

      searchInput.dispatchEvent(new Event('input'));

      brandDropdown.classList.add('hidden');
      brandArrow.textContent = '▼';
    });
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.brand-filter-wrapper')) {
      brandDropdown.classList.add('hidden');
      brandArrow.textContent = '▼';
    }
  });

  if (savedTheme) {
    htmlEl.setAttribute('data-theme', savedTheme);
    darkToggleBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
  }

  darkToggleBtn.addEventListener('click', () => {
    const currentTheme = htmlEl.getAttribute('data-theme');

    if (currentTheme === 'dark') {
      htmlEl.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
      darkToggleBtn.textContent = '🌙';
    } else {
      htmlEl.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      darkToggleBtn.textContent = '☀️';
    }
  });

  function shouldShowNotifyPrompt() {
    const dismissed = localStorage.getItem("shopplusNotifyPromptDismissed");
    const enabled = localStorage.getItem("shopplusNotificationsEnabled");
    return enabled !== "true" && dismissed !== "true";
  }

  window.addEventListener("DOMContentLoaded", () => {
    loadProducts();

    if (shouldShowNotifyPrompt() && notifyPromptBar) {
      notifyPromptBar.classList.remove("hidden");
    }
  });

  if (closeNotifyPromptBtn) {
    closeNotifyPromptBtn.addEventListener("click", () => {
      localStorage.setItem("shopplusNotifyPromptDismissed", "true");
      notifyPromptBar?.classList.add("hidden");
    });
  }

  if (enableNotifyNowBtn) {
    enableNotifyNowBtn.addEventListener("click", () => {
      document.getElementById("notifyBtn")?.click();
    });
  }

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
        .then((registration) => {
          console.log("Service Worker registered:", registration.scope);
        })
        .catch((error) => {
          console.error("Service Worker registration failed:", error);
        });
    });
  }
</script>

  const firebaseConfig = {

    authDomain: "shopplus-108.firebaseapp.com",
    projectId: "shopplus-108",
    storageBucket: "shopplus-108.firebasestorage.app",
    messagingSenderId: "250259887977",
    appId: "1:250259887977:web:cdddd39da04a5575fd8ff8"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  const notifyBtn = document.getElementById("notifyBtn");
  const tokenBox = document.getElementById("tokenBox");
  const tokenText = document.getElementById("tokenText");
  const notifyPromptBar = document.getElementById("notifyPromptBar");

  console.log("Notify button found:", notifyBtn);

  if (localStorage.getItem("shopplusNotificationsEnabled") === "true" && Notification.permission === "granted") {
    notifyBtn.textContent = "🔔";
    notifyBtn.classList.add("notify-enabled");
  } else {
    notifyBtn.textContent = "🔕";
    notifyBtn.classList.remove("notify-enabled");
  }

  notifyBtn.addEventListener("click", async () => {
    console.log("Notify button clicked");

    try {
      let permission = Notification.permission;
      console.log("Current permission:", permission);

      if (permission === "default") {
        permission = await Notification.requestPermission();
        console.log("Requested permission result:", permission);
      }

      if (permission === "denied") {
        notifyBtn.textContent = "🔕";
        notifyBtn.classList.remove("notify-enabled");
        localStorage.setItem("shopplusNotificationsEnabled", "false");
        alert("Notifications are blocked for this app.\n\nPlease allow notifications in browser/site settings.");
        return;
      }

      if (permission !== "granted") {
        notifyBtn.textContent = "🔕";
        notifyBtn.classList.remove("notify-enabled");
        localStorage.setItem("shopplusNotificationsEnabled", "false");
        alert("Notification permission not granted.");
        return;
      }

      const registration = await navigator.serviceWorker.register("./firebase-messaging-sw.js");
      console.log("Firebase messaging SW registered:", registration);

      const currentToken = await getToken(messaging, {
        vapidKey: "BHBCBJemVUSgH6NRQYODZi6J6PgL7CFdIh4rgxvSw5aphNG9_OkJeMKLXD8AyKjrY-7Tk_PusaAQYZtn7OAWQx4",
        serviceWorkerRegistration: registration
      });

      console.log("FCM Token:", currentToken);

      if (currentToken) {
        tokenBox.style.display = "block";
        tokenText.textContent = currentToken;

        const currentUser = localStorage.getItem("shopplusUser") || "guest";

        try {
          const saveResponse = await fetch("https://my-store-e28j.onrender.com/api/save-token", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              token: currentToken,
              user: currentUser,
              platform: "web"
            })
          });

          const saveResult = await saveResponse.json();
          console.log("Save token response:", saveResult);

          if (!saveResult.success) {
            console.warn("Token save issue:", saveResult.message);
          }
        } catch (saveError) {
          console.error("Error saving token to backend:", saveError);
        }

        localStorage.setItem("shopplusNotificationsEnabled", "true");
        localStorage.removeItem("shopplusNotifyPromptDismissed");

        notifyBtn.textContent = "🔔";
        notifyBtn.classList.add("notify-enabled");

        notifyPromptBar?.classList.add("hidden");

        try {
          await navigator.clipboard.writeText(currentToken);
          alert("Notifications enabled successfully! 🔔");
        } catch (copyErr) {
          alert("Notifications enabled successfully! 🔔");
        }
      } else {
        notifyBtn.textContent = "🔕";
        notifyBtn.classList.remove("notify-enabled");
        localStorage.setItem("shopplusNotificationsEnabled", "false");
        alert("No FCM token generated.");
      }
    } catch (error) {
      console.error("Notification setup failed:", error);
      notifyBtn.textContent = "🔕";
      notifyBtn.classList.remove("notify-enabled");
      localStorage.setItem("shopplusNotificationsEnabled", "false");
      alert("Notification setup failed:\n\n" + (error?.message || error));
    }
  });

  onMessage(messaging, (payload) => {
    console.log("Foreground message:", payload);

    const title = payload.notification?.title || "ShopPlus";
    const body = payload.notification?.body || "You have a new notification!";
    const icon = "/my-store/icons/icon-192.png";

    if (Notification.permission === "granted") {
      const notification = new Notification(title, {
        body,
        icon
      });

      notification.onclick = () => {
        window.focus();
        window.location.href = "home.html";
      };
    } else {
      alert(`${title}\n\n${body}`);
    }
  });
</script>
