<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shopplus</title>

<link rel="manifest" href="/my-store/manifest.json" />
<meta name="theme-color" content="#111111" />
<link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
<link rel="icon" href="/my-store/icons/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<script>
  const isLoggedIn = localStorage.getItem("shopplusLoggedIn");
  const currentUser = localStorage.getItem("shopplusUser");

  if (isLoggedIn !== "true" || !currentUser) {
    window.location.href = "login.html";
  }

  (function () {
    const savedTheme = localStorage.getItem("theme");
    document.documentElement.setAttribute("data-theme", savedTheme === "dark" ? "dark" : "light");
  })();
</script>

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f7f7f8;
    --bg-2: #efeff2;
    --card-bg: #ffffff;
    --text: #111111;
    --muted: #777777;
    --muted-2: #9b9b9b;
    --primary: #111111;
    --primary-2: #2d2d2d;
    --border: #e9e9ec;
    --soft-border: #f0f0f2;
    --shadow: rgba(0, 0, 0, 0.06);
    --shadow-2: rgba(0, 0, 0, 0.09);
    --product-border: #ececf0;
    --product-name-red: #111111;
    --rating-color: #ff9800;
    --desktop-max: 1680px;
    --section-pad: clamp(12px, 2vw, 28px);
    --radius-main: 24px;
    --radius-card: 18px;
    --radius-small: 14px;
    --header-height: 84px;
  }

  [data-theme="dark"] {
    --bg: #0f1115;
    --bg-2: #171a20;
    --card-bg: #161a22;
    --text: #f8fafc;
    --muted: #a1a1aa;
    --muted-2: #8b95a7;
    --primary: #ffffff;
    --primary-2: #d1d5db;
    --border: #232833;
    --soft-border: #1d2330;
    --shadow: rgba(0, 0, 0, 0.25);
    --shadow-2: rgba(0, 0, 0, 0.32);
    --product-border: #232833;
    --product-name-red: #ffffff;
    --rating-color: #fbbf24;
  }

  body {
    font-family: 'Poppins', Arial, sans-serif;
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 22%, var(--bg) 100%);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  a, button, input { font-family: inherit; }

  /* =========================
     HEADER
  ========================= */
  .main-header {
    background: transparent;
    padding: calc(10px + env(safe-area-inset-top)) 12px 8px;
    width: 100%;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(10px);
  }

  .header-inner {
    width: 100%;
    max-width: var(--desktop-max);
    margin: 0 auto;
  }

  .header-top-row {
    width: min(100%, 980px);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.6fr 1fr 1fr 0.8fr;
    gap: 10px;
    align-items: center;
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 24px;
    padding: 10px;
    box-shadow: 0 8px 24px var(--shadow);
  }

  [data-theme="dark"] .header-top-row {
    background: rgba(22,26,34,0.88);
    border-color: rgba(255,255,255,0.04);
  }

  .header-top-row.no-install {
    grid-template-columns: 1.8fr 1fr 0.9fr;
  }

  .shopplus-logo {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--primary);
    background: var(--card-bg);
    padding: 12px 16px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    min-height: 56px;
    box-shadow: 0 4px 14px var(--shadow);
    border: 1px solid var(--border);
    letter-spacing: 0.2px;
  }

  .shopplus-logo .plus {
    color: #ff9800;
    font-size: 1.55rem;
    font-weight: 900;
    line-height: 1;
  }

  /* =========================
     SHOPPLUS STORY BUTTON
  ========================= */
  .shopplus-story-btn {
    position: relative;
    overflow: visible;
    cursor: pointer;
  }

  .shopplus-story-btn .shopplus-story-inner {
    width: 100%;
    height: 100%;
    min-height: inherit;
    border-radius: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: var(--card-bg);
    border-radius: 16px;
    position: relative;
    z-index: 2;
  }

  .shopplus-story-btn.has-story::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 21px;
    background: linear-gradient(135deg, #00c6ff, #00ff99, #4facfe, #38bdf8);
    background-size: 300% 300%;
    animation: shopplusStoryGlow 3s ease infinite;
    z-index: 0;
    box-shadow: 0 0 14px rgba(0, 198, 255, 0.22), 0 0 18px rgba(0, 255, 153, 0.18);
  }

  .shopplus-story-btn.story-seen::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    background: linear-gradient(135deg, #d7d7dc, #e9e9ef);
    z-index: 0;
  }

  [data-theme="dark"] .shopplus-story-btn.story-seen::before {
    background: linear-gradient(135deg, #2a3140, #3b4456);
  }

  @keyframes shopplusStoryGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* =========================
     STORY VIEWER MODAL
  ========================= */
  .story-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0, 0, 0, 0.96);
    display: none;
    align-items: center;
    justify-content: center;
  }

  .story-modal.show {
    display: flex;
  }

  .story-viewer {
    width: min(100vw, 420px);
    height: 100vh;
    max-height: 100vh;
    position: relative;
    background: #000;
    overflow: hidden;
  }

  .story-progress-wrap {
    position: absolute;
    top: calc(10px + env(safe-area-inset-top));
    left: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
    z-index: 5;
  }

  .story-progress {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    overflow: hidden;
  }

  .story-progress-fill {
    height: 100%;
    width: 0%;
    background: #ffffff;
    border-radius: 999px;
    transition: width 0.08s linear;
  }

  .story-topbar {
    position: absolute;
    top: calc(24px + env(safe-area-inset-top));
    left: 14px;
    right: 14px;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #fff;
  }

  .story-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 14px;
  }

  .story-brand-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00c6ff, #00ff99);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #111;
    font-weight: 800;
  }

  .story-close {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
  }

  .story-media {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .story-media img,
  .story-media video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .story-caption {
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: calc(20px + env(safe-area-inset-bottom));
    z-index: 6;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.45;
    background: linear-gradient(to top, rgba(0,0,0,0.72), rgba(0,0,0,0));
    padding: 40px 10px 8px;
    border-radius: 14px;
  }

  .story-nav-zone {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 50%;
    z-index: 7;
  }

  .story-nav-left { left: 0; }
  .story-nav-right { right: 0; }

  .story-loading {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.9);
    font-weight: 700;
    font-size: 15px;
  }

  .story-hidden {
    display: none !important;
  }

  .header-btn,
  .brand-toggle-btn,
  .install-btn {
    width: 100%;
    min-height: 56px;
    text-decoration: none;
    background: var(--card-bg);
    color: var(--text);
    font-weight: 700;
    font-size: 0.84rem;
    padding: 10px 8px;
    border-radius: 18px;
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    transition: 0.25s ease;
    outline: none;
    box-shadow: 0 4px 14px var(--shadow);
  }

  .header-btn:hover,
  .brand-toggle-btn:hover,
  .install-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px var(--shadow-2);
  }

  .profile-btn {
    font-size: 1.25rem;
  }

  .install-btn {
    gap: 6px;
    display: none;
  }

  .install-btn.show {
    display: inline-flex;
  }

  .brand-filter-wrapper { position: relative; width: 100%; }
  .brand-toggle-btn { gap: 8px; }

  .brand-dropdown {
    position: absolute;
    top: calc(100% + 10px);
    left: 0;
    width: 100%;
    min-width: 170px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 16px 30px rgba(0, 0, 0, 0.12);
    z-index: 1000;
    padding: 8px 0;
    max-height: 300px;
    overflow-y: auto;
  }

  .brand-dropdown.hidden { display: none; }

  .brand-item {
    padding: 11px 14px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: background 0.2s ease;
  }

  .brand-item:hover {
    background: rgba(0, 0, 0, 0.04);
  }

  [data-theme="dark"] .brand-item:hover {
    background: rgba(255,255,255,0.05);
  }

  .brand-item.active {
    background: rgba(255, 152, 0, 0.12);
    color: #ff9800;
    font-weight: 700;
  }

  /* =========================
     SEARCH SECTION
  ========================= */
  .search-section {
    padding: 6px 12px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .search-inner {
    width: 100%;
    max-width: var(--desktop-max);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .search-form {
    width: min(100%, 980px);
    display: flex;
  }

  .search-form input {
    width: 100%;
    border-radius: 18px;
    border: 1px solid var(--border);
    padding: 15px 18px;
    font-size: 15px;
    outline: none;
    background: var(--card-bg);
    color: var(--text);
    box-shadow: 0 4px 14px var(--shadow);
  }

  .search-form input::placeholder {
    color: var(--muted);
  }

  .search-form input:focus {
    border-color: #d8d8de;
    box-shadow: 0 6px 18px var(--shadow-2);
  }

  /* =========================
     CATEGORY
  ========================= */
  .category-icons {
    margin: 12px 0 0;
    width: min(100%, 980px);
    display: flex;
    flex-wrap: nowrap;
    justify-content: flex-start;
    gap: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 2px 2px 8px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .category-icons::-webkit-scrollbar { display: none; }

  .category-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--card-bg);
    border-radius: 18px;
    width: 78px;
    height: 78px;
    min-width: 78px;
    min-height: 78px;
    box-shadow: 0 4px 14px var(--shadow);
    cursor: pointer;
    transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
    color: var(--text);
    flex-shrink: 0;
    padding: 8px;
    border: 1px solid var(--border);
  }

  .category-icon.selected,
  .category-icon:hover {
    background: #111111;
    color: #ffffff;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  }

  [data-theme="dark"] .category-icon.selected,
  [data-theme="dark"] .category-icon:hover {
    background: #ffffff;
    color: #111111;
  }

  .category-icon svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
    flex-shrink: 0;
  }

  .category-label {
    font-size: 0.65rem;
    margin-top: 5px;
    font-weight: 700;
    color: inherit;
    text-align: center;
    line-height: 1.05;
    max-width: 62px;
    white-space: normal;
    word-break: break-word;
  }

  /* =========================
     APP SHORTCUTS
  ========================= */
  .app-shortcuts-section {
    width: 100%;
    max-width: var(--desktop-max);
    margin: 8px auto 4px;
    padding: 0 var(--section-pad);
  }

  .app-shortcuts-title {
    font-size: 1rem;
    font-weight: 800;
    color: var(--text);
    margin: 0 0 10px;
    padding-left: 2px;
  }

  .app-shortcuts-slider {
    width: 100%;
    overflow: hidden;
    position: relative;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: pan-y;
  }

  .app-shortcuts-slider.dragging {
    cursor: grabbing;
  }

  .app-shortcuts-track {
    display: flex;
    flex-wrap: nowrap;
    gap: 14px;
    align-items: flex-start;
    width: max-content;
    will-change: transform;
    padding: 2px 2px 8px;
  }

  .app-shortcut-card {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    flex: 0 0 auto;
    min-width: 84px;
    max-width: 84px;
    padding: 2px 0;
    background: transparent;
    border: none;
    box-shadow: none;
  }

  .app-shortcut-logo-wrap {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 6px;
    padding: 7px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border: 1px solid var(--border);
    box-shadow: 0 4px 14px var(--shadow);
  }

  .app-shortcut-card:hover .app-shortcut-logo-wrap {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px var(--shadow-2);
  }

  .app-shortcut-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .app-shortcut-name {
    font-size: 0.72rem;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    line-height: 1.1;
    word-break: break-word;
  }

  .app-shortcut-fallback {
    min-width: 100%;
    text-align: center;
    padding: 10px;
    color: var(--muted);
    font-weight: 600;
  }

  /* =========================
     ADS
  ========================= */
  .ads-section {
    width: 100%;
    max-width: var(--desktop-max);
    margin: 4px auto 10px;
    padding: 0 var(--section-pad);
    display: none;
  }

  .ads-slider {
    width: 100%;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: var(--card-bg);
    box-shadow: 0 6px 18px var(--shadow);
    min-height: 120px;
    touch-action: pan-y;
  }

  .ads-viewport {
    width: 100%;
    overflow: hidden;
    position: relative;
  }

  .ads-track {
    display: flex;
    will-change: transform;
    transition: transform 0.55s ease-in-out;
  }

  .ad-slide {
    min-width: 100%;
    width: 100%;
    flex: 0 0 100%;
    user-select: none;
  }

  .ad-slide a,
  .ad-slide .ad-no-link {
    display: block;
    width: 100%;
    text-decoration: none;
  }

  .ad-slide img {
    width: 100%;
    display: block;
    object-fit: cover;
    aspect-ratio: 16 / 4;
    background: #ffffff;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  /* =========================
     PRODUCTS
  ========================= */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 14px;
    padding: 10px var(--section-pad) 28px;
    max-width: var(--desktop-max);
    margin: 0 auto;
    min-height: 300px;
    width: 100%;
  }

  .product-card {
    background: var(--card-bg);
    border: 1px solid var(--product-border);
    border-radius: 20px;
    box-shadow: 0 6px 18px var(--shadow);
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.2s ease;
    opacity: 0;
    transform: translateY(8px);
    text-decoration: none;
    overflow: hidden;
  }

  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 24px var(--shadow-2);
  }

  .product-image-box {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    overflow: hidden;
  }

  [data-theme="dark"] .product-image-box { background: #ffffff; }

  .product-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .product-info {
    padding: 10px 10px 12px;
    border-top: 1px solid var(--soft-border);
  }

  .product-card h2 {
    font-size: 14px;
    font-weight: 700;
    color: var(--product-name-red);
    margin: 0 0 6px;
    text-align: center;
    line-height: 1.24;
    min-height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .product-rating {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--rating-color);
    line-height: 1.1;
  }

  .no-rating {
    color: var(--muted);
    font-weight: 600;
  }

  .loading-text,
  .empty-text,
  .error-text {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    grid-column: 1 / -1;
    margin-top: 24px;
  }

  .loading-text { color: var(--muted); }
  .empty-text { color: var(--muted); }
  .error-text { color: #e53935; }

  /* =========================
     MOBILE APP STYLE
  ========================= */
  @media (max-width: 700px) {
    :root { --section-pad: 10px; }

    body {
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
    }

    .main-header {
      padding: calc(10px + env(safe-area-inset-top)) 10px 6px;
    }

    .header-top-row {
      width: 100%;
      gap: 8px;
      grid-template-columns: 1.5fr 1fr 1fr 0.8fr;
      border-radius: 20px;
      padding: 8px;
    }

    .header-top-row.no-install {
      grid-template-columns: 1.8fr 1fr 0.8fr;
    }

    .shopplus-logo {
      font-size: 1.08rem;
      padding: 10px 10px;
      border-radius: 16px;
      min-height: 50px;
    }

    .shopplus-logo .plus {
      font-size: 1.35rem;
    }

    .shopplus-story-btn.has-story::before {
      border-radius: 19px;
    }

    .shopplus-story-btn.story-seen::before {
      border-radius: 18px;
    }

    .header-btn,
    .brand-toggle-btn,
    .install-btn {
      min-height: 50px;
      font-size: 0.72rem;
      padding: 8px 4px;
      border-radius: 16px;
    }

    .profile-btn {
      font-size: 1.15rem;
    }

    .search-section { padding: 6px 10px 6px; }
    .search-form { width: 100%; }

    .search-form input {
      padding: 13px 14px;
      font-size: 14px;
      border-radius: 16px;
    }

    .category-icons {
      width: 100%;
      gap: 10px;
      margin-top: 10px;
      padding: 2px 2px 6px;
    }

    .category-icon {
      width: 72px;
      height: 72px;
      min-width: 72px;
      min-height: 72px;
      padding: 6px;
      border-radius: 16px;
    }

    .category-icon svg {
      width: 20px;
      height: 20px;
    }

    .category-label {
      font-size: 0.62rem;
      margin-top: 4px;
      max-width: 58px;
    }

    .app-shortcuts-section {
      padding: 0 10px;
      margin-top: 6px;
      margin-bottom: 2px;
    }

    .app-shortcuts-title {
      font-size: 0.92rem;
      margin-bottom: 8px;
    }

    .app-shortcuts-track {
      gap: 12px;
      padding-bottom: 6px;
    }

    .app-shortcut-card {
      min-width: 74px;
      max-width: 74px;
    }

    .app-shortcut-logo-wrap {
      width: 50px;
      height: 50px;
      border-radius: 14px;

<script>
  const BACKEND_URL = "https://my-store-e28j.onrender.com";

  const categories = [
    { name: 'Overall', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>' },
    { name: 'Electronics', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="7" y="4" width="10" height="4" rx="1"/><rect x="9" y="10" width="6" height="10" rx="2"/></svg>' },
    { name: 'Fashion', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 4h10v14H7z"/><ellipse cx="12" cy="18" rx="4" ry="2" /></svg>' },
    { name: 'Home', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9v9a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3z"/></svg>' },
    { name: 'Accessories', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="8" cy="12" r="1"/><circle cx="16" cy="12" r="1"/></svg>' },
    { name: 'Sports', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4l3 7h7l-5 5 2 7-6-4-6 4 2-7-5-5h7z"/></svg>' },
    { name: 'Beauty', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/><path d="M12 18v6M12 6V0"/></svg>' },
    { name: 'Gadgets', icon: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2"/><circle cx="12" cy="21" r="1"/></svg>' }
  ];

  const categoryBar = document.getElementById('categoryBar');
  const searchInput = document.getElementById('searchBar');
  const productList = document.getElementById('product-list');
  const appShortcutsRow = document.getElementById('appShortcutsRow');
  const appShortcutsSlider = document.getElementById('appShortcutsSlider');

  const brandToggleBtn = document.getElementById('brandToggleBtn');
  const brandDropdown = document.getElementById('brandDropdown');
  const brandArrow = document.getElementById('brandArrow');
  const brandBtnText = document.getElementById('brandBtnText');
  const brandItems = document.querySelectorAll('.brand-item');

  const headerTopRow = document.getElementById('headerTopRow');
  const installBtn = document.getElementById('installBtn');
  let deferredPrompt = null;

  const adsSection = document.getElementById('adsSection');
  const adsSlider = document.getElementById('adsSlider');
  const adsTrack = document.getElementById('adsTrack');

  // STORY ELEMENTS
  const shopplusStoryBtn = document.getElementById('shopplusStoryBtn');
  const storyModal = document.getElementById('storyModal');
  const storyProgressWrap = document.getElementById('storyProgressWrap');
  const storyMedia = document.getElementById('storyMedia');
  const storyCaption = document.getElementById('storyCaption');
  const storyLoading = document.getElementById('storyLoading');
  const storyCloseBtn = document.getElementById('storyCloseBtn');
  const storyPrevZone = document.getElementById('storyPrevZone');
  const storyNextZone = document.getElementById('storyNextZone');

  let selectedCategory = 'Overall';
  let allProducts = [];
  let jsonProductsCache = [];
  let backendProductsCache = [];

  let adsInterval = null;
  let realAdsCount = 0;
  let currentSlideIndex = 1;
  let isDragging = false;
  let startX = 0;
  let currentTranslate = 0;
  let prevTranslate = 0;

  // APP SHORTCUTS AUTO SCROLL VARIABLES
  let appsAnimationFrame = null;
  let appsAutoScrollPaused = false;
  let appsIsDragging = false;
  let appsStartX = 0;
  let appsDragStartTranslate = 0;
  let appsCurrentTranslate = 0;
  let appsSingleSetWidth = 0;
  let appsLastFrameTime = 0;
  const APPS_SCROLL_SPEED = 0.15;

  // STORY VARIABLES
  let storiesData = [];
  let currentStoryIndex = 0;
  let storyTimer = null;
  let storyProgressTimer = null;
  let storyDuration = 5000;
  let currentStoryVersion = "0";

  /* =========================
     INSTALL BUTTON
  ========================= */
  function isStandaloneMode() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  function hideInstallButton() {
    installBtn.classList.remove('show');
    headerTopRow.classList.add('no-install');
  }

  function showInstallButton() {
    installBtn.classList.add('show');
    headerTopRow.classList.remove('no-install');
  }

  function setupInstallButton() {
    if (isStandaloneMode()) {
      hideInstallButton();
      return;
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      showInstallButton();
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;

      if (outcome === 'accepted') {
        hideInstallButton();
      }

      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      hideInstallButton();
      deferredPrompt = null;
    });

    setTimeout(() => {
      if (!deferredPrompt && !isStandaloneMode()) {
        hideInstallButton();
      }
    }, 3000);
  }

  /* =========================
     CATEGORY
  ========================= */
  function createCategoryIcon(cat) {
    const el = document.createElement('div');
    el.className = 'category-icon' + (cat.name === selectedCategory ? ' selected' : '');
    el.setAttribute('data-cat', cat.name);
    el.innerHTML = cat.icon + '<div class="category-label">' + cat.name + '</div>';

    el.addEventListener('click', () => {
      if (selectedCategory === cat.name) return;
      selectedCategory = cat.name;
      updateCategorySelection();
      filterProducts();
    });

    return el;
  }

  function updateCategorySelection() {
    Array.from(categoryBar.children).forEach(el => {
      el.classList.toggle('selected', el.getAttribute('data-cat') === selectedCategory);
    });
  }

  categories.forEach(cat => categoryBar.appendChild(createCategoryIcon(cat)));

  /* =========================
     SEARCH
  ========================= */
  searchInput.addEventListener('input', () => {
    selectedCategory = 'Overall';
    updateCategorySelection();
    syncBrandSelectionFromSearch();
    filterProducts();
  });

  /* =========================
     APP SHORTCUTS
  ========================= */
  async function loadAppShortcuts() {
    try {
      const response = await fetch("/my-store/apps.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`apps.json error: ${response.status}`);

      const apps = await response.json();
      if (!Array.isArray(apps)) throw new Error("apps.json must contain an array");

      if (apps.length === 0) {
        appShortcutsRow.innerHTML = '<div class="app-shortcut-fallback">No apps added yet.</div>';
        return;
      }

      appShortcutsRow.innerHTML = '';

      const originalCards = apps.map(app => createAppShortcutCard(app));
      const cloneCards = apps.map(app => createAppShortcutCard(app));

      originalCards.forEach(card => appShortcutsRow.appendChild(card));
      cloneCards.forEach(card => appShortcutsRow.appendChild(card));

      requestAnimationFrame(() => {
        setupAppShortcutsAutoScroll();
      });

    } catch (error) {
      console.error("apps.json fetch error:", error);
      appShortcutsRow.innerHTML = '<div class="app-shortcut-fallback">Error loading app shortcuts.</div>';
    }
  }

  function createAppShortcutCard(app) {
    const appCard = document.createElement('a');
    appCard.className = 'app-shortcut-card';
    appCard.href = app.link || '#';

    if (/^https?:\/\//i.test(app.link || '')) {
      appCard.target = '_blank';
      appCard.rel = 'noopener noreferrer';
    }

    appCard.innerHTML = `
      <div class="app-shortcut-logo-wrap">
        <img src="${app.image || 'https://via.placeholder.com/100'}" alt="${app.name || 'App'}" class="app-shortcut-logo" />
      </div>
      <div class="app-shortcut-name">${app.name || 'App'}</div>
    `;

    return appCard;
  }

  function setupAppShortcutsAutoScroll() {
    stopAppShortcutsAutoScroll();

    const cards = appShortcutsRow.querySelectorAll('.app-shortcut-card');
    if (!cards.length) return;

    const totalWidth = appShortcutsRow.scrollWidth;
    appsSingleSetWidth = totalWidth / 2;
    appsCurrentTranslate = 0;
    appsLastFrameTime = 0;

    applyAppShortcutsTransform();
    startAppShortcutsAutoScroll();
    setupAppShortcutsDrag();
  }

  function applyAppShortcutsTransform() {
    appShortcutsRow.style.transform = `translateX(${-appsCurrentTranslate}px)`;
  }

  function startAppShortcutsAutoScroll() {
    function step(timestamp) {
      if (!appsLastFrameTime) appsLastFrameTime = timestamp;
      const delta = timestamp - appsLastFrameTime;
      appsLastFrameTime = timestamp;

      if (!appsAutoScrollPaused && !appsIsDragging && appsSingleSetWidth > 0) {
        appsCurrentTranslate += APPS_SCROLL_SPEED * delta;

        if (appsCurrentTranslate >= appsSingleSetWidth) {
          appsCurrentTranslate -= appsSingleSetWidth;
        }

        applyAppShortcutsTransform();
      }

      appsAnimationFrame = requestAnimationFrame(step);
    }

    appsAnimationFrame = requestAnimationFrame(step);
  }

  function stopAppShortcutsAutoScroll() {
    if (appsAnimationFrame) {
      cancelAnimationFrame(appsAnimationFrame);
      appsAnimationFrame = null;
    }
  }

  function normalizeAppsTranslate() {
    if (appsSingleSetWidth <= 0) return;

    while (appsCurrentTranslate < 0) {
      appsCurrentTranslate += appsSingleSetWidth;
    }

    while (appsCurrentTranslate >= appsSingleSetWidth) {
      appsCurrentTranslate -= appsSingleSetWidth;
    }
  }

  function setupAppShortcutsDrag() {
    if (appShortcutsSlider.dataset.dragReady === "true") return;
    appShortcutsSlider.dataset.dragReady = "true";

    appShortcutsSlider.addEventListener('mouseenter', () => {
      appsAutoScrollPaused = true;
    });

    appShortcutsSlider.addEventListener('mouseleave', () => {
      if (!appsIsDragging) appsAutoScrollPaused = false;
    });

    appShortcutsSlider.addEventListener('touchstart', appTouchStart, { passive: true });
    appShortcutsSlider.addEventListener('touchmove', appTouchMove, { passive: false });
    appShortcutsSlider.addEventListener('touchend', appTouchEnd);
    appShortcutsSlider.addEventListener('touchcancel', appTouchEnd);

    appShortcutsSlider.addEventListener('mousedown', appMouseStart);
    window.addEventListener('mousemove', appMouseMove);
    window.addEventListener('mouseup', appMouseEnd);
    window.addEventListener('mouseleave', appMouseEnd);

    appShortcutsSlider.addEventListener('dragstart', (e) => e.preventDefault());

    window.addEventListener('resize', () => {
      const cards = appShortcutsRow.querySelectorAll('.app-shortcut-card');
      if (!cards.length) return;

      const totalWidth = appShortcutsRow.scrollWidth;
      appsSingleSetWidth = totalWidth / 2;
      normalizeAppsTranslate();
      applyAppShortcutsTransform();
    });
  }

  function appTouchStart(e) {
    if (!appsSingleSetWidth) return;
    appsIsDragging = true;
    appsAutoScrollPaused = true;
    appsStartX = e.touches[0].clientX;
    appsDragStartTranslate = appsCurrentTranslate;
    appShortcutsSlider.classList.add('dragging');
  }

  function appTouchMove(e) {
    if (!appsIsDragging) return;
    const currentX = e.touches[0].clientX;
    const diff = currentX - appsStartX;

    if (Math.abs(diff) > 4) e.preventDefault();

    appsCurrentTranslate = appsDragStartTranslate - diff;
    normalizeAppsTranslate();
    applyAppShortcutsTransform();
  }

  function appTouchEnd() {
    if (!appsIsDragging) return;
    appsIsDragging = false;
    appShortcutsSlider.classList.remove('dragging');
    setTimeout(() => {
      appsAutoScrollPaused = false;
    }, 500);
  }

  function appMouseStart(e) {
    if (!appsSingleSetWidth) return;
    appsIsDragging = true;
    appsAutoScrollPaused = true;
    appsStartX = e.clientX;
    appsDragStartTranslate = appsCurrentTranslate;
    appShortcutsSlider.classList.add('dragging');
  }

  function appMouseMove(e) {
    if (!appsIsDragging) return;
    const diff = e.clientX - appsStartX;

    appsCurrentTranslate = appsDragStartTranslate - diff;
    normalizeAppsTranslate();
    applyAppShortcutsTransform();
  }

  function appMouseEnd() {
    if (!appsIsDragging) return;
    appsIsDragging = false;
    appShortcutsSlider.classList.remove('dragging');
    setTimeout(() => {
      appsAutoScrollPaused = false;
    }, 500);
  }

  /* =========================
     ADS
  ========================= */
  async function loadAds() {
    try {
      const response = await fetch("/my-store/ads.json", { cache: "no-store" });

      if (!response.ok) {
        adsSection.style.display = 'none';
        return;
      }

      const ads = await response.json();

      if (!Array.isArray(ads) || ads.length === 0) {
        adsSection.style.display = 'none';
        return;
      }

      adsTrack.innerHTML = '';
      adsSection.style.display = 'block';
      realAdsCount = ads.length;

      if (realAdsCount === 1) {
        const slide = createAdSlide(ads[0]);
        adsTrack.appendChild(slide);
        currentSlideIndex = 0;
        updateAdPosition(false);
        return;
      }

      adsTrack.appendChild(createAdSlide(ads[realAdsCount - 1], true));
      ads.forEach(ad => adsTrack.appendChild(createAdSlide(ad)));
      adsTrack.appendChild(createAdSlide(ads[0], true));

      currentSlideIndex = 1;
      updateAdPosition(false);

      setupAdInfiniteLoop();
      setupAdSwipe();
      startAdsAutoSlide();

    } catch (error) {
      console.error("ads.json fetch error:", error);
      adsSection.style.display = 'none';
    }
  }

  function createAdSlide(ad, isClone = false) {
    const slide = document.createElement('div');
    slide.className = 'ad-slide';
    if (isClone) slide.setAttribute('data-clone', 'true');

    const imageSrc = ad.image || 'https://via.placeholder.com/1200x280/ffffff/111111?text=Advertisement';

    if (ad.link && ad.link.trim() !== '') {
      slide.innerHTML = `
        <a href="${ad.link}" ${/^https?:\/\//i.test(ad.link) ? 'target="_blank" rel="noopener noreferrer"' : ''}>
          <img src="${imageSrc}" alt="Advertisement" loading="lazy" draggable="false" />
        </a>
      `;
    } else {
      slide.innerHTML = `
        <div class="ad-no-link">
          <img src="${imageSrc}" alt="Advertisement" loading="lazy" draggable="false" />
        </div>
      `;
    }

    return slide;
  }

  function getAdWidth() { return adsSlider.clientWidth; }

  function updateAdPosition(animated = true) {
    const offset = -currentSlideIndex * getAdWidth();
    adsTrack.style.transition = animated ? 'transform 0.55s ease-in-out' : 'none';
    adsTrack.style.transform = `translateX(${offset}px)`;
    currentTranslate = offset;
    prevTranslate = offset;
  }

  function nextAd() {
    if (realAdsCount <= 1) return;
    currentSlideIndex++;
    updateAdPosition(true);
  }

  function setupAdInfiniteLoop() {
    adsTrack.addEventListener('transitionend', () => {
      if (currentSlideIndex === realAdsCount + 1) {
        currentSlideIndex = 1;
        updateAdPosition(false);
      }

      if (currentSlideIndex === 0) {
        currentSlideIndex = realAdsCount;
        updateAdPosition(false);
      }
    });

    window.addEventListener('resize', () => updateAdPosition(false));
  }

  function startAdsAutoSlide() {
    stopAdsAutoSlide();
    if (realAdsCount <= 1) return;
    adsInterval = setInterval(() => nextAd(), 3000);
  }

  function stopAdsAutoSlide() {
    if (adsInterval) {
      clearInterval(adsInterval);
      adsInterval = null;
    }
  }

  function restartAdsAutoSlide() {
    stopAdsAutoSlide();
    startAdsAutoSlide();
  }

  function setupAdSwipe() {
    adsSlider.addEventListener('touchstart', touchStart, { passive: true });
    adsSlider.addEventListener('touchmove', touchMove, { passive: false });
    adsSlider.addEventListener('touchend', touchEnd);

    adsSlider.addEventListener('mousedown', mouseStart);
    adsSlider.addEventListener('mousemove', mouseMove);
    adsSlider.addEventListener('mouseup', mouseEnd);
    adsSlider.addEventListener('mouseleave', mouseEnd);

    adsSlider.addEventListener('dragstart', (e) => e.preventDefault());
  }

  function touchStart(e) {
    if (realAdsCount <= 1) return;
    isDragging = true;
    startX = e.touches[0].clientX;
    stopAdsAutoSlide();
    adsTrack.style.transition = 'none';
  }

  function touchMove(e) {
    if (!isDragging) return;
    const currentX = e.touches[0].clientX;
    const diff = currentX - startX;

    if (Math.abs(diff) > 6) e.preventDefault();

    currentTranslate = prevTranslate + diff;
    setSliderPosition();
  }

  function touchEnd(e) {
    if (!isDragging) return;
    finishSwipe(e.changedTouches[0].clientX);
  }

  function mouseStart(e) {
    if (realAdsCount <= 1) return;
    isDragging = true;
    startX = e.clientX;
    stopAdsAutoSlide();
    adsTrack.style.transition = 'none';
  }

  function mouseMove(e) {
    if (!isDragging) return;
    const currentX = e.clientX;
    const diff = currentX - startX;
    currentTranslate = prevTranslate + diff;
    setSliderPosition();
  }

  function mouseEnd(e) {
    if (!isDragging) return;
    finishSwipe(e.clientX);
  }

  function finishSwipe(endX) {
    isDragging = false;
    const movedBy = endX - startX;
    const threshold = Math.max(50, getAdWidth() * 0.12);

    if (movedBy < -threshold) {
      currentSlideIndex++;
    } else if (movedBy > threshold) {
      currentSlideIndex--;
    }

    updateAdPosition(true);
    restartAdsAutoSlide();
  }

  function setSliderPosition() {
    adsTrack.style.transform = `translateX(${currentTranslate}px)`;
  }

  /* =========================
     PRODUCTS
  ========================= */
  function getDisplayRating(rating) {
    if (rating === null || rating === undefined || rating === "") return null;

    const numeric = Number(String(rating).replace(/[^\d.]/g, ""));
    if (!isNaN(numeric) && numeric > 0) return numeric.toFixed(1);

    return null;
  }

  function extractProductsArray(data) {
    if (Array.isArray(data)) return data;
    if (data && Array.isArray(data.products)) return data.products;
    if (data && Array.isArray(data.data)) return data.data;
    return [];
  }

  function normalizeProduct(p, source, index) {
    const rawId = p._id || p.id || `fallback-${source}-${index}`;
    const fallbackImage = "https://via.placeholder.com/300x300?text=No+Image";

    let image = fallbackImage;

    if (p.image && String(p.image).trim()) {
      image = String(p.image).trim();
    } else if (Array.isArray(p.images) && p.images.length && p.images[0]) {
      image = String(p.images[0]).trim();
    }

    const timeValue = new Date(p.updatedAt || p.createdAt || 0).getTime();

    let fallbackOrder = 0;
    if (typeof p.sortOrder === "number" && !isNaN(p.sortOrder)) {
      fallbackOrder = p.sortOrder;
    } else {
      fallbackOrder = source === "json" ? (index + 1) : 0;
    }

    return {
      id: String(rawId),
      source,
      name: p.name || 'Unnamed Product',
      price: p.price ?? '',
      image,
      description: p.description || 'No description available.',
      category: p.category || 'Overall',
      brand: p.brand || '',
      rating: p.rating,
      displayRating: getDisplayRating(p.rating),
      link: p.link || '#',
      createdAt: p.createdAt || null,
      updatedAt: p.updatedAt || null,
      timeValue: isNaN(timeValue) ? 0 : timeValue,
      fallbackOrder
    };
  }

  function mergeAndSortProducts() {
    const normalizedJson = jsonProductsCache.map((p, index) => normalizeProduct(p, "json", index));
    const normalizedBackend = backendProductsCache.map((p, index) => normalizeProduct(p, "backend", index));

    const combined = [...normalizedJson, ...normalizedBackend];

    const uniqueMap = new Map();
    combined.forEach(item => {
      uniqueMap.set(`${item.source}-${item.id}`, item);
    });

    const uniqueProducts = Array.from(uniqueMap.values());

    uniqueProducts.sort((a, b) => {
      if (a.timeValue !== b.timeValue) {
        return b.timeValue - a.timeValue;
      }

      if (a.fallbackOrder !== b.fallbackOrder) {
        return b.fallbackOrder - a.fallbackOrder;
      }

      return 0;
    });

    allProducts = uniqueProducts;
    filterProducts();
  }

  async function loadProducts() {
    productList.innerHTML = '<p class="loading-text">Loading products...</p>';

    allProducts = [];
    jsonProductsCache = [];
    backendProductsCache = [];

    const jsonPromise = fetch("/my-store/products.json", { cache: "no-store" })
      .then(async (res) => {
        if (!res.ok) throw new Error(`products.json error: ${res.status}`);
        const data = await res.json();
        return extractProductsArray(data);
      })
      .catch((err) => {
        console.error("products.json fetch error:", err);
        return [];
      });

    const backendPromise = fetch(`${BACKEND_URL}/api/products`, { cache: "no-store" })
      .then(async (res) => {
        if (!res.ok) throw new Error(`backend products error: ${res.status}`);
        const data = await res.json();
        const arr = extractProductsArray(data);
        console.log("Affiliate products fetched:", arr);
        return arr;
      })
      .catch((err) => {
        console.error("backend products fetch error:", err);
        return null;
      });

    jsonProductsCache = await jsonPromise;

    const backendFastResult = await Promise.race([
      backendPromise,
      new Promise(resolve => setTimeout(() => resolve("TIMEOUT"), 2500))
    ]);

    if (backendFastResult !== "TIMEOUT" && backendFastResult !== null) {
      backendProductsCache = backendFastResult;
      mergeAndSortProducts();
      return;
    }

    if (jsonProductsCache.length > 0) {
      mergeAndSortProducts();
    } else {
      productList.innerHTML = '<p class="loading-text">Loading latest products...</p>';
    }

    backendPromise.then((backendData) => {
      if (backendData && Array.isArray(backendData)) {
        backendProductsCache = backendData;
        mergeAndSortProducts();
      } else if (!jsonProductsCache.length && !backendProductsCache.length) {
        productList.innerHTML = '<p class="error-text">Error loading products. Please try again later.</p>';
      }
    });
  }

  function displayProducts(products) {
    if (products.length === 0) {
      productList.innerHTML = '<p class="empty-text">No products found.</p>';
      return;
    }

    productList.innerHTML = '';

    products.forEach((p, i) => {
      const card = document.createElement('a');
      card.className = 'product-card';
      card.style.opacity = 0;

      card.href = `product.html?id=${encodeURIComponent(p.id)}&source=${encodeURIComponent(p.source)}`;

      const ratingHtml = p.displayRating
        ? `${p.displayRating} ⭐`
        : `<span class="no-rating">No rating yet</span>`;

      card.innerHTML = `
        <div class="product-image-box">
          <img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x300?text=No+Image';" />
        </div>
        <div class="product-info">
          <h2>${p.name}</h2>
          <div class="product-rating">${ratingHtml}</div>
        </div>
      `;

      productList.appendChild(card);

      requestAnimationFrame(() => {
        setTimeout(() => {
          card.style.opacity = 1;
          card.style.transform = 'translateY(0)';
        }, i * 10);
      });
    });
  }

  function filterProducts() {
    const searchText = searchInput.value.trim().toLowerCase();
    let filtered = [...allProducts];

    if (selectedCategory !== 'Overall') {
      filtered = filtered.filter(p => (p.category || '').toLowerCase() === selectedCategory.toLowerCase());
    }

    if (searchText.length > 0) {
      filtered = filtered.filter(p =>
        (p.name || '').toLowerCase().includes(searchText) ||
        (p.description || '').toLowerCase().includes(searchText) ||
        (p.brand || '').toLowerCase().includes(searchText)
      );
    }

    displayProducts(filtered);
  }

  /* =========================
     BRAND FILTER
  ========================= */
  function setActiveBrand(selectedBrand) {
    brandItems.forEach(item => {
      item.classList.toggle('active', item.getAttribute('data-brand').toLowerCase() === selectedBrand.toLowerCase());
    });
  }

  function syncBrandSelectionFromSearch() {
    const searchText = searchInput.value.trim().toLowerCase();

    let matchedBrand = 'all';
    brandItems.forEach(item => {
      const brand = item.getAttribute('data-brand').toLowerCase();
      if (brand !== 'all' && brand === searchText) matchedBrand = brand;
    });

    setActiveBrand(matchedBrand);

    if (matchedBrand === 'all') {
      brandBtnText.textContent = '🏷️ Brand';
    } else {
      const activeItem = Array.from(brandItems).find(item => item.getAttribute('data-brand').toLowerCase() === matchedBrand);
      brandBtnText.textContent = `🏷️ ${activeItem.getAttribute('data-brand')}`;
    }
  }

  brandToggleBtn.addEventListener('click', () => {
    brandDropdown.classList.toggle('hidden');
    brandArrow.textContent = brandDropdown.classList.contains('hidden') ? '▼' : '▲';
  });

  brandItems.forEach(item => {
    item.addEventListener('click', () => {
      const selectedBrand = item.getAttribute('data-brand');

      setActiveBrand(selectedBrand);

      if (selectedBrand === 'all') {
        searchInput.value = '';
        brandBtnText.textContent = '🏷️ Brand';
      } else {
        searchInput.value = selectedBrand;
        brandBtnText.textContent = `🏷️ ${selectedBrand}`;
      }

      selectedCategory = 'Overall';
      updateCategorySelection();

      searchInput.dispatchEvent(new Event('input'));

      brandDropdown.classList.add('hidden');
      brandArrow.textContent = '▼';
    });
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.brand-filter-wrapper')) {
      brandDropdown.classList.add('hidden');
      brandArrow.textContent = '▼';
    }
  });

  /* =========================
     SHOPPLUS STORY SYSTEM
  ========================= */
  async function loadStories() {
    try {
      const response = await fetch("/my-store/stories.json", { cache: "no-store" });

      if (!response.ok) {
        shopplusStoryBtn.classList.remove('has-story', 'story-seen');
        return;
      }

      const data = await response.json();
      const stories = Array.isArray(data) ? data : (Array.isArray(data.stories) ? data.stories : []);

      if (!stories.length) {
        shopplusStoryBtn.classList.remove('has-story', 'story-seen');
        return;
      }

      storiesData = stories.filter(story => story && story.src);

      if (!storiesData.length) {
        shopplusStoryBtn.classList.remove('has-story', 'story-seen');
        return;
      }

      currentStoryVersion = String(
        data.version ||
        storiesData.map(s => `${s.src}-${s.caption || ''}-${s.duration || ''}`).join("|")
      );

      const seenVersion = localStorage.getItem("shopplusStorySeenVersion");

      shopplusStoryBtn.classList.remove('has-story', 'story-seen');

      if (seenVersion === currentStoryVersion) {
        shopplusStoryBtn.classList.add('story-seen');
      } else {
        shopplusStoryBtn.classList.add('has-story');
      }
    } catch (error) {
      console.error("stories.json fetch error:", error);
      shopplusStoryBtn.classList.remove('has-story', 'story-seen');
    }
  }

  function markStoriesAsSeen() {
    localStorage.setItem("shopplusStorySeenVersion", currentStoryVersion);
    shopplusStoryBtn.classList.remove('has-story');
    shopplusStoryBtn.classList.add('story-seen');
  }

  function buildStoryProgressBars() {
    storyProgressWrap.innerHTML = '';

    storiesData.forEach((_, index) => {
      const bar = document.createElement('div');
      bar.className = 'story-progress';
      bar.innerHTML = `<div class="story-progress-fill" id="storyProgressFill-${index}"></div>`;
      storyProgressWrap.appendChild(bar);
    });
  }

  function resetStoryTimers() {
    if (storyTimer) {
      clearTimeout(storyTimer);
      storyTimer = null;
    }

    if (storyProgressTimer) {
      clearInterval(storyProgressTimer);
      storyProgressTimer = null;
    }
  }

  function updateStoryProgressBars(activeIndex, progressPercent) {
    storiesData.forEach((_, i) => {
      const fill = document.getElementById(`storyProgressFill-${i}`);
      if (!fill) return;

      if (i < activeIndex) {
        fill.style.width = '100%';
      } else if (i === activeIndex) {
        fill.style.width = `${progressPercent}%`;
      } else {
        fill.style.width = '0%';
      }
    });
  }

  function openStoryViewer() {
    if (!storiesData.length) return;

    currentStoryIndex = 0;
    storyModal.classList.add('show');
    document.body.style.overflow = 'hidden';

    buildStoryProgressBars();
    showStory(currentStoryIndex);
  }

  function closeStoryViewer() {
    resetStoryTimers();
    storyModal.classList.remove('show');
    document.body.style.overflow = '';
    storyMedia.innerHTML = '';
    storyCaption.textContent = '';
    storyLoading.classList.remove('story-hidden');
  }

  function nextStory() {
    if (currentStoryIndex < storiesData.length - 1) {
      currentStoryIndex++;
      showStory(currentStoryIndex);
    } else {
      closeStoryViewer();
    }
  }

  function prevStory() {
    if (currentStoryIndex > 0) {
      currentStoryIndex--;
      showStory(currentStoryIndex);
    } else {
      showStory(currentStoryIndex);
    }
  }

  function showStory(index) {
    resetStoryTimers();

    const story = storiesData[index];
    if (!story) return;

    markStoriesAsSeen();

    storyMedia.innerHTML = '';
    storyCaption.textContent = story.caption || '';
    storyLoading.classList.remove('story-hidden');

    const isVideo = (story.type || '').toLowerCase() === 'video' || /\.(mp4|webm|ogg)$/i.test(story.src);

    let mediaEl;

    if (isVideo) {
      mediaEl = document.createElement('video');
      mediaEl.src = story.src;
      mediaEl.autoplay = true;
      mediaEl.muted = true;
      mediaEl.playsInline = true;
      mediaEl.preload = 'auto';

      mediaEl.addEventListener('loadeddata', () => {
        storyLoading.classList.add('story-hidden');
      });

      mediaEl.addEventListener('ended', () => {
        nextStory();
      });

      mediaEl.addEventListener('loadedmetadata', () => {
        const videoDurationMs = Math.max(3000, Math.floor((mediaEl.duration || 5) * 1000));
        startStoryProgress(videoDurationMs);
      });

      mediaEl.addEventListener('error', () => {
        storyLoading.classList.add('story-hidden');
        startStoryProgress(story.duration || 5000);
      });
    } else {
      mediaEl = document.createElement('img');
      mediaEl.src = story.src;
      mediaEl.alt = story.caption || 'Story';

      mediaEl.addEventListener('load', () => {
        storyLoading.classList.add('story-hidden');
      });

      mediaEl.addEventListener('error', () => {
        storyLoading.classList.add('story-hidden');
      });

      startStoryProgress(story.duration || 5000);
    }

    storyMedia.appendChild(mediaEl);
  }

  function startStoryProgress(duration) {
    storyDuration = Math.max(2000, Number(duration) || 5000);

    const startedAt = Date.now();
    updateStoryProgressBars(currentStoryIndex, 0);

    storyProgressTimer = setInterval(() => {
      const elapsed = Date.now() - startedAt;
      const percent = Math.min(100, (elapsed / storyDuration) * 100);
      updateStoryProgressBars(currentStoryIndex, percent);

      if (percent >= 100) {
        clearInterval(storyProgressTimer);
        storyProgressTimer = null;
      }
    }, 60);

    storyTimer = setTimeout(() => {
      nextStory();
    }, storyDuration);
  }

  shopplusStoryBtn.addEventListener('click', () => {
    if (storiesData.length) {
      openStoryViewer();
    } else {
      window.location.href = "home.html";
    }
  });

  storyCloseBtn.addEventListener('click', closeStoryViewer);
  storyPrevZone.addEventListener('click', prevStory);
  storyNextZone.addEventListener('click', nextStory);

  storyModal.addEventListener('click', (e) => {
    if (e.target === storyModal) {
      closeStoryViewer();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (!storyModal.classList.contains('show')) return;

    if (e.key === 'Escape') closeStoryViewer();
    if (e.key === 'ArrowRight') nextStory();
    if (e.key === 'ArrowLeft') prevStory();
  });

  /* =========================
     INIT
  ========================= */
  window.addEventListener("DOMContentLoaded", () => {
    setupInstallButton();
    loadStories();
    loadAppShortcuts();
    loadAds();
    loadProducts();
  });
</script>
