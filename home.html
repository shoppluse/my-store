<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ShopPlus</title>
<link rel="manifest" href="/my-store/manifest.json" />
<meta name="theme-color" content="#0a0a0a" />
<link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
<link rel="icon" href="/my-store/icons/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<script>
  if (localStorage.getItem("shopplusLoggedIn") !== "true" || !localStorage.getItem("shopplusUser")) {
    window.location.href = "login.html";
  }
  (function () {
    const t = localStorage.getItem("theme");
    document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
  })();
</script>

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

:root {
  --bg:          #f4f3f0;
  --bg-2:        #eceae5;
  --surface:     #ffffff;
  --surface-2:   #f9f8f6;
  --text:        #111010;
  --text-2:      #3d3c3a;
  --muted:       #8a8884;
  --muted-2:     #b5b3af;
  --border:      #e3e1dc;
  --border-2:    #f0ede9;
  --accent:      #e8520a;
  --accent-2:    #ff7a3d;
  --accent-glow: rgba(232,82,10,0.18);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.06);
  --shadow-md:   0 6px 20px rgba(0,0,0,0.09);
  --shadow-lg:   0 14px 36px rgba(0,0,0,0.12);
  --radius-xs:   10px;
  --radius-sm:   16px;
  --radius-md:   22px;
  --radius-lg:   28px;
  --content-w:   1200px;         /* unified max-width for ALL sections */
  --pad:         clamp(14px,2.5vw,32px);
  --font-display:'Syne', sans-serif;
  --font-body:   'DM Sans', sans-serif;
  --star:        #f59e0b;
}

[data-theme="dark"] {
  --bg:          #0d0d0b;
  --bg-2:        #141410;
  --surface:     #1a1916;
  --surface-2:   #201f1c;
  --text:        #f5f3ee;
  --text-2:      #ccc9c2;
  --muted:       #7a7870;
  --muted-2:     #504f4a;
  --border:      #2a2925;
  --border-2:    #222120;
  --accent:      #ff6b25;
  --accent-2:    #ff9060;
  --accent-glow: rgba(255,107,37,0.22);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.3);
  --shadow-md:   0 6px 20px rgba(0,0,0,0.4);
  --shadow-lg:   0 14px 36px rgba(0,0,0,0.5);
  --star:        #fbbf24;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
button { border: none; background: none; cursor: pointer; font-family: inherit; }
input { font-family: inherit; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ===== UNIFIED CONTENT ROW ===== */
/* Every section uses this to stay consistently centered */
.content-row {
  width: 100%;
  max-width: calc(var(--content-w) + 2 * var(--pad));
  margin: 0 auto;
  padding-left: var(--pad);
  padding-right: var(--pad);
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: calc(env(safe-area-inset-top) + 10px) 0 10px;
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
}

.header-pill {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  gap: 8px;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 8px;
  box-shadow: var(--shadow-md);
}

.logo-btn {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  background: var(--bg-2);
  border: 1px solid var(--border);
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
  white-space: nowrap;
  transition: all 0.2s;
  min-height: 50px;
  cursor: pointer;
  position: relative;
  overflow: visible;
  isolation: isolate;
}
.logo-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.logo-plus { color: var(--accent); }

/* Story ring */
.logo-btn.has-story::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: calc(var(--radius-sm) + 2px);
  background: linear-gradient(135deg, #00d4ff, #00ff95, #4f46e5, #ff9800, #00d4ff);
  background-size: 300% 300%;
  z-index: -1;
  animation: story-ring-shift 3s linear infinite;
}
.logo-btn.story-seen::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: calc(var(--radius-sm) + 1px);
  background: linear-gradient(135deg, #d1d5db, #9ca3af);
  z-index: -1;
  opacity: 0.9;
}
@keyframes story-ring-shift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* Desktop search in header */
.header-search-wrap {
  flex: 1;
  position: relative;
}
.header-search-input {
  width: 100%;
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-2);
  color: var(--text);
  font-size: 0.88rem;
  font-family: var(--font-body);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  min-height: 50px;
}
.header-search-input::placeholder { color: var(--muted); }
.header-search-input:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.hdr-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 50px;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  background: var(--bg-2);
  border: 1px solid var(--border);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  text-decoration: none;
}
.hdr-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

/* Brand dropdown */
.brand-wrap { position: relative; }
.brand-arrow { font-size: 0.65rem; transition: transform 0.2s; opacity: 0.6; }
.brand-wrap.open .brand-arrow { transform: rotate(180deg); }

.brand-menu {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 190px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  z-index: 200;
  padding: 6px;
  display: none;
  max-height: 300px;
  overflow-y: auto;
}
.brand-wrap.open .brand-menu { display: block; }

.brand-item {
  padding: 10px 12px;
  border-radius: var(--radius-xs);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  color: var(--text-2);
}
.brand-item:hover { background: var(--bg-2); }
.brand-item.active {
  background: var(--accent-glow);
  color: var(--accent);
  font-weight: 700;
}

.install-btn { display: none; }
.install-btn.show { display: flex; }

/* ===== BELOW-HEADER SEARCH (mobile only) ===== */
.mobile-search-wrap {
  padding: 8px 0 0;
  display: none;
}
.mobile-search-input {
  width: 100%;
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.mobile-search-input::placeholder { color: var(--muted); }
.mobile-search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-sm);
}

/* ===== CATEGORIES ===== */
.cats-wrap { padding: 12px 0 0; }
.cats-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.cats-scroll::-webkit-scrollbar { display: none; }

.cat-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 10px 12px;
  min-width: 72px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.cat-chip svg { width: 20px; height: 20px; fill: currentColor; }
.cat-chip span { font-size: 0.6rem; font-weight: 700; font-family: var(--font-display); text-align: center; line-height: 1.1; }
.cat-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.cat-chip.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  box-shadow: var(--shadow-md);
}

/* ===== DESKTOP TWO-COLUMN LAYOUT ===== */
/* On desktop: left sidebar (apps + filters) + main content */
.desktop-layout {
  display: block; /* default: stacked */
}

/* ===== APP SHORTCUTS ===== */
.apps-section { padding: 16px 0 0; }
.section-title {
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 10px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}
.apps-slider {
  overflow: hidden;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  touch-action: pan-y;
}
.apps-slider.dragging { cursor: grabbing; }
.apps-track {
  display: flex;
  gap: 12px;
  width: max-content;
  padding-bottom: 6px;
}
.app-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  min-width: 68px;
  text-align: center;
}
.app-icon {
  width: 50px;
  height: 50px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: 8px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.app-card:hover .app-icon { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.app-icon img { width: 100%; height: 100%; object-fit: contain; }
.app-name { font-size: 0.6rem; font-weight: 600; color: var(--text-2); line-height: 1.2; }
.apps-empty { font-size: 0.85rem; color: var(--muted); padding: 8px 0; }

/* ===== ADS ===== */
.ads-section { padding: 14px 0 0; display: none; }
.ads-container {
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  touch-action: pan-y;
  cursor: grab;
}
.ads-container.dragging { cursor: grabbing; }
.ads-viewport { overflow: hidden; }
.ads-track {
  display: flex;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
}
.ad-slide { flex: 0 0 100%; min-width: 100%; }
.ad-slide a, .ad-slide .ad-plain { display: block; }
.ad-slide img { width: 100%; aspect-ratio: 21/5; object-fit: cover; background: var(--surface-2); pointer-events: none; user-select: none; }

/* ===== PRODUCT GRID ===== */
.grid-wrap { padding: 16px 0 48px; }
.grid-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.grid-heading {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.2px;
}
.grid-count {
  font-size: 0.8rem;
  color: var(--muted);
  font-weight: 600;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s, box-shadow 0.2s;
  opacity: 0;
  transform: translateY(10px);
  animation: card-in 0.35s ease forwards;
}
@keyframes card-in { to { opacity: 1; transform: translateY(0); } }
.product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }

.product-img-wrap {
  aspect-ratio: 1;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  overflow: hidden;
}
.product-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transition: transform 0.3s ease;
}
.product-card:hover .product-img-wrap img { transform: scale(1.05); }

.product-body {
  padding: 10px 14px 14px;
  border-top: 1px solid var(--border-2);
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
}
.product-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  line-height: 1.35;
  min-height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.product-rating {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--star);
  text-align: center;
}
.no-rating { color: var(--muted); font-weight: 500; }

.grid-message {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  font-size: 0.9rem;
  color: var(--muted);
}
.grid-message.error { color: #ef4444; }

/* Skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--border-2) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
.skeleton-img { aspect-ratio: 1; }
.skeleton-body { padding: 10px 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.skeleton-line { height: 12px; }
.skeleton-line.short { width: 60%; margin: 0 auto; }

/* ===== STORY MODAL ===== */
.story-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(16px);
}
.story-overlay.open { display: flex; }
.story-frame {
  width: min(100vw, 420px);
  height: 100svh;
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, #0a0a0c 0%, #121218 100%);
}
.story-progress {
  position: absolute;
  top: calc(env(safe-area-inset-top) + 10px);
  left: 12px; right: 12px;
  z-index: 12;
  display: flex;
  gap: 5px;
}
.prog-bar { flex: 1; height: 2.5px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; width: 0%; background: #fff; border-radius: 99px; transition: width 0.05s linear; }
.story-topbar {
  position: absolute;
  top: calc(env(safe-area-inset-top) + 22px);
  left: 14px; right: 14px;
  z-index: 13;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.story-brand { display: flex; align-items: center; gap: 10px; }
.story-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 800; font-size: 0.75rem; color: #fff; flex-shrink: 0;
}
.story-brand-name {
  font-family: var(--font-display);
  font-size: 0.88rem; font-weight: 700; color: #fff;
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.story-x {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s;
}
.story-x:hover { background: rgba(255,255,255,0.2); }
.story-zone { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 11; cursor: pointer; }
.story-zone-left { left: 0; }
.story-zone-right { right: 0; }
.story-stage {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: calc(env(safe-area-inset-top) + 80px) 24px calc(env(safe-area-inset-bottom) + 140px);
}
.story-string {
  width: 2px; height: 40px;
  background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.1));
  border-radius: 99px; flex-shrink: 0;
}
.story-tag {
  background: #fff; border-radius: 22px;
  width: min(78vw, 300px);
  box-shadow: 0 28px 60px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.25);
  display: flex; flex-direction: column; overflow: hidden;
  cursor: pointer; transform: rotate(-1.2deg); transform-origin: top center;
  position: relative; transition: transform 0.15s;
  max-height: calc(100svh - 260px);
}
.story-tag:hover { transform: rotate(0deg) scale(1.01); }
.story-tag::before {
  content: ""; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  width: 22px; height: 22px; border-radius: 50%;
  background: #d0d5dd; box-shadow: inset 0 2px 4px rgba(0,0,0,0.15), 0 1px 0 rgba(255,255,255,0.8); z-index: 2;
}
.story-tag::after {
  content: ""; position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
  width: 10px; height: 10px; border-radius: 50%;
  background: #6b7280; box-shadow: inset 0 1px 2px rgba(0,0,0,0.2); z-index: 3;
}
.tag-header { padding: 42px 14px 10px; text-align: center; border-bottom: 1px dashed #e5e7eb; }
.tag-badge {
  display: inline-block; padding: 4px 10px; border-radius: 99px;
  background: rgba(232,82,10,0.1); color: #e8520a;
  font-size: 0.65rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px;
}
.tag-title { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; color: #111; line-height: 1.25; }
.tag-img-wrap {
  flex: 1; min-height: 0; aspect-ratio: 1; max-height: 240px;
  background: #fff; display: flex; align-items: center; justify-content: center;
  padding: 16px; overflow: hidden;
}
.tag-img { width: 100%; height: 100%; object-fit: contain; }
.story-bottom {
  position: absolute; left: 14px; right: 14px;
  bottom: calc(env(safe-area-inset-bottom) + 16px);
  z-index: 14; padding: 14px 16px;
  background: rgba(10,10,12,0.75); backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm); color: #fff;
}
.story-caption { font-size: 0.95rem; font-weight: 600; line-height: 1.4; }
.story-hint { margin-top: 6px; font-size: 0.75rem; color: rgba(255,255,255,0.55); }

/* ===== DESKTOP LAYOUT (≥900px) ===== */
@media (min-width: 900px) {
  /* Move search inside header pill */
  .mobile-search-wrap { display: none !important; }

  .header-pill {
    grid-template-columns: auto 1fr auto auto auto;
  }

  /* Two-column layout below header */
  .desktop-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 24px;
    align-items: start;
    padding-top: 16px;
    padding-bottom: 48px;
  }

  /* Left sidebar */
  .sidebar {
    position: sticky;
    top: calc(76px + 10px); /* below header */
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .sidebar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    box-shadow: var(--shadow-sm);
  }

  /* Categories vertical in sidebar */
  .cats-wrap { padding: 0; }
  .cats-scroll {
    flex-direction: column;
    overflow-x: unset;
    overflow-y: auto;
    padding-bottom: 0;
    gap: 6px;
    max-height: 420px;
  }
  .cat-chip {
    flex-direction: row;
    justify-content: flex-start;
    min-width: unset;
    width: 100%;
    padding: 10px 14px;
    gap: 10px;
    border-radius: var(--radius-xs);
  }
  .cat-chip span { font-size: 0.82rem; font-weight: 600; }

  /* Apps section in sidebar */
  .apps-section { padding: 0; }
  .apps-slider { overflow: hidden; }
  .apps-track {
    flex-wrap: wrap;
    width: auto;
    gap: 8px;
  }
  .app-card { min-width: 52px; }
  .app-icon { width: 46px; height: 46px; }

  /* Main content area */
  .main-content {
    min-width: 0; /* prevent overflow */
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Ads full width in main */
  .ads-section { padding: 0 0 16px; }
  .ad-slide img { aspect-ratio: 16/4; }

  /* Product grid: 3 columns on medium desktop, 4 on wide */
  .product-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .grid-wrap { padding: 0; }
}

@media (min-width: 1100px) {
  .product-grid { grid-template-columns: repeat(4, 1fr); }
  .desktop-layout { grid-template-columns: 280px 1fr; }
}

@media (min-width: 1400px) {
  .product-grid { grid-template-columns: repeat(5, 1fr); }
}

/* ===== MOBILE (< 900px) ===== */
@media (max-width: 899px) {
  .header-search-wrap { display: none; }
  .mobile-search-wrap { display: block; }
  .sidebar { display: contents; } /* flatten sidebar on mobile */

  .desktop-layout {
    display: block;
    padding-top: 0;
    padding-bottom: 0;
  }

  .sidebar-card {
    background: none;
    border: none;
    padding: 0;
    box-shadow: none;
  }

  .apps-section { padding: 14px 0 0; }
  .ads-section { padding: 12px 0 0; }
  .grid-wrap { padding: 14px 0 40px; }

  .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .product-name { font-size: 0.75rem; min-height: 30px; }
}

@media (max-width: 680px) {
  :root { --pad: 12px; }
  body { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }

  .header-pill {
    grid-template-columns: auto auto auto;
    gap: 6px;
    padding: 6px;
    border-radius: var(--radius-sm);
  }
  .logo-btn { font-size: 1.05rem; padding: 9px 13px; min-height: 46px; }
  .hdr-btn { min-height: 46px; font-size: 0.72rem; padding: 8px 10px; }
  .story-frame { width: 100vw; }
  .story-tag { width: min(82vw, 290px); max-height: calc(100svh - 240px); }
}
</style>

<script>
"use strict";

const BACKEND   = "https://my-store-e28j.onrender.com";
const STORY_KEY = "sp_story_sig";
const FALLBACK_IMG = "https://via.placeholder.com/300x300/f4f3f0/aaa?text=No+Image";

/* ===== CATEGORIES ===== */
const CATS = [
  { name: "Overall",     icon: `<svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="10"/></svg>` },
  { name: "Electronics", icon: `<svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="6" width="18" height="12" rx="2"/><line x1="8" y1="20" x2="16" y2="20" stroke-width="2"/><line x1="12" y1="18" x2="12" y2="20" stroke-width="2"/></svg>` },
  { name: "Fashion",     icon: `<svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 3l3 3h6l3-3 3 3-3 3v12H6V9L3 6z"/></svg>` },
  { name: "Home",        icon: `<svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 12l9-9 9 9v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>` },
  { name: "Accessories", icon: `<svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>` },
  { name: "Sports",      icon: `<svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="9"/><path d="M4.5 4.5l15 15M4.5 19.5l15-15"/></svg>` },
  { name: "Beauty",      icon: `<svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2c2 4 6 6 6 10a6 6 0 0 1-12 0c0-4 4-6 6-10z"/></svg>` },
  { name: "Gadgets",     icon: `<svg viewBox="0 0 24 24" width="18" height="18"><rect x="7" y="2" width="10" height="20" rx="3"/><circle cx="12" cy="19" r="1"/></svg>` },
];

/* ===== STATE ===== */
let allProducts = [], jsonCache = [], backendCache = [];
let stories = [], storySig = "";
let storyIdx = 0, storyTimerID = null, storyRafID = null;
let storyStart = 0, storyDuration = 5000;
let activeCat = "Overall";

const $ = id => document.getElementById(id);
const norm = str => String(str || "").trim().toLowerCase();
const safeImg = src => src && String(src).trim() ? String(src).trim() : FALLBACK_IMG;

function getRating(v) {
  if (v == null || v === "") return null;
  const n = parseFloat(String(v).replace(/[^\d.]/g, ""));
  return isNaN(n) || n <= 0 ? null : n.toFixed(1);
}
function extractArr(data) {
  if (Array.isArray(data)) return data;
  if (data?.products) return data.products;
  if (data?.data) return data.data;
  return [];
}
function normalizeProduct(p, source, idx) {
  const id = String(p._id || p.id || `${source}-${idx}`);
  const img = p.image?.trim() || (Array.isArray(p.images) && p.images[0]) || FALLBACK_IMG;
  const tv = new Date(p.updatedAt || p.createdAt || 0).getTime();
  return {
    id, source,
    name: p.name || "Unnamed",
    image: img,
    category: p.category || "Overall",
    brand: p.brand || "",
    rating: getRating(p.rating),
    description: p.description || "",
    timeValue: isNaN(tv) ? 0 : tv,
    fallbackOrder: typeof p.sortOrder === "number" ? p.sortOrder : (source === "json" ? idx + 1 : 0),
  };
}
function buildSig(arr) {
  if (!arr?.length) return "";
  return JSON.stringify(arr.map(s => ({
    id: String(s.id || ""), title: String(s.title || ""),
    image: String(s.image || ""), caption: String(s.caption || ""),
    productId: String(s.productId || ""), source: String(s.source || "json"),
    duration: Number(s.duration || 5000),
  })));
}

/* ===== INSTALL ===== */
const installBtn = $("installBtn");
let deferredPrompt = null;
function isStandalone() {
  return window.matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;
}
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault(); deferredPrompt = e;
  if (!isStandalone()) installBtn.classList.add("show");
});
installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === "accepted") installBtn.classList.remove("show");
  deferredPrompt = null;
});
window.addEventListener("appinstalled", () => { installBtn.classList.remove("show"); deferredPrompt = null; });

/* ===== CATEGORIES ===== */
const catsScroll = $("catsScroll");
CATS.forEach(cat => {
  const el = document.createElement("button");
  el.className = "cat-chip" + (cat.name === activeCat ? " active" : "");
  el.dataset.cat = cat.name;
  el.innerHTML = cat.icon + `<span>${cat.name}</span>`;
  el.setAttribute("aria-label", cat.name);
  el.addEventListener("click", () => {
    if (activeCat === cat.name) return;
    activeCat = cat.name;
    catsScroll.querySelectorAll(".cat-chip").forEach(c =>
      c.classList.toggle("active", c.dataset.cat === activeCat));
    filterAndRender();
  });
  catsScroll.appendChild(el);
});

/* ===== SEARCH (sync both inputs) ===== */
const searchInput       = $("searchInput");
const searchInputMobile = $("searchInputMobile");

function onSearchChange(val) {
  searchInput.value = val;
  searchInputMobile.value = val;
  activeCat = "Overall";
  catsScroll.querySelectorAll(".cat-chip").forEach(c =>
    c.classList.toggle("active", c.dataset.cat === "Overall"));
  syncBrand();
  filterAndRender();
}
searchInput.addEventListener("input", e => onSearchChange(e.target.value));
searchInputMobile.addEventListener("input", e => onSearchChange(e.target.value));

/* ===== BRAND FILTER ===== */
const brandWrap   = $("brandWrap");
const brandToggle = $("brandToggle");
const brandMenu   = $("brandMenu");
const brandLabel  = $("brandLabel");

brandToggle.addEventListener("click", e => {
  e.stopPropagation();
  const open = brandWrap.classList.toggle("open");
  brandToggle.setAttribute("aria-expanded", open);
});
document.addEventListener("click", e => {
  if (!brandWrap.contains(e.target)) {
    brandWrap.classList.remove("open");
    brandToggle.setAttribute("aria-expanded", "false");
  }
});
brandMenu.querySelectorAll(".brand-item").forEach(item => {
  item.addEventListener("click", () => {
    const brand = item.dataset.brand;
    setActiveBrand(brand);
    onSearchChange(brand === "all" ? "" : brand);
    brandLabel.textContent = brand === "all" ? "🏷️ Brand" : `🏷️ ${brand}`;
    brandWrap.classList.remove("open");
    brandToggle.setAttribute("aria-expanded", "false");
  });
});
function setActiveBrand(brand) {
  brandMenu.querySelectorAll(".brand-item").forEach(el =>
    el.classList.toggle("active", el.dataset.brand.toLowerCase() === brand.toLowerCase()));
}
function syncBrand() {
  const q = norm(searchInput.value);
  let matched = "all";
  brandMenu.querySelectorAll(".brand-item").forEach(el => {
    if (el.dataset.brand.toLowerCase() !== "all" && el.dataset.brand.toLowerCase() === q)
      matched = el.dataset.brand.toLowerCase();
  });
  setActiveBrand(matched);
  brandLabel.textContent = matched === "all" ? "🏷️ Brand" : `🏷️ ${matched.charAt(0).toUpperCase() + matched.slice(1)}`;
}

/* ===== APP SHORTCUTS ===== */
const appsSlider = $("appsSlider");
const appsTrack  = $("appsTrack");
let appsRaf = null, appsOffset = 0, appsSetW = 0;
let appsPaused = false, appsDrag = false, appsDragX = 0, appsDragStart = 0;
const APPS_SPEED = 0.14;
const isDesktop = () => window.innerWidth >= 900;

async function loadApps() {
  try {
    const r = await fetch("apps.json", { cache: "no-store" });
    if (!r.ok) throw new Error();
    const apps = await r.json();
    if (!Array.isArray(apps) || !apps.length) {
      appsTrack.innerHTML = `<span class="apps-empty">No apps found.</span>`; return;
    }
    appsTrack.innerHTML = "";
    const makeCard = app => {
      const a = document.createElement("a");
      a.className = "app-card";
      a.href = app.link || "#";
      if (/^https?:\/\//i.test(app.link || "")) { a.target = "_blank"; a.rel = "noopener noreferrer"; }
      a.innerHTML = `<div class="app-icon"><img src="${safeImg(app.image)}" alt="${app.name||"App"}" loading="lazy"/></div><div class="app-name">${app.name||"App"}</div>`;
      return a;
    };
    if (isDesktop()) {
      // Desktop: wrap grid, no marquee
      apps.forEach(app => appsTrack.appendChild(makeCard(app)));
    } else {
      // Mobile: marquee
      apps.concat(apps).forEach(app => appsTrack.appendChild(makeCard(app)));
      requestAnimationFrame(() => {
        appsSetW = appsTrack.scrollWidth / 2;
        startAppsScroll();
        setupAppsDrag();
      });
    }
  } catch {
    appsTrack.innerHTML = `<span class="apps-empty">Couldn't load apps.</span>`;
  }
}

function startAppsScroll() {
  cancelAnimationFrame(appsRaf);
  let last = 0;
  const step = ts => {
    if (last) {
      const dt = ts - last;
      if (!appsPaused && !appsDrag && appsSetW) {
        appsOffset = (appsOffset + APPS_SPEED * dt) % appsSetW;
        appsTrack.style.transform = `translateX(${-appsOffset}px)`;
      }
    }
    last = ts;
    appsRaf = requestAnimationFrame(step);
  };
  appsRaf = requestAnimationFrame(step);
}
function setupAppsDrag() {
  appsSlider.addEventListener("mouseenter", () => appsPaused = true);
  appsSlider.addEventListener("mouseleave", () => { if (!appsDrag) appsPaused = false; });
  appsSlider.addEventListener("touchstart", e => { appsDrag = true; appsDragX = e.touches[0].clientX; appsDragStart = appsOffset; }, { passive: true });
  appsSlider.addEventListener("touchmove", e => {
    if (!appsDrag) return;
    const d = appsDragX - e.touches[0].clientX;
    appsOffset = ((appsDragStart + d) % appsSetW + appsSetW) % appsSetW;
    appsTrack.style.transform = `translateX(${-appsOffset}px)`;
  }, { passive: false });
  appsSlider.addEventListener("touchend", () => { appsDrag = false; setTimeout(() => appsPaused = false, 400); });
  appsSlider.addEventListener("mousedown", e => { appsDrag = true; appsDragX = e.clientX; appsDragStart = appsOffset; appsSlider.classList.add("dragging"); });
  window.addEventListener("mousemove", e => {
    if (!appsDrag) return;
    const d = appsDragX - e.clientX;
    appsOffset = ((appsDragStart + d) % appsSetW + appsSetW) % appsSetW;
    appsTrack.style.transform = `translateX(${-appsOffset}px)`;
  });
  window.addEventListener("mouseup", () => { if (appsDrag) { appsDrag = false; appsPaused = false; appsSlider.classList.remove("dragging"); } });
  appsSlider.addEventListener("dragstart", e => e.preventDefault());
}

/* ===== ADS ===== */
const adsSection  = $("adsSection");
const adsContainer= $("adsContainer");
const adsTrack    = $("adsTrack");
let adsCount = 0, adsIdx = 1, adsInterval = null;
let adsDrag = false, adsStartX = 0;

async function loadAds() {
  try {
    const r = await fetch("ads.json", { cache: "no-store" });
    if (!r.ok) throw new Error();
    const ads = await r.json();
    if (!Array.isArray(ads) || !ads.length) return;
    adsSection.style.display = "block";
    adsCount = ads.length;
    if (adsCount === 1) {
      adsTrack.appendChild(makeAdSlide(ads[0])); adsIdx = 0; setAdPos(false); return;
    }
    adsTrack.appendChild(makeAdSlide(ads[ads.length - 1]));
    ads.forEach(a => adsTrack.appendChild(makeAdSlide(a)));
    adsTrack.appendChild(makeAdSlide(ads[0]));
    adsIdx = 1; setAdPos(false);
    adsTrack.addEventListener("transitionend", () => {
      if (adsIdx === adsCount + 1) { adsIdx = 1; setAdPos(false); }
      if (adsIdx === 0) { adsIdx = adsCount; setAdPos(false); }
    });
    adsInterval = setInterval(() => { adsIdx++; setAdPos(true); }, 3500);
    setupAdDrag();
  } catch {}
}
function makeAdSlide(ad) {
  const div = document.createElement("div");
  div.className = "ad-slide";
  const img = `<img src="${safeImg(ad.image)}" alt="Ad" loading="lazy" draggable="false"/>`;
  div.innerHTML = ad.link?.trim()
    ? `<a href="${ad.link}" ${/^https?:\/\//i.test(ad.link) ? 'target="_blank" rel="noopener noreferrer"' : ""}>${img}</a>`
    : `<div class="ad-plain">${img}</div>`;
  return div;
}
function setAdPos(animated) {
  const w = adsContainer.clientWidth;
  adsTrack.style.transition = animated ? "transform 0.5s cubic-bezier(0.4,0,0.2,1)" : "none";
  adsTrack.style.transform = `translateX(${-adsIdx * w}px)`;
}
function setupAdDrag() {
  const startDrag = x => { adsDrag = true; adsStartX = x; clearInterval(adsInterval); };
  const endDrag = x => {
    if (!adsDrag) return; adsDrag = false;
    const d = adsStartX - x;
    if (Math.abs(d) > 50) d > 0 ? adsIdx++ : adsIdx--;
    setAdPos(true);
    adsInterval = setInterval(() => { adsIdx++; setAdPos(true); }, 3500);
  };
  adsContainer.addEventListener("touchstart", e => startDrag(e.touches[0].clientX), { passive: true });
  adsContainer.addEventListener("touchend", e => endDrag(e.changedTouches[0].clientX));
  adsContainer.addEventListener("mousedown", e => { startDrag(e.clientX); adsContainer.classList.add("dragging"); });
  window.addEventListener("mouseup", e => { if (adsDrag) { endDrag(e.clientX); adsContainer.classList.remove("dragging"); } });
  window.addEventListener("resize", () => setAdPos(false));
  adsContainer.addEventListener("dragstart", e => e.preventDefault());
}

/* ===== PRODUCTS ===== */
const productGrid = $("productGrid");
const gridCount   = $("gridCount");

function showSkeletons(n = 8) {
  productGrid.innerHTML = Array.from({ length: n }, () => `
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line short"></div>
      </div>
    </div>`).join("");
}
function mergeProducts() {
  const map = new Map();
  [...jsonCache.map((p,i) => normalizeProduct(p,"json",i)),
   ...backendCache.map((p,i) => normalizeProduct(p,"backend",i))]
    .forEach(p => map.set(`${p.source}-${p.id}`, p));
  allProducts = [...map.values()].sort((a, b) =>
    a.timeValue !== b.timeValue ? b.timeValue - a.timeValue : b.fallbackOrder - a.fallbackOrder);
  filterAndRender();
}
async function loadProducts() {
  showSkeletons();
  const jsonP = fetch("products.json", { cache: "no-store" })
    .then(r => r.ok ? r.json() : Promise.reject()).then(d => extractArr(d)).catch(() => []);
  const beP = fetch(`${BACKEND}/api/products`, { cache: "no-store" })
    .then(r => r.ok ? r.json() : Promise.reject()).then(d => extractArr(d)).catch(() => null);
  jsonCache = await jsonP;
  const fast = await Promise.race([beP, new Promise(r => setTimeout(() => r("TO"), 2500))]);
  if (fast !== "TO" && fast !== null) { backendCache = fast; mergeProducts(); loadStories(); return; }
  if (jsonCache.length) { mergeProducts(); loadStories(); }
  else productGrid.innerHTML = `<div class="grid-message">Loading products…</div>`;
  beP.then(data => {
    if (Array.isArray(data)) { backendCache = data; mergeProducts(); loadStories(); }
    else if (!jsonCache.length) productGrid.innerHTML = `<div class="grid-message error">Failed to load products.</div>`;
  });
}
function filterAndRender() {
  const q = norm(searchInput.value);
  const list = allProducts.filter(p => {
    const catOk = activeCat === "Overall" || norm(p.category) === norm(activeCat);
    const qOk = !q || norm(p.name).includes(q) || norm(p.brand).includes(q) || norm(p.description).includes(q);
    return catOk && qOk;
  });
  renderProducts(list);
}
function renderProducts(list) {
  if (gridCount) gridCount.textContent = list.length ? `${list.length} items` : "";
  if (!list.length) { productGrid.innerHTML = `<div class="grid-message">No products found.</div>`; return; }
  productGrid.innerHTML = "";
  list.forEach((p, i) => {
    const a = document.createElement("a");
    a.className = "product-card";
    a.href = `product.html?id=${encodeURIComponent(p.id)}&source=${encodeURIComponent(p.source)}`;
    a.style.animationDelay = `${Math.min(i * 25, 250)}ms`;
    a.innerHTML = `
      <div class="product-img-wrap">
        <img src="${safeImg(p.image)}" alt="${p.name}" loading="lazy" onerror="this.src='${FALLBACK_IMG}'"/>
      </div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-rating">${p.rating ? `${p.rating} ⭐` : `<span class="no-rating">No rating yet</span>`}</div>
      </div>`;
    productGrid.appendChild(a);
  });
}

/* ===== STORIES ===== */
const storyBtn      = $("storyBtn");
const storyOverlay  = $("storyOverlay");
const storyClose    = $("storyClose");
const storyPrev     = $("storyPrev");
const storyNext     = $("storyNext");
const storyProgress = $("storyProgress");
const storyBrandName= $("storyBrandName");
const storyTag      = $("storyTag");
const storyTagTitle = $("storyTagTitle");
const storyTagImg   = $("storyTagImg");
const storyCaption  = $("storyCaption");

function findProductForStory(story) {
  if (!story?.productId) return null;
  const id = String(story.productId).trim();
  const src = norm(story.source || "json");
  const pool = src === "backend" ? backendCache : jsonCache;
  const raw = pool.find(p => String(p._id || p.id || "").trim() === id);
  return raw ? normalizeProduct(raw, src, 0) : null;
}
async function loadStories() {
  try {
    const r = await fetch("stories.json", { cache: "no-store" });
    if (!r.ok) throw new Error();
    const data = await r.json();
    stories = Array.isArray(data) ? data.filter(Boolean) : [];
    storySig = buildSig(stories);
    updateStoryBtn();
  } catch { stories = []; storySig = ""; updateStoryBtn(); }
}
function updateStoryBtn() {
  storyBtn.classList.remove("has-story", "story-seen");
  if (!stories.length) return;
  const seen = localStorage.getItem(STORY_KEY) === storySig;
  storyBtn.classList.add(seen ? "story-seen" : "has-story");
}
storyBtn.addEventListener("click", () => {
  if (stories.length) openStories(0);
  else window.location.href = "home.html";
});
function openStories(idx) {
  storyIdx = Math.max(0, Math.min(idx, stories.length - 1));
  storyOverlay.classList.add("open");
  document.body.style.overflow = "hidden";
  buildProgressBars(); showStory(storyIdx);
  localStorage.setItem(STORY_KEY, storySig); updateStoryBtn();
}
function closeStories() {
  storyOverlay.classList.remove("open");
  document.body.style.overflow = "";
  clearTimeout(storyTimerID); cancelAnimationFrame(storyRafID);
  storyTimerID = storyRafID = null;
}
function buildProgressBars() {
  storyProgress.innerHTML = stories.map((_,i) =>
    `<div class="prog-bar"><div class="prog-fill" id="sf-${i}"></div></div>`).join("");
}
function showStory(idx) {
  clearTimeout(storyTimerID); cancelAnimationFrame(storyRafID);
  const s = stories[idx]; if (!s) { closeStories(); return; }
  storyIdx = idx; storyDuration = Math.max(1500, Number(s.duration) || 5000);
  const prod = findProductForStory(s);
  const img = prod?.image || safeImg(s.image);
  const title = prod?.name || s.title || "Featured Product";
  storyTagImg.src = img; storyTagImg.alt = title;
  storyTagTitle.textContent = title; storyBrandName.textContent = title;
  storyCaption.textContent = s.caption || title;
  stories.forEach((_,i) => { const f = document.getElementById(`sf-${i}`); if (f) f.style.width = i < idx ? "100%" : "0%"; });
  storyStart = performance.now();
  const fill = document.getElementById(`sf-${storyIdx}`);
  if (fill) {
    const tick = now => {
      const pct = Math.min(((now - storyStart) / storyDuration) * 100, 100);
      fill.style.width = pct + "%";
      if (pct < 100 && storyOverlay.classList.contains("open")) storyRafID = requestAnimationFrame(tick);
    };
    storyRafID = requestAnimationFrame(tick);
  }
  storyTimerID = setTimeout(() => storyIdx < stories.length - 1 ? showStory(storyIdx + 1) : closeStories(), storyDuration);
}
storyClose.addEventListener("click", e => { e.stopPropagation(); closeStories(); });
storyPrev.addEventListener("click", e => { e.stopPropagation(); showStory(Math.max(0, storyIdx - 1)); });
storyNext.addEventListener("click", e => { e.stopPropagation(); storyIdx < stories.length - 1 ? showStory(storyIdx + 1) : closeStories(); });
storyTag.addEventListener("click", e => {
  e.stopPropagation();
  const s = stories[storyIdx];
  if (s?.productId) window.location.href = `product.html?id=${encodeURIComponent(s.productId)}&source=${encodeURIComponent(s.source||"json")}`;
});
storyTag.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); storyTag.click(); } });
storyOverlay.addEventListener("click", e => { if (e.target === storyOverlay) closeStories(); });
document.addEventListener("keydown", e => {
  if (!storyOverlay.classList.contains("open")) return;
  if (e.key === "Escape") closeStories();
  if (e.key === "ArrowRight") storyNext.click();
  if (e.key === "ArrowLeft") storyPrev.click();
});

/* ===== INIT ===== */
document.addEventListener("DOMContentLoaded", () => {
  showSkeletons();
  loadApps();
  loadAds();
  loadProducts();
  if (isStandalone()) installBtn.classList.remove("show");
});
document.addEventListener("visibilitychange", () => { if (!document.hidden) loadStories(); });
window.addEventListener("focus", () => loadStories());
</script>
