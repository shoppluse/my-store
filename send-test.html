<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopPlus Owner Notification Panel</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      padding: 18px;
      max-width: 760px;
      margin: auto;
      color: #1f2937;
    }

    h1 {
      color: #0047ab;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      margin-bottom: 18px;
      color: #4b5563;
      font-size: 14px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 6px;
      color: #111827;
    }

    input, textarea {
      width: 100%;
      margin-top: 4px;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #0047ab;
      box-shadow: 0 0 0 3px rgba(0, 71, 171, 0.08);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    button {
      background: #0047ab;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00337a;
    }

    button.secondary {
      background: #0f766e;
    }

    button.secondary:hover {
      background: #0b5e57;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .stats {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      background: #eef5ff;
      font-size: 14px;
      font-weight: 600;
      color: #00337a;
    }

    .result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 80px;
    }

    .note {
      margin-top: 16px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>📢 ShopPlus Owner Notification Panel</h1>
  <div class="subtitle">
    Send push notifications to all stored ShopPlus devices from the <b>users</b> collection.
  </div>

  <div class="box">
    <label>Notification Title</label>
    <input type="text" id="title" value="ShopPlus Update" />

    <label>Notification Body</label>
    <textarea id="body" rows="4">🔥 New products and rewards are now live!</textarea>

    <label>Open URL (optional)</label>
    <input type="text" id="url" value="https://shoppluse.github.io/my-store/home.html" />

    <div class="btn-row">
      <button id="countBtn" class="secondary">Check Token Count</button>
      <button id="sendBtn">Send Notification to All Devices</button>
    </div>

    <div id="stats" class="stats">Token count not checked yet.</div>
    <div id="result" class="result">Waiting...</div>

    <div class="note">
      Make sure your backend <b>ADMIN_SECRET_KEY</b> matches the admin key used here.
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://my-store-e28j.onrender.com";
    const ADMIN_KEY = "shopplus_owner_2026_super_secret";

    const sendBtn = document.getElementById("sendBtn");
    const countBtn = document.getElementById("countBtn");
    const resultBox = document.getElementById("result");
    const statsBox = document.getElementById("stats");

    async function fetchTokenCount() {
      statsBox.textContent = "Checking token count...";
      try {
        const response = await fetch(`${BACKEND_URL}/api/token-count`, {
          method: "GET",
          headers: {
            "x-admin-key": ADMIN_KEY
          }
        });

        const data = await response.json();

        if (!response.ok) {
          statsBox.textContent = `Token count failed: ${data.message || "Unknown error"}`;
          return;
        }

        statsBox.textContent = `✅ Total active tokens in users collection: ${data.totalTokens}`;
      } catch (error) {
        console.error("Token count error:", error);
        statsBox.textContent = `❌ Error checking token count: ${error.message}`;
      }
    }

    countBtn.addEventListener("click", fetchTokenCount);

    sendBtn.addEventListener("click", async () => {
      const title = document.getElementById("title").value.trim();
      const body = document.getElementById("body").value.trim();
      const url = document.getElementById("url").value.trim();

      if (!title || !body) {
        alert("Title and body are required");
        return;
      }

      sendBtn.disabled = true;
      resultBox.textContent = "Sending notification broadcast...";

      try {
        const response = await fetch(`${BACKEND_URL}/api/send-notification`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-key": ADMIN_KEY
          },
          body: JSON.stringify({
            title,
            body,
            url
          })
        });

        const data = await response.json();

        resultBox.textContent = JSON.stringify(data, null, 2);

        if (response.ok && data.success) {
          alert("✅ Notification broadcast completed!");
          fetchTokenCount();
        } else {
          alert("⚠️ Notification broadcast failed. Check result box.");
        }
      } catch (error) {
        console.error("Send notification error:", error);
        resultBox.textContent = "Error: " + error.message;
        alert("❌ Error sending notification. Check console.");
      } finally {
        sendBtn.disabled = false;
      }
    });

    fetchTokenCount();
  </script>
</body>
</html>
