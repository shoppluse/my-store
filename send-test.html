<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopPlus Owner Notification Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }
    h1 {
      color: #0047ab;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    input, textarea {
      width: 100%;
      margin-top: 10px;
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
      box-sizing: border-box;
    }
    button {
      background: #0047ab;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #00337a;
    }
    .result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      background: #eef5ff;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>📢 ShopPlus Owner Notification Test</h1>

  <div class="box">
    <label>Notification Title</label>
    <input type="text" id="title" value="ShopPlus Update" />

    <label>Notification Body</label>
    <textarea id="body" rows="4">🔥 New products and rewards are now live!</textarea>

    <label>Open URL (optional)</label>
    <input type="text" id="url" value="https://shoppluse.github.io/my-store/home.html" />

    <button id="sendBtn">Send Notification to All Devices</button>

    <div id="result" class="result">Waiting...</div>
  </div>

  <script>
    const sendBtn = document.getElementById("sendBtn");
    const resultBox = document.getElementById("result");

    sendBtn.addEventListener("click", async () => {
      const title = document.getElementById("title").value.trim();
      const body = document.getElementById("body").value.trim();
      const url = document.getElementById("url").value.trim();

      if (!title || !body) {
        alert("Title and body are required");
        return;
      }

      resultBox.textContent = "Sending notification...";

      try {
        const response = await fetch("https://my-store-e28j.onrender.com/api/send-notification", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-key": "shopplus_owner_2026_super_secret"
          },
          body: JSON.stringify({
            title,
            body,
            url
          })
        });

        const data = await response.json();

        resultBox.textContent = JSON.stringify(data, null, 2);

        if (data.success) {
          alert("Notification broadcast sent successfully!");
        } else {
          alert("Notification broadcast failed. Check result box.");
        }
      } catch (error) {
        console.error("Send notification error:", error);
        resultBox.textContent = "Error: " + error.message;
        alert("Error sending notification. Check console.");
      }
    });
  </script>
</body>
</html>
