<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - ShopPlus</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gradient-light: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg-light: #f8f9fb;
      --card-bg: #ffffff;
      --text-dark: #1f1f1f;
      --accent: #0099ff;
      --accent-dark: #0047ab;
      --input-bg: #f2f4fc;
      --border: #d8e3f2;
      --success: #2e7d32;
      --error: #d32f2f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--gradient-light);
      color: white;
      padding: 18px 24px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .auth-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0, 71, 171, 0.15);
      padding: 28px 24px;
    }

    .auth-card h2 {
      margin: 0 0 8px;
      color: var(--accent-dark);
      text-align: center;
      font-size: 28px;
    }

    .auth-card p {
      margin: 0 0 24px;
      color: #555;
      text-align: center;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.12);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--gradient-light);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      margin-top: 8px;
      font-family: inherit;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      font-weight: 600;
      line-height: 1.5;
      min-height: 22px;
    }

    .success {
      color: var(--success);
    }

    .error {
      color: var(--error);
    }

    .link-text {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }

    .link-text a {
      color: var(--accent-dark);
      text-decoration: none;
      font-weight: 700;
    }

    footer {
      background: var(--gradient-light);
      color: white;
      text-align: center;
      padding: 14px 10px;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .container {
        padding: 16px;
      }

      .auth-card {
        padding: 22px 18px;
        border-radius: 16px;
      }

      header {
        font-size: 20px;
        padding: 16px;
      }

      .auth-card h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <header>ShopPlus - Create Account</header>

  <div class="container">
    <div class="auth-card">
      <h2>Sign Up</h2>
      <p>Create your ShopPlus account to continue</p>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="mobile">Mobile Number</label>
          <input type="tel" id="mobile" placeholder="Enter your mobile number" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" required />
        </div>

        <button type="submit" id="signupBtn">Create Account</button>
      </form>

      <div id="message" class="message"></div>

      <div class="link-text">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <footer>© 2026 ShopPlus. All rights reserved.</footer>

  <script>
    const BACKEND_URL = "https://my-store-e28j.onrender.com";

    const form = document.getElementById("signupForm");
    const message = document.getElementById("message");
    const signupBtn = document.getElementById("signupBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.textContent = "";
      message.className = "message";
      signupBtn.disabled = true;
      signupBtn.textContent = "Creating Account...";

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const mobile = document.getElementById("mobile").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch(`${BACKEND_URL}/api/auth/signup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, email, mobile, password })
        });

        const data = await res.json();

        if (!res.ok) {
  message.textContent =
    (data.message || "Signup failed") +
    (data.error ? ` | Error: ${data.error}` : "") +
    (data.code ? ` | Code: ${data.code}` : "") +
    (data.response ? ` | Response: ${data.response}` : "");

  message.classList.add("error");
  signupBtn.disabled = false;
  signupBtn.textContent = "Create Account";
  return;
}

        localStorage.setItem("signupEmail", email);

        message.textContent = "Signup successful! OTP sent to your email. Redirecting to verify page...";
        message.classList.add("success");

        setTimeout(() => {
          window.location.href = "verify.html";
        }, 1800);

      } catch (error) {
        message.textContent = "Something went wrong. Please try again.";
        message.classList.add("error");
        signupBtn.disabled = false;
        signupBtn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
