<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - ShopPlus</title>
  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#0047ab" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gradient-light: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg-light: #f8f9fb;
      --card-bg: #ffffff;
      --text-dark: #1f1f1f;
      --accent: #0099ff;
      --accent-dark: #0047ab;
      --input-bg: #f2f4fc;
      --border: #d8e3f2;
      --success: #2e7d32;
      --error: #d32f2f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--gradient-light);
      color: white;
      padding: calc(18px + env(safe-area-inset-top)) 24px 18px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .auth-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0, 71, 171, 0.15);
      padding: 28px 24px;
    }

    .auth-card h2 {
      margin: 0 0 8px;
      color: var(--accent-dark);
      text-align: center;
      font-size: 28px;
    }

    .auth-card p {
      margin: 0 0 24px;
      color: #555;
      text-align: center;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.12);
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 50px;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      margin: 0;
      width: auto;
      color: #555;
      line-height: 1;
      user-select: none;
    }

    .toggle-password:hover {
      transform: translateY(-50%);
      opacity: 0.8;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--gradient-light);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      margin-top: 8px;
      font-family: inherit;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      font-weight: 600;
      line-height: 1.5;
      min-height: 22px;
      word-break: break-word;
    }

    .success {
      color: var(--success);
    }

    .error {
      color: var(--error);
    }

    .link-text {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }

    .link-text a {
      color: var(--accent-dark);
      text-decoration: none;
      font-weight: 700;
    }

    footer {
      background: var(--gradient-light);
      color: white;
      text-align: center;
      padding: 14px 10px calc(14px + env(safe-area-inset-bottom));
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .container {
        padding: 20px 16px;
      }

      .auth-card {
        padding: 22px 18px;
        border-radius: 16px;
      }

      header {
        font-size: 20px;
        padding: calc(24px + env(safe-area-inset-top)) 16px 16px;
      }

      .auth-card h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <header>ShopPlus - Create Account</header>

  <div class="container">
    <div class="auth-card">
      <h2>Sign Up</h2>
      <p>Create your ShopPlus account to continue</p>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="mobile">Mobile Number</label>
          <input type="tel" id="mobile" placeholder="Enter your mobile number" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Create a password" required />
            <button type="button" id="togglePassword" class="toggle-password" aria-label="Show password">👁️</button>
          </div>
        </div>

        <button type="submit" id="signupBtn">Create Account</button>
      </form>

      <div id="message" class="message"></div>

      <div class="link-text">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <footer>© 2026 ShopPlus. All rights reserved.</footer>

  <script>
    const BACKEND_URL = "https://my-store-e28j.onrender.com";

    const form = document.getElementById("signupForm");
    const message = document.getElementById("message");
    const signupBtn = document.getElementById("signupBtn");
    const passwordInput = document.getElementById("password");
    const togglePasswordBtn = document.getElementById("togglePassword");

    function showMessage(text, type = "error") {
      message.textContent = text;
      message.className = "message";
      message.classList.add(type);
    }

    function resetButton() {
      signupBtn.disabled = false;
      signupBtn.textContent = "Create Account";
    }

    // SHOW / HIDE PASSWORD
    togglePasswordBtn.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";

      if (isPassword) {
        passwordInput.type = "text";
        togglePasswordBtn.textContent = "🙈";
        togglePasswordBtn.setAttribute("aria-label", "Hide password");
      } else {
        passwordInput.type = "password";
        togglePasswordBtn.textContent = "👁️";
        togglePasswordBtn.setAttribute("aria-label", "Show password");
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const mobile = document.getElementById("mobile").value.trim();
      const password = passwordInput.value.trim();

      message.textContent = "";
      message.className = "message";

      // Frontend validation
      if (!name || !email || !mobile || !password) {
        showMessage("Please fill in all fields.", "error");
        return;
      }

      if (!/^\S+@\S+\.\S+$/.test(email)) {
        showMessage("Please enter a valid email address.", "error");
        return;
      }

      if (!/^\d{10}$/.test(mobile)) {
        showMessage("Please enter a valid 10-digit mobile number.", "error");
        return;
      }

      if (password.length < 4) {
        showMessage("Password must be at least 4 characters.", "error");
        return;
      }

      signupBtn.disabled = true;
      signupBtn.textContent = "Creating Account...";

      try {
        // IMPORTANT: current deployed backend supports /signup
        const res = await fetch(`${BACKEND_URL}/api/auth/signup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, email, mobile, password })
        });

        let data = {};
        try {
          data = await res.json();
        } catch (jsonError) {
          console.error("Invalid JSON response:", jsonError);
          throw new Error("Server returned invalid response");
        }

        // Works with both old and new backend responses
        if (!res.ok || data.success === false) {
          showMessage(data.message || "Signup failed. Please try again.", "error");
          resetButton();
          return;
        }

        signupBtn.textContent = "Success...";
        showMessage(data.message || "Signup successful! Redirecting to login...", "success");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1400);

      } catch (error) {
        console.error("Signup error:", error);
        showMessage("Server not reachable or something went wrong. Please try again.", "error");
        resetButton();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
          .then((registration) => {
            console.log("Service Worker registered:", registration.scope);
          })
          .catch((error) => {
            console.error("Service Worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
