<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopPlus - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg: #eef5ff;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --muted: #64748b;
      --primary: #0047ab;
      --primary-2: #0099ff;
      --border: #dbe7ff;
      --shadow: rgba(0, 71, 171, 0.14);
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #60a5fa;
      --primary-2: #38bdf8;
      --border: #1e3a8a;
      --shadow: rgba(56, 189, 248, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #f8fbff 100%);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    [data-theme="dark"] body {
      background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
    }

    .main-header {
      background: var(--gradient);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      box-shadow: 0 6px 20px var(--shadow);
    }

    .shopplus-logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      background: #ffffff;
      padding: 8px 22px;
      border-radius: 16px;
      letter-spacing: 0.5px;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0, 71, 171, 0.15);
    }

    .shopplus-logo .plus {
      color: var(--primary-2);
      font-size: 2.2rem;
      font-weight: 900;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-btn {
      text-decoration: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.25s ease;
      cursor: pointer;
    }

    .header-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.22);
    }

    .dark-mode-toggle {
      cursor: pointer;
      font-size: 1.4rem;
      background: transparent;
      border: none;
      color: #fff;
      padding: 6px 10px;
      border-radius: 50%;
      transition: 0.25s ease;
    }

    .dark-mode-toggle:hover {
      background: rgba(255,255,255,0.15);
    }

    .page-wrap {
      max-width: 900px;
      margin: 36px auto;
      padding: 0 20px 40px;
    }

    .profile-card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 18px 50px var(--shadow);
      border: 1px solid var(--border);
    }

    .top-section {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2.1rem;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0, 71, 171, 0.25);
      flex-shrink: 0;
    }

    .profile-head {
      flex: 1;
      min-width: 220px;
    }

    .profile-head h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
      color: var(--primary);
    }

    .profile-head p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .badge.verified {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.2);
    }

    .badge.unverified {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 12px;
    }

    .info-box {
      background: rgba(0, 71, 171, 0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }

    [data-theme="dark"] .info-box {
      background: rgba(96, 165, 250, 0.05);
    }

    .info-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .info-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .action-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .action-btn {
      flex: 1 1 180px;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      transition: 0.25s ease;
      text-align: center;
      text-decoration: none;
    }

    .btn-home {
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 10px 24px rgba(0, 71, 171, 0.22);
    }

    .btn-home:hover {
      transform: translateY(-2px);
    }

    .btn-edit {
      background: rgba(0, 153, 255, 0.08);
      color: var(--primary);
      border: 1px solid rgba(0, 153, 255, 0.18);
    }

    .btn-edit:hover {
      transform: translateY(-2px);
      background: rgba(0, 153, 255, 0.14);
    }

    .btn-logout {
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.18);
    }

    .btn-logout:hover {
      transform: translateY(-2px);
      background: rgba(220, 38, 38, 0.14);
    }

    .mini-note {
      margin-top: 18px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 700px) {
      .info-grid {
        grid-template-columns: 1fr;
      }

      .profile-card {
        padding: 22px 18px;
        border-radius: 22px;
      }

      .profile-head h1 {
        font-size: 1.6rem;
      }

      .avatar {
        width: 80px;
        height: 80px;
        font-size: 1.8rem;
      }

      .main-header {
        padding: 14px 16px;
      }

      .shopplus-logo {
        font-size: 1.5rem;
        padding: 8px 16px;
      }

      .shopplus-logo .plus {
        font-size: 1.7rem;
      }

      .header-btn {
        font-size: 0.82rem;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="main-header">
    <a href="home.html" class="shopplus-logo">Shop<span class="plus">+</span></a>

    <div class="header-actions">
      <a href="home.html" class="header-btn">Home</a>
      <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <div class="page-wrap">
    <div class="profile-card">
      <div class="top-section">
        <div class="avatar" id="avatarLetter">U</div>

        <div class="profile-head">
          <h1 id="userName">User</h1>
          <p>Your ShopPlus account details</p>
          <div id="verifyBadge" class="badge verified">✅ Verified Account</div>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">Full Name</div>
          <div class="info-value" id="nameValue">-</div>
        </div>

        <div class="info-box">
          <div class="info-label">Email Address</div>
          <div class="info-value" id="emailValue">-</div>
        </div>

        <div class="info-box">
          <div class="info-label">Mobile Number</div>
          <div class="info-value" id="mobileValue">-</div>
        </div>

        <div class="info-box">
          <div class="info-label">Account Status</div>
          <div class="info-value" id="statusValue">Active</div>
        </div>
      </div>

      <div class="action-row">
        <a href="home.html" class="action-btn btn-home">⬅ Back to Home</a>
        <button class="action-btn btn-edit" id="editProfileBtn">✏ Edit Profile</button>
        <button class="action-btn btn-logout" id="logoutBtn">🚪 Logout</button>
      </div>

      <div class="mini-note">
        More profile update features can be connected in the next phase.
      </div>
    </div>
  </div>

  <script>
    const htmlEl = document.documentElement;
    const darkToggleBtn = document.getElementById("darkModeToggle");
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
      htmlEl.setAttribute("data-theme", savedTheme);
      darkToggleBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
    }

    darkToggleBtn.addEventListener("click", () => {
      const currentTheme = htmlEl.getAttribute("data-theme");

      if (currentTheme === "dark") {
        htmlEl.setAttribute("data-theme", "light");
        localStorage.setItem("theme", "light");
        darkToggleBtn.textContent = "🌙";
      } else {
        htmlEl.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        darkToggleBtn.textContent = "☀️";
      }
    });

    const userDataRaw = localStorage.getItem("shopplusUser");

    if (!userDataRaw) {
      window.location.href = "login.html";
    }

    let user = {};

    try {
      user = JSON.parse(userDataRaw);
    } catch (error) {
      localStorage.removeItem("shopplusUser");
      window.location.href = "login.html";
    }

    const name = user.name || "ShopPlus User";
    const email = user.email || "Not available";
    const mobile = user.mobile || "Not available";
    const isVerified = user.isVerified !== undefined ? user.isVerified : true;

    document.getElementById("userName").textContent = name;
    document.getElementById("nameValue").textContent = name;
    document.getElementById("emailValue").textContent = email;
    document.getElementById("mobileValue").textContent = mobile;
    document.getElementById("statusValue").textContent = isVerified ? "Verified & Active" : "Pending Verification";
    document.getElementById("avatarLetter").textContent = name.charAt(0).toUpperCase();

    const verifyBadge = document.getElementById("verifyBadge");
    if (isVerified) {
      verifyBadge.className = "badge verified";
      verifyBadge.textContent = "✅ Verified Account";
    } else {
      verifyBadge.className = "badge unverified";
      verifyBadge.textContent = "⏳ Verification Pending";
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      const confirmLogout = confirm("Are you sure you want to logout?");

      if (confirmLogout) {
        localStorage.removeItem("shopplusUser");
        window.location.href = "login.html";
      }
    });

    document.getElementById("editProfileBtn").addEventListener("click", () => {
      alert("Edit Profile feature will be connected in the next phase.");
    });
  </script>
</body>
</html>
