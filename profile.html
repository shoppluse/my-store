<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopPlus - Profile</title>

  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#0047ab" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg: #eef5ff;
      --bg-2: #f8fbff;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --muted: #64748b;
      --primary: #0047ab;
      --primary-2: #0099ff;
      --border: #dbe7ff;
      --shadow: rgba(0, 71, 171, 0.14);
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
      --paid: #7c3aed;
      --share: #0ea5e9;
      --share-hover: #0284c7;
      --support: #25d366;
      --support-hover: #1da851;
      --header-glass: rgba(255,255,255,0.15);
      --header-glass-border: rgba(255,255,255,0.2);
      --soft-blue-bg: rgba(0, 153, 255, 0.05);
      --soft-blue-border: rgba(0, 153, 255, 0.12);
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --bg-2: #111827;
      --card-bg: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #60a5fa;
      --primary-2: #38bdf8;
      --border: #1e3a8a;
      --shadow: rgba(56, 189, 248, 0.15);
      --success: #22c55e;
      --warning: #fbbf24;
      --danger: #f87171;
      --paid: #a78bfa;
      --share: #38bdf8;
      --share-hover: #0ea5e9;
      --support: #25d366;
      --support-hover: #1da851;
      --header-glass: rgba(255,255,255,0.12);
      --header-glass-border: rgba(255,255,255,0.16);
      --soft-blue-bg: rgba(56, 189, 248, 0.08);
      --soft-blue-border: rgba(56, 189, 248, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    .main-header {
      background: var(--gradient);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(16px + env(safe-area-inset-top)) 14px 18px;
      box-shadow: 0 6px 20px var(--shadow);
      gap: 12px;
    }

    .header-top {
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      width: 100%;
      min-height: 58px;
      border: 1px solid var(--header-glass-border);
      background: var(--header-glass);
      color: #fff;
      border-radius: 16px;
      font-family: inherit;
      font-size: 1.6rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(4px);
    }

    .icon-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.22);
    }

    .header-title {
      background: #ffffff;
      color: var(--primary);
      border-radius: 16px;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 8px 14px;
      text-align: center;
      box-shadow: 0 8px 22px rgba(0, 71, 171, 0.14);
    }

    .header-actions {
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .header-btn {
      width: 100%;
      min-height: 60px;
      text-decoration: none;
      background: var(--header-glass);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 10px;
      border-radius: 16px;
      border: 1px solid var(--header-glass-border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: inherit;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(4px);
    }

    .header-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.22);
    }

    .page-wrap {
      max-width: 1100px;
      margin: 26px auto;
      padding: 0 16px 34px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 50px var(--shadow);
      border: 1px solid var(--border);
    }

    .profile-card {
      position: sticky;
      top: 20px;
    }

    .avatar {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: var(--gradient);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      margin: 0 auto 18px;
      box-shadow: 0 10px 24px rgba(0, 71, 171, 0.2);
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 6px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 0.94rem;
    }

    .info-list {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }

    .info-item {
      padding: 14px;
      border-radius: 16px;
      background: var(--soft-blue-bg);
      border: 1px solid var(--soft-blue-border);
    }

    .info-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 0.96rem;
      font-weight: 600;
      word-break: break-word;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 8px;
    }

    .verified-yes {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.2);
    }

    .verified-no {
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .btn-group {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      width: 100%;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      text-decoration: none;
      text-align: center;
      transition: 0.25s ease;
      display: inline-block;
      color: #fff;
    }

    .btn-primary {
      background: var(--gradient);
      box-shadow: 0 10px 24px rgba(0, 71, 171, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-share {
      background: var(--share);
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.22);
    }

    .btn-share:hover {
      transform: translateY(-2px);
      background: var(--share-hover);
    }

    .btn-support {
      background: var(--support);
      box-shadow: 0 10px 24px rgba(37, 211, 102, 0.22);
    }

    .btn-support:hover {
      transform: translateY(-2px);
      background: var(--support-hover);
    }

    .btn-danger {
      background: #ef4444;
      box-shadow: 0 10px 24px rgba(239, 68, 68, 0.22);
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      background: #dc2626;
    }

    .share-status {
      margin-top: 10px;
      text-align: center;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--muted);
      min-height: 20px;
    }

    .section-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 8px;
    }

    .section-subtitle {
      color: var(--muted);
      margin: 0 0 20px;
      font-size: 0.94rem;
    }

    .affiliate-card {
      margin-bottom: 20px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--soft-blue-bg);
    }

    .affiliate-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .affiliate-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0;
    }

    .affiliate-desc {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .affiliate-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill-none {
      background: rgba(100, 116, 139, 0.08);
      color: #64748b;
      border: 1px solid rgba(100, 116, 139, 0.16);
    }

    .pill-pending {
      background: rgba(245, 158, 11, 0.12);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .pill-approved {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.2);
    }

    .pill-rejected {
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.18);
    }

    .affiliate-body {
      display: grid;
      gap: 12px;
    }

    .affiliate-note {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    [data-theme="dark"] .affiliate-note {
      background: rgba(15, 23, 42, 0.65);
    }

    .claim-card {
      border-radius: 20px;
      padding: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.55);
      box-shadow: 0 10px 28px rgba(0, 71, 171, 0.08);
    }

    [data-theme="dark"] .claim-card {
      background: rgba(17,24,39,0.9);
    }

    .claims-grid {
      display: grid;
      gap: 16px;
    }

    .claim-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .claim-product {
      font-size: 1.02rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .claim-id {
      font-size: 0.84rem;
      color: var(--muted);
      font-weight: 600;
    }

    .status-badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-pending {
      background: rgba(245, 158, 11, 0.12);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .status-approved {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.2);
    }

    .status-rejected {
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .status-paid {
      background: rgba(124, 58, 237, 0.12);
      color: var(--paid);
      border: 1px solid rgba(124, 58, 237, 0.22);
    }

    .claim-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .meta-box {
      padding: 12px;
      border-radius: 14px;
      background: var(--soft-blue-bg);
      border: 1px solid var(--soft-blue-border);
    }

    .meta-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .meta-value {
      font-size: 0.93rem;
      font-weight: 700;
      color: var(--text);
      word-break: break-word;
    }

    .reward-amount {
      color: var(--success);
    }

    .empty-box,
    .loading-box {
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed var(--border);
      background: var(--soft-blue-bg);
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 950px) {
      .profile-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .profile-card {
        position: static;
      }

      .page-wrap {
        margin: 20px auto;
      }
    }

    @media (max-width: 700px) {
      .main-header {
        padding: calc(14px + env(safe-area-inset-top)) 12px 16px;
        gap: 10px;
      }

      .header-top {
        grid-template-columns: 52px 1fr 52px;
        gap: 8px;
      }

      .icon-btn {
        min-height: 52px;
        border-radius: 14px;
        font-size: 1.35rem;
      }

      .header-title {
        min-height: 52px;
        font-size: 1rem;
        border-radius: 14px;
        padding: 8px 10px;
      }

      .header-actions {
        gap: 10px;
      }

      .header-btn {
        min-height: 56px;
        font-size: 0.9rem;
        padding: 10px 8px;
        border-radius: 14px;
      }

      .card {
        padding: 18px 14px;
        border-radius: 18px;
      }

      .page-wrap {
        padding: 0 12px 24px;
        margin: 18px auto;
      }

      .avatar {
        width: 72px;
        height: 72px;
        font-size: 1.6rem;
        margin-bottom: 14px;
      }

      .title {
        font-size: 1.28rem;
      }

      .subtitle {
        font-size: 0.88rem;
        margin-bottom: 14px;
      }

      .info-list {
        gap: 10px;
      }

      .info-item {
        padding: 12px;
        border-radius: 14px;
      }

      .info-label {
        font-size: 0.75rem;
      }

      .info-value {
        font-size: 0.9rem;
      }

      .verified-badge {
        font-size: 0.78rem;
        padding: 7px 10px;
      }

      .btn-group {
        gap: 10px;
        margin-top: 16px;
      }

      .btn {
        padding: 12px 14px;
        font-size: 14px;
        border-radius: 12px;
      }

      .section-title {
        font-size: 1.16rem;
        text-align: center;
      }

      .section-subtitle {
        font-size: 0.88rem;
        text-align: center;
        margin-bottom: 16px;
      }

      .affiliate-card {
        padding: 14px;
        border-radius: 16px;
      }

      .affiliate-title {
        font-size: 0.96rem;
      }

      .affiliate-desc,
      .affiliate-note {
        font-size: 0.86rem;
      }

      .claim-card {
        padding: 14px;
        border-radius: 16px;
      }

      .claim-top {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .claim-product {
        font-size: 0.93rem;
        line-height: 1.4;
      }

      .claim-id {
        font-size: 0.78rem;
      }

      .status-badge {
        font-size: 0.75rem;
        padding: 7px 10px;
      }

      .claim-meta {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .meta-box {
        padding: 10px;
        border-radius: 12px;
      }

      .meta-label {
        font-size: 0.7rem;
      }

      .meta-value {
        font-size: 0.88rem;
      }

      .empty-box,
      .loading-box {
        padding: 14px;
        font-size: 0.9rem;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="main-header">
    <div class="header-top">
      <a href="./home.html" class="icon-btn" title="Back to Home">&lt;</a>
      <div class="header-title">My Profile</div>
      <button id="darkModeToggle" class="icon-btn" title="Toggle theme">🌙</button>
    </div>

    <div class="header-actions">
      <a href="./home.html" class="header-btn">Home</a>
      <a href="./claim-reward.html" class="header-btn">Claim Reward</a>
    </div>
  </div>

  <div class="page-wrap">
    <div class="profile-grid">
      <div class="card profile-card">
        <div class="avatar" id="avatarLetter">U</div>
        <h1 class="title" id="userName">User</h1>
        <p class="subtitle">Your ShopPlus account dashboard</p>

        <div style="text-align:center;">
          <span id="verifiedBadge" class="verified-badge verified-no">❌ Not Verified</span>
        </div>

        <div class="info-list">
          <div class="info-item">
            <div class="info-label">Email</div>
            <div class="info-value" id="userEmail">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">Mobile Number</div>
            <div class="info-value" id="userMobile">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">User ID</div>
            <div class="info-value" id="userId">-</div>
          </div>
        </div>

        <div class="btn-group">
          <a href="./home.html" class="btn btn-primary">Back to Store</a>
          <button id="shareAppBtn" class="btn btn-share">Share App</button>
          <a href="https://wa.me/919945243930?text=Hello%20ShopPlus%20Support%2C%20I%20need%20help." target="_blank" class="btn btn-support">Support</a>
          <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>

        <div id="shareStatus" class="share-status"></div>
      </div>

      <div class="card">
        <div id="affiliateSection"></div>

        <h2 class="section-title">My Reward Claims</h2>
        <p class="section-subtitle">
          Track your submitted reward requests, review status, and approved reward amounts.
        </p>

        <div id="claimsContainer" class="loading-box">
          Loading your reward claims...
        </div>
      </div>
    </div>
  </div>

  <script>
    const currentUserRaw = localStorage.getItem("shopplusUser");

    if (!currentUserRaw) {
      window.location.href = "./login.html";
    }

    let currentUser = {};
    try {
      currentUser = JSON.parse(currentUserRaw);
    } catch (error) {
      localStorage.removeItem("shopplusUser");
      localStorage.removeItem("shopplusLoggedIn");
      window.location.href = "./login.html";
    }

    const BACKEND_URL = "https://my-store-e28j.onrender.com";

    const htmlEl = document.documentElement;
    const darkToggleBtn = document.getElementById("darkModeToggle");
    const savedTheme = localStorage.getItem("theme");

    function applyTheme(theme) {
      htmlEl.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
      darkToggleBtn.textContent = theme === "dark" ? "☀️" : "🌙";
    }

    applyTheme(savedTheme === "dark" ? "dark" : "light");

    darkToggleBtn.addEventListener("click", () => {
      const currentTheme = htmlEl.getAttribute("data-theme");
      applyTheme(currentTheme === "dark" ? "light" : "dark");
    });

    const userNameEl = document.getElementById("userName");
    const userEmailEl = document.getElementById("userEmail");
    const userMobileEl = document.getElementById("userMobile");
    const userIdEl = document.getElementById("userId");
    const avatarLetterEl = document.getElementById("avatarLetter");
    const verifiedBadgeEl = document.getElementById("verifiedBadge");
    const logoutBtn = document.getElementById("logoutBtn");
    const shareAppBtn = document.getElementById("shareAppBtn");
    const shareStatus = document.getElementById("shareStatus");
    const claimsContainer = document.getElementById("claimsContainer");
    const affiliateSection = document.getElementById("affiliateSection");

    const userName = currentUser.name || "User";
    const userEmail = currentUser.email || "Not available";
    const userMobile = currentUser.mobile || "Not available";
    const userId = currentUser.id || currentUser._id || "Not available";
    const isVerified = !!currentUser.isVerified;
    const affiliateStatus = (currentUser.affiliateStatus || "none").toLowerCase();

    userNameEl.textContent = userName;
    userEmailEl.textContent = userEmail;
    userMobileEl.textContent = userMobile;
    userIdEl.textContent = userId;
    avatarLetterEl.textContent = userName.charAt(0).toUpperCase();

    if (isVerified) {
      verifiedBadgeEl.textContent = "✅ Verified Account";
      verifiedBadgeEl.className = "verified-badge verified-yes";
    } else {
      verifiedBadgeEl.textContent = "❌ Not Verified";
      verifiedBadgeEl.className = "verified-badge verified-no";
    }

    function renderAffiliateSection(status) {
      if (status === "approved") {
        affiliateSection.innerHTML = `
          <div class="affiliate-card">
            <div class="affiliate-head">
              <div>
                <h3 class="affiliate-title">Affiliate Membership</h3>
                <p class="affiliate-desc">Your ShopPlus affiliate membership has been approved.</p>
              </div>
              <span class="affiliate-pill pill-approved">✅ Approved</span>
            </div>
            <div class="affiliate-body">
              <div class="affiliate-note">
                You are now an approved ShopPlus affiliate member. You can contact ShopPlus support for next onboarding steps.
              </div>
              <a href="https://wa.me/919945243930?text=Hello%20ShopPlus%2C%20my%20affiliate%20application%20has%20been%20approved.%20Please%20guide%20me%20for%20next%20steps." target="_blank" class="btn btn-primary">Contact for Next Steps</a>
            </div>
          </div>
        `;
        return;
      }

      if (status === "pending") {
        affiliateSection.innerHTML = `
          <div class="affiliate-card">
            <div class="affiliate-head">
              <div>
                <h3 class="affiliate-title">Affiliate Application</h3>
                <p class="affiliate-desc">Your affiliate application is under manual review by ShopPlus.</p>
              </div>
              <span class="affiliate-pill pill-pending">⏳ Pending Review</span>
            </div>
            <div class="affiliate-body">
              <div class="affiliate-note">
                Your application has been submitted successfully. Once verified, ShopPlus will approve or reject your request. If your status was updated in the backend, please logout and login again to refresh your profile.
              </div>
              <a href="https://wa.me/919945243930?text=Hello%20ShopPlus%2C%20I%20wanted%20to%20check%20the%20status%20of%20my%20affiliate%20application." target="_blank" class="btn btn-support">Check via WhatsApp</a>
            </div>
          </div>
        `;
        return;
      }

      if (status === "rejected") {
        affiliateSection.innerHTML = `
          <div class="affiliate-card">
            <div class="affiliate-head">
              <div>
                <h3 class="affiliate-title">Affiliate Application</h3>
                <p class="affiliate-desc">Your previous affiliate application was not approved.</p>
              </div>
              <span class="affiliate-pill pill-rejected">❌ Rejected</span>
            </div>
            <div class="affiliate-body">
              <div class="affiliate-note">
                Your affiliate application was rejected after review. If you want to try again later, please contact ShopPlus support first.
              </div>
              <a href="https://wa.me/919945243930?text=Hello%20ShopPlus%2C%20my%20affiliate%20application%20was%20rejected.%20Can%20you%20guide%20me%20for%20reapply%20or%20improvement%3F" target="_blank" class="btn btn-support">Contact Support</a>
            </div>
          </div>
        `;
        return;
      }

      affiliateSection.innerHTML = `
        <div class="affiliate-card">
          <div class="affiliate-head">
            <div>
              <h3 class="affiliate-title">Join ShopPlus Affiliate Program</h3>
              <p class="affiliate-desc">Apply to become a ShopPlus affiliate member and start your affiliate journey with ShopPlus.</p>
            </div>
            <span class="affiliate-pill pill-none">📝 Not Applied</span>
          </div>
          <div class="affiliate-body">
            <div class="affiliate-note">
              Join the ShopPlus affiliate program to get access to affiliate member opportunities. Your application will be manually reviewed before approval.
            </div>
            <a href="./apply-affiliate.html" class="btn btn-primary">Join Affiliate</a>
          </div>
        </div>
      `;
    }

    renderAffiliateSection(affiliateStatus);

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("shopplusUser");
      localStorage.removeItem("shopplusLoggedIn");
      window.location.href = "./login.html";
    });

    function showShareStatus(message, isSuccess = true) {
      shareStatus.textContent = message;
      shareStatus.style.color = isSuccess ? "var(--success)" : "var(--danger)";

      setTimeout(() => {
        shareStatus.textContent = "";
      }, 3000);
    }

    async function shareApp() {
      const appUrl = window.location.origin + "/my-store/";

      const shareData = {
        title: "ShopPlus",
        text: "Check out ShopPlus - discover awesome products and deals!",
        url: appUrl
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
          showShareStatus("App shared successfully!");
        } catch (error) {
          console.log("Share cancelled or failed:", error);
        }
      } else {
        try {
          await navigator.clipboard.writeText(appUrl);
          showShareStatus("App link copied successfully!");
        } catch (error) {
          showShareStatus("Copy failed. Share this link: " + appUrl, false);
          alert("Copy failed. App link: " + appUrl);
        }
      }
    }

    shareAppBtn.addEventListener("click", shareApp);

    function formatDate(dateString) {
      if (!dateString) return "Not available";

      const date = new Date(dateString);
      if (isNaN(date.getTime())) return dateString;

      return date.toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function getStatusClass(status) {
      switch ((status || "").toLowerCase()) {
        case "approved":
          return "status-approved";
        case "rejected":
          return "status-rejected";
        case "paid":
          return "status-paid";
        default:
          return "status-pending";
      }
    }

    function getStatusText(status) {
      if (!status) return "Pending";
      return status.charAt(0).toUpperCase() + status.slice(1).toLowerCase();
    }

    async function loadRewardClaims() {
      if (!userId || userId === "Not available") {
        claimsContainer.className = "empty-box";
        claimsContainer.textContent = "User ID not found. Please login again.";
        return;
      }

      try {
        const res = await fetch(`${BACKEND_URL}/api/rewards/user/${encodeURIComponent(userId)}`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Failed to fetch reward claims");
        }

        const claims = data.claims || [];

        if (claims.length === 0) {
          claimsContainer.className = "empty-box";
          claimsContainer.innerHTML = `
            No reward claims submitted yet.<br>
            Buy a product and submit your first reward request from the product page.
          `;
          return;
        }

        claimsContainer.className = "claims-grid";
        claimsContainer.innerHTML = claims.map((claim) => {
          const status = claim.status || "pending";
          const rewardAmount = Number(claim.rewardAmount || 0);

          return `
            <div class="claim-card">
              <div class="claim-top">
                <div>
                  <div class="claim-product">${claim.productName || "Unnamed Product"}</div>
                  <div class="claim-id">Product ID: ${claim.productId || "-"}</div>
                </div>
                <div class="status-badge ${getStatusClass(status)}">${getStatusText(status)}</div>
              </div>

              <div class="claim-meta">
                <div class="meta-box">
                  <div class="meta-label">Order Reference</div>
                  <div class="meta-value">${claim.orderReference || "-"}</div>
                </div>

                <div class="meta-box">
                  <div class="meta-label">Purchase Date</div>
                  <div class="meta-value">${formatDate(claim.purchaseDate)}</div>
                </div>

                <div class="meta-box">
                  <div class="meta-label">Reward Amount</div>
                  <div class="meta-value reward-amount">₹${rewardAmount.toFixed(2)}</div>
                </div>

                <div class="meta-box">
                  <div class="meta-label">Submitted On</div>
                  <div class="meta-value">${formatDate(claim.createdAt)}</div>
                </div>
              </div>
            </div>
          `;
        }).join("");
      } catch (error) {
        console.error("Reward claims fetch error:", error);
        claimsContainer.className = "empty-box";
        claimsContainer.textContent = error.message || "Failed to load reward claims.";
      }
    }

    loadRewardClaims();
  </script>
</body>
</html>
