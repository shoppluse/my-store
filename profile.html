<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopPlus - Profile</title>

  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#0047ab" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg: #eef5ff;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --muted: #64748b;
      --primary: #0047ab;
      --primary-2: #0099ff;
      --border: #dbe7ff;
      --shadow: rgba(0, 71, 171, 0.14);
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
      --paid: #7c3aed;
      --share: #0ea5e9;
      --share-hover: #0284c7;
      --support: #25d366;
      --support-hover: #1da851;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #60a5fa;
      --primary-2: #38bdf8;
      --border: #1e3a8a;
      --shadow: rgba(56, 189, 248, 0.15);
      --success: #22c55e;
      --warning: #fbbf24;
      --danger: #f87171;
      --paid: #a78bfa;
      --share: #38bdf8;
      --share-hover: #0ea5e9;
      --support: #25d366;
      --support-hover: #1da851;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #f8fbff 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    /* HOME.HTML STYLE HEADER */
    .main-header {
      background: var(--gradient);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(18px + env(safe-area-inset-top)) 16px 20px;
      box-shadow: 0 6px 20px var(--shadow);
      gap: 14px;
    }

    .shopplus-logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      background: #ffffff;
      padding: 10px 22px;
      border-radius: 18px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      max-width: 700px;
    }

    .shopplus-logo .plus {
      color: var(--primary-2);
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1;
    }

    .header-actions {
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .header-btn,
    .dark-mode-toggle {
      width: 100%;
      min-height: 64px;
      text-decoration: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: inherit;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: none;
      backdrop-filter: blur(4px);
    }

    .header-btn:hover,
    .dark-mode-toggle:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.22);
    }

    .dark-mode-toggle {
      font-size: 1.5rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .page-wrap {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 18px 40px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 18px 50px var(--shadow);
      border: 1px solid var(--border);
    }

    .profile-card {
      position: sticky;
      top: 20px;
    }

    .avatar {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: var(--gradient);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      margin: 0 auto 18px;
      box-shadow: 0 10px 24px rgba(0, 71, 171, 0.2);
    }

    .title {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 6px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 0.95rem;
    }

    .info-list {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }

    .info-item {
      padding: 14px;
      border-radius: 16px;
      background: rgba(0, 153, 255, 0.05);
      border: 1px solid rgba(0, 153, 255, 0.12);
    }

    .info-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 0.98rem;
      font-weight: 600;
      word-break: break-word;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 8px;
    }

    .verified-yes {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.2);
    }

    .verified-no {
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .btn-group {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      width: 100%;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      text-decoration: none;
      text-align: center;
      transition: 0.25s ease;
      display: inline-block;
      color: #fff;
    }

    .btn-primary {
      background: var(--gradient);
      box-shadow: 0 10px 24px rgba(0, 71, 171, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-share {
      background: var(--share);
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.22);
    }

    .btn-share:hover {
      transform: translateY(-2px);
      background: var(--share-hover);
    }

    .btn-support {
      background: var(--support);
      box-shadow: 0 10px 24px rgba(37, 211, 102, 0.22);
    }

    .btn-support:hover {
      transform: translateY(-2px);
      background: var(--support-hover);
    }

    .btn-danger {
      background: #ef4444;
      box-shadow: 0 10px 24px rgba(239, 68, 68, 0.22);
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      background: #dc2626;
    }

    .share-status {
      margin-top: 10px;
      text-align: center;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--muted);
      min-height: 20px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 8px;
    }

    .section-subtitle {
      color: var(--muted);
      margin: 0 0 20px;
      font-size: 0.95rem;
    }

    .claims-grid {
      display: grid;
      gap: 16px;
    }

    .claim-card {
      border-radius: 20px;
      padding: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.55);
      box-shadow: 0 10px 28px rgba(0, 71, 171, 0.08);
    }

    [data-theme="dark"] .claim-card {
      background: rgba(17,24,39,0.9);
    }

    .claim-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .claim-product {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .claim-id {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    .status-badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-pending {
      background: rgba(245, 158, 11, 0.12);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .status-approved {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
      border: 1px solid rgba(22, 163, 74, 0.2);
    }

    .status-rejected {
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.2);
    }

    .status-paid {
      background: rgba(124, 58, 237, 0.12);
      color: var(--paid);
      border: 1px solid rgba(124, 58, 237, 0.22);
    }

    .claim-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .meta-box {
      padding: 12px;
      border-radius: 14px;
      background: rgba(0, 153, 255, 0.05);
      border: 1px solid rgba(0, 153, 255, 0.1);
    }

    .meta-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .meta-value {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      word-break: break-word;
    }

    .reward-amount {
      color: var(--success);
    }

    .empty-box,
    .loading-box {
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed var(--border);
      background: rgba(0, 153, 255, 0.04);
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 950px) {
      .profile-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .profile-card {
        position: static;
      }

      .page-wrap {
        margin: 24px auto;
      }
    }

    @media (max-width: 700px) {
      .main-header {
        padding: calc(14px + env(safe-area-inset-top)) 12px 18px;
        gap: 12px;
      }

      .shopplus-logo {
        font-size: 1.35rem;
        padding: 8px 14px;
        border-radius: 16px;
      }

      .shopplus-logo .plus {
        font-size: 1.7rem;
      }

      .header-actions {
        gap: 10px;
      }

      .header-btn,
      .dark-mode-toggle {
        min-height: 58px;
        font-size: 0.82rem;
        padding: 10px 6px;
        border-radius: 14px;
      }

      .dark-mode-toggle {
        font-size: 1.25rem;
      }

      .card {
        padding: 18px 14px;
        border-radius: 18px;
      }

      .page-wrap {
        padding: 0 12px 24px;
        margin: 18px auto;
      }

      .avatar {
        width: 72px;
        height: 72px;
        font-size: 1.6rem;
        margin-bottom: 14px;
      }

      .title {
        font-size: 1.3rem;
      }

      .subtitle {
        font-size: 0.88rem;
        margin-bottom: 14px;
      }

      .info-list {
        gap: 10px;
      }

      .info-item {
        padding: 12px;
        border-radius: 14px;
      }

      .info-label {
        font-size: 0.75rem;
      }

      .info-value {
        font-size: 0.9rem;
      }

      .verified-badge {
        font-size: 0.78rem;
        padding: 7px 10px;
      }

      .btn-group {
        gap: 10px;
        margin-top: 16px;
      }

      .btn {
        padding: 12px 14px;
        font-size: 14px;
        border-radius: 12px;
      }

      .section-title {
        font-size: 1.2rem;
        text-align: center;
      }

      .section-subtitle {
        font-size: 0.88rem;
        text-align: center;
        margin-bottom: 16px;
      }

      .claim-card {
        padding: 14px;
        border-radius: 16px;
      }

      .claim-top {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .claim-product {
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .claim-id {
        font-size: 0.78rem;
      }

      .status-badge {
        font-size: 0.75rem;
        padding: 7px 10px;
      }

      .claim-meta {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .meta-box {
        padding: 10px;
        border-radius: 12px;
      }

      .meta-label {
        font-size: 0.7rem;
      }

      .meta-value {
        font-size: 0.88rem;
      }

      .empty-box,
      .loading-box {
        padding: 14px;
        font-size: 0.9rem;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="main-header">
    <a href="./home.html" class="shopplus-logo">Shop<span class="plus">+</span></a>

    <div class="header-actions">
      <a href="./home.html" class="header-btn">Home</a>
      <a href="./claim-reward.html" class="header-btn">Claim Reward</a>
      <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <div class="page-wrap">
    <div class="profile-grid">
      <div class="card profile-card">
        <div class="avatar" id="avatarLetter">U</div>
        <h1 class="title" id="userName">User</h1>
        <p class="subtitle">Your ShopPlus account dashboard</p>

        <div style="text-align:center;">
          <span id="verifiedBadge" class="verified-badge verified-no">❌ Not Verified</span>
        </div>

        <div class="info-list">
          <div class="info-item">
            <div class="info-label">Email</div>
            <div class="info-value" id="userEmail">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">Mobile Number</div>
            <div class="info-value" id="userMobile">-</div>
          </div>

          <div class="info-item">
            <div class="info-label">User ID</div>
            <div class="info-value" id="userId">-</div>
          </div>
        </div>

        <div class="btn-group">
          <a href="./home.html" class="btn btn-primary">Back to Store</a>
          <button id="shareAppBtn" class="btn btn-share">Share App</button>
          <a href="https://wa.me/919945243930?text=Hello%20ShopPlus%20Support%2C%20I%20need%20help." target="_blank" class="btn btn-support">Support</a>
          <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>

        <div id="shareStatus" class="share-status"></div>
      </div>

      <div class="card">
        <h2 class="section-title">My Reward Claims</h2>
        <p class="section-subtitle">
          Track your submitted reward requests, review status, and approved reward amounts.
        </p>

        <div id="claimsContainer" class="loading-box">
          Loading your reward claims...
        </div>
      </div>
    </div>
  </div>

  <script>
    const currentUserRaw = localStorage.getItem("shopplusUser");

    if (!currentUserRaw) {
      window.location.href = "./login.html";
    }

    let currentUser = {};
    try {
      currentUser = JSON.parse(currentUserRaw);
    } catch (error) {
      localStorage.removeItem("shopplusUser");
      window.location.href = "./login.html";
    }

    const BACKEND_URL = "https://my-store-e28j.onrender.com";

    const htmlEl = document.documentElement;
    const darkToggleBtn = document.getElementById("darkModeToggle");
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
      htmlEl.setAttribute("data-theme", savedTheme);
      darkToggleBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
    }

    darkToggleBtn.addEventListener("click", () => {
      const currentTheme = htmlEl.getAttribute("data-theme");

      if (currentTheme === "dark") {
        htmlEl.setAttribute("data-theme", "light");
        localStorage.setItem("theme", "light");
        darkToggleBtn.textContent = "🌙";
      } else {
        htmlEl.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        darkToggleBtn.textContent = "☀️";
      }
    });

    const userNameEl = document.getElementById("userName");
    const userEmailEl = document.getElementById("userEmail");
    const userMobileEl = document.getElementById("userMobile");
    const userIdEl = document.getElementById("userId");
    const avatarLetterEl = document.getElementById("avatarLetter");
    const verifiedBadgeEl = document.getElementById("verifiedBadge");
    const logoutBtn = document.getElementById("logoutBtn");
    const shareAppBtn = document.getElementById("shareAppBtn");
    const shareStatus = document.getElementById("shareStatus");
    const claimsContainer = document.getElementById("claimsContainer");

    const userName = currentUser.name || "User";
    const userEmail = currentUser.email || "Not available";
    const userMobile = currentUser.mobile || "Not available";
    const userId = currentUser.id || currentUser._id || "Not available";
    const isVerified = !!currentUser.isVerified;

    userNameEl.textContent = userName;
    userEmailEl.textContent = userEmail;
    userMobileEl.textContent = userMobile;
    userIdEl.textContent = userId;
    avatarLetterEl.textContent = userName.charAt(0).toUpperCase();

    if (isVerified) {
      verifiedBadgeEl.textContent = "✅ Verified Account";
      verifiedBadgeEl.className = "verified-badge verified-yes";
    } else {
      verifiedBadgeEl.textContent = "❌ Not Verified";
      verifiedBadgeEl.className = "verified-badge verified-no";
    }

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("shopplusUser");
      localStorage.removeItem("shopplusLoggedIn");
      window.location.href = "./login.html";
    });

    function showShareStatus(message, isSuccess = true) {
      shareStatus.textContent = message;
      shareStatus.style.color = isSuccess ? "var(--success)" : "var(--danger)";

      setTimeout(() => {
        shareStatus.textContent = "";
      }, 3000);
    }

    async function shareApp() {
      const appUrl = window.location.origin + "/my-store/";

      const shareData = {
        title: "ShopPlus",
        text: "Check out ShopPlus - discover awesome products and deals!",
        url: appUrl
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
          showShareStatus("App shared successfully!");
        } catch (error) {
          console.log("Share cancelled or failed:", error);
        }
      } else {
        try {
          await navigator.clipboard.writeText(appUrl);
          showShareStatus("App link copied successfully!");
        } catch (error) {
          showShareStatus("Copy failed. Share this link: " + appUrl, false);
          alert("Copy failed. App link: " + appUrl);
        }
      }
    }

    shareAppBtn.addEventListener("click", shareApp);

    function formatDate(dateString) {
      if (!dateString) return "Not available";

      const date = new Date(dateString);
      if (isNaN(date.getTime())) return dateString;

      return date.toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function getStatusClass(status) {
      switch ((status || "").toLowerCase()) {
        case "approved":
          return "status-approved";
        case "rejected":
          return "status-rejected";
        case "paid":
          return "status-paid";
        default:
          return "status-pending";
      }
    }

    function getStatusText(status) {
      if (!status) return "Pending";
      return status.charAt(0).toUpperCase() + status.slice(1).toLowerCase();
    }

    async function loadRewardClaims() {
      if (!userId || userId === "Not available") {
        claimsContainer.className = "empty-box";
        claimsContainer.textContent = "User ID not found. Please login again.";
        return;
      }

      try {
        const res = await fetch(`${BACKEND_URL}/api/rewards/user/${encodeURIComponent(userId)}`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Failed to fetch reward claims");
        }

        const claims = data.claims || [];

        if (claims.length === 0) {
          claimsContainer.className = "empty-box";
          claimsContainer.innerHTML = `
            No reward claims submitted yet.<br>
            Buy a product and submit your first reward request from the product page.
          `;
          return;
        }

        claimsContainer.className = "claims-grid";
        claimsContainer.innerHTML = claims.map((claim) => {
          const status = claim.status || "pending";
          const rewardAmount = Number(claim.rewardAmount || 0);

          return `
            <div class="claim-card">
              <div class="claim-top">
                <div>
                  <div class="claim-product">${claim.productName || "Unnamed Product"}</div>
                  <div class="claim-id">Product ID: ${claim.productId || "-"}</div>
                </div>
                <div class="status-badge ${getStatusClass(status)}">${getStatusText(status)}</div>
              </div>

              <div class="claim-meta">
                <div class="meta-box">
                  <div class="meta-label">Order Reference</div>
                  <div class="meta-value">${claim.orderReference || "-"}</div>
                </div>

                <div class="meta-box">
                  <div class="meta-label">Purchase Date</div>
                  <div class="meta-value">${formatDate(claim.purchaseDate)}</div>
                </div>

                <div class="meta-box">
                  <div class="meta-label">Reward Amount</div>
                  <div class="meta-value reward-amount">₹${rewardAmount.toFixed(2)}</div>
                </div>

                <div class="meta-box">
                  <div class="meta-label">Submitted On</div>
                  <div class="meta-value">${formatDate(claim.createdAt)}</div>
                </div>
              </div>
            </div>
          `;
        }).join("");
      } catch (error) {
        console.error("Reward claims fetch error:", error);
        claimsContainer.className = "empty-box";
        claimsContainer.textContent = error.message || "Failed to load reward claims.";
      }
    }

    loadRewardClaims();
  </script>
</body>
</html>
