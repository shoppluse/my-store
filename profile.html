<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile - ShopPlus</title>

<link rel="manifest" href="/my-store/manifest.json" />
<meta name="theme-color" content="#0a0a0a" />
<link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
<link rel="icon" href="/my-store/icons/icon-192.png" />

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<script>
if (localStorage.getItem("shopplusLoggedIn") !== "true" || !localStorage.getItem("shopplusUser")) {
  window.location.href = "login.html";
}
(function () {
  const t = localStorage.getItem("theme");
  document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
})();
</script>

<style>
:root {
  --bg:#f4f3f0;
  --surface:#ffffff;
  --text:#111;
  --muted:#7a7870;
  --border:#e3e1dc;
  --accent:#e8520a;
  --accent-2:#ff7a3d;
  --radius:22px;
  --shadow:0 10px 30px rgba(0,0,0,0.08);

  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
}

[data-theme="dark"]{
  --bg:#0d0d0b;
  --surface:#1a1916;
  --text:#f5f3ee;
  --muted:#a1a1aa;
  --border:#2a2925;
}

body{
  margin:0;
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  padding:12px;
  backdrop-filter:blur(20px);
}
.header-bar{
  max-width:900px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:10px;
  box-shadow:var(--shadow);
}
.hdr-btn{
  padding:10px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--surface);
  cursor:pointer;
  font-weight:600;
}
.title{
  font-family:var(--font-display);
  font-weight:800;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
}

/* PROFILE */
.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:800;
  margin:auto;
}

.name{
  text-align:center;
  font-family:var(--font-display);
  font-size:22px;
  margin-top:10px;
}

.sub{
  text-align:center;
  color:var(--muted);
}

.grid{
  margin-top:14px;
  display:grid;
  gap:10px;
}

.info{
  padding:14px;
  border:1px solid var(--border);
  border-radius:14px;
}

.label{
  font-size:12px;
  color:var(--muted);
}

.value{
  font-weight:600;
}

/* BUTTONS */
.action{
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-weight:700;
  width:100%;
}

.primary{background:#111;color:#fff;}
.share{background:#0ea5e9;color:#fff;}
.support{background:#16a34a;color:#fff;}
.logout{background:#dc2626;color:#fff;}
.upgrade{background:#7c3aed;color:#fff;}

/* STATUS */
.status{
  padding:16px;
  border-radius:16px;
  border:1px solid var(--border);
  margin-top:10px;
}

.success{background:rgba(34,197,94,0.1);}
.warning{background:rgba(245,158,11,0.1);}
.danger{background:rgba(239,68,68,0.1);}
.infoBox{background:rgba(255,255,255,0.04);}
</style>
</head>

<body>

<header class="header">
  <div class="header-bar">
    <a href="home.html" class="hdr-btn">←</a>
    <div class="title">Profile</div>
    <button id="themeBtn" class="hdr-btn">🌙</button>
  </div>
</header>

<div class="container">

<div class="card">
  <div class="avatar" id="avatar">U</div>
  <div class="name" id="name">Loading...</div>
  <div class="sub">Your ShopPlus dashboard</div>

  <div class="grid">
    <div class="info">
      <div class="label">Email</div>
      <div class="value" id="email"></div>
    </div>
    <div class="info">
      <div class="label">Mobile</div>
      <div class="value" id="mobile"></div>
    </div>
    <div class="info">
      <div class="label">User ID</div>
      <div class="value" id="userid"></div>
    </div>
  </div>

  <button class="action primary" onclick="location.href='home.html'">Back to Store</button>
  <button class="action share" id="shareBtn">Share App</button>
  <a href="https://wa.me/919945243930" class="action support">Support</a>
  <button class="action logout" id="logoutBtn">Logout</button>
  <a href="plans.html" class="action upgrade">Upgrade Plan</a>
</div>

<div class="card">
  <h3>Affiliate Status</h3>
  <div id="status"></div>
</div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("shopplusUser")||"{}");

document.getElementById("name").textContent = user.name || "User";
document.getElementById("email").textContent = user.email || "-";
document.getElementById("mobile").textContent = user.mobile || "-";
document.getElementById("userid").textContent = user.id || "-";
document.getElementById("avatar").textContent = (user.name||"U")[0].toUpperCase();

document.getElementById("logoutBtn").onclick = ()=>{
  localStorage.removeItem("shopplusLoggedIn");
  localStorage.removeItem("shopplusUser");
  location.href="login.html";
};

document.getElementById("shareBtn").onclick = async ()=>{
  const url="https://shoppluse.github.io/my-store/";
  if(navigator.share){
    await navigator.share({title:"ShopPlus",url});
  }else{
    navigator.clipboard.writeText(url);
    alert("Link copied!");
  }
};

const themeBtn=document.getElementById("themeBtn");
function setIcon(){
  themeBtn.textContent=document.documentElement.getAttribute("data-theme")==="dark"?"☀️":"🌙";
}
setIcon();

themeBtn.onclick=()=>{
  const t=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",t);
  localStorage.setItem("theme",t);
  setIcon();
};

const root=document.getElementById("status");
const status=(user.affiliateStatus||"none").toLowerCase();

if(status==="approved"){
  root.innerHTML='<div class="status success">✅ Approved</div>';
}else if(status==="pending"){
  root.innerHTML='<div class="status warning">⏳ Pending Review</div>';
}else if(status==="rejected"){
  root.innerHTML='<div class="status danger">❌ Rejected</div>';
}else{
  root.innerHTML='<div class="status infoBox">ℹ️ Not Applied</div>';
}
</script>

</body>
</html>
