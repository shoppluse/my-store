<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop+ | Loading...</title>
  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --primary: #0047ab;
      --primary-2: #0099ff;
      --bg: #ffffff;
      --border: #e5edf9;
      --shadow: rgba(0, 71, 171, 0.10);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(28px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
      overflow: hidden;
    }

    .splash-wrap {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      color: #0047ab;
      padding: 16px 28px;
      border-radius: 22px;
      font-size: 2.2rem;
      font-weight: 700;
      border: 1px solid var(--border);
      box-shadow: 0 12px 32px var(--shadow);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .brand .plus {
      color: #0099ff;
      font-size: 2.5rem;
      font-weight: 900;
      line-height: 1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 12px 32px rgba(0, 71, 171, 0.10);
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 16px 38px rgba(0, 71, 171, 0.16);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 12px 32px rgba(0, 71, 171, 0.10);
      }
    }

    @media (max-width: 520px) {
      body {
        padding: calc(42px + env(safe-area-inset-top)) 16px calc(18px + env(safe-area-inset-bottom));
      }

      .brand {
        font-size: 1.9rem;
        padding: 14px 24px;
        border-radius: 20px;
      }

      .brand .plus {
        font-size: 2.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="splash-wrap">
    <div class="brand">Shop <span class="plus">+</span></div>
  </div>

  <script>
    // Clear old service worker caches (one-time cleanup)
    if ("caches" in window) {
      caches.keys().then((names) => {
        names.forEach((name) => caches.delete(name));
      });
    }

    // Register latest service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const reg of registrations) {
            await reg.unregister();
          }

          await navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" });
          console.log("Fresh Service Worker registered");
        } catch (error) {
          console.error("Service Worker refresh failed:", error);
        }
      });
    }

    // Silent redirect after splash
    setTimeout(() => {
      const isLoggedIn = localStorage.getItem("shopplusLoggedIn");
      const user = localStorage.getItem("shopplusUser");

      if (isLoggedIn === "true" && user) {
        window.location.replace("home.html");
      } else {
        window.location.replace("login.html");
      }
    }, 1200);
  </script>
</body>
</html>
