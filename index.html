<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shop+</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  /* Styles omitted for brevity; keep all your previous styles as they are */
  html, body {
    overflow-x: hidden;
  }
  /* ... Keep all your previous CSS styles here exactly as before ... */

  /* Category icons bar styles with horizontal scroll */
  .category-icons {
    margin: 18px 0 18px 0;
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    justify-content: flex-start;
    gap: 16px;
    padding-left: 10px;
    padding-right: 10px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    scrollbar-gutter: stable;
  }

  /* Other CSS remains unchanged */
  /* ... */
</style>
</head>
<body>
  <div class="main-header">
    <span class="shopplus-logo">Shop<span class="plus">+</span></span>
    <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
  </div>
  <div class="search-section">
    <form class="search-form" onsubmit="event.preventDefault();">
      <input id="searchBar" type="text" placeholder="Search for phones, gadgets, etc." />
    </form>
    <div class="category-icons" id="categoryBar"></div>
  </div>
  <div class="product-grid" id="product-list">
    <p style="text-align:center; color:#777;">Loading products...</p>
  </div>

<script>
  const categories = [
    { name: 'Overall', icon: '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"/></svg>' },
    { name: 'Electronics', icon: '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="4" width="10" height="4" rx="1"/><rect x="9" y="10" width="6" height="10" rx="2"/></svg>' },
    { name: 'Fashion', icon: '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M7 4h10v14H7z"/><ellipse cx="12" cy="18" rx="4" ry="2" /></svg>' },
    { name: 'Home', icon: '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M3 12l9-9 9 9v9a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3z"/></svg>' },
    { name: 'Accessories', icon: '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="8"/><circle cx="8" cy="12" r="1"/><circle cx="16" cy="12" r="1"/></svg>' },
    { name: 'Sports', icon: '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 4l3 7h7l-5 5 2 7-6-4-6 4 2-7-5-5h7z"/></svg>' },
    { name: 'Beauty', icon: '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="6"/><path d="M12 18v6M12 6V0"/></svg>' },
    { name: 'Gadgets', icon: '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="2" width="12" height="20" rx="2"/><circle cx="12" cy="21" r="1"/></svg>' },
  ];

  const categoryBar = document.getElementById('categoryBar');
  const searchInput = document.getElementById('searchBar');
  let selectedCategory = 'Overall';
  let allProducts = [];

  function createCategoryIcon(cat) {
    const el = document.createElement('div');
    el.className = 'category-icon' + (cat.name === selectedCategory ? ' selected' : '');
    el.setAttribute('data-cat', cat.name);
    el.innerHTML = cat.icon + '<div class="category-label">' + cat.name + '</div>';
    el.addEventListener('click', () => {
      if (selectedCategory === cat.name) return;
      selectedCategory = cat.name;
      updateCategorySelection();
      filterProducts();
    });
    return el;
  }

  function updateCategorySelection() {
    Array.from(categoryBar.children).forEach(el => {
      el.classList.toggle('selected', el.getAttribute('data-cat') === selectedCategory);
    });
  }

  categories.forEach(cat => categoryBar.appendChild(createCategoryIcon(cat)));

  searchInput.addEventListener('input', () => {
    if (selectedCategory !== 'Overall') {
      selectedCategory = 'Overall';
      updateCategorySelection();
    }
    filterProducts();
  });

  async function loadProducts() {
    try {
      const response = await fetch('products.json');
      if (!response.ok) throw new Error('File not found');
      allProducts = await response.json();
      displayProducts(allProducts);
    } catch (err) {
      document.getElementById('product-list').innerHTML = '<p style="text-align:center;color:red;">Error loading products. Check products.json</p>';
      console.error(err);
    }
  }

  // Use first image from images array or fallback
  function createCard(p) {
    const imageSrc = (p.images && p.images.length) ? p.images[0] : (p.image || 'placeholder.png');
    return `
    <div class="product-card">
      <img src="${imageSrc}" alt="${p.name}" />
      <h2>${p.name}</h2>
      <div class="card-actions">
        <a class="btn view-details" href="product.html?id=${p.id}">View Details</a>
        <a class="btn buy-now" href="${p.link}" target="_blank">Buy Now</a>
      </div>
    </div>
    `;
  }

  function displayProducts(products) {
    const productList = document.getElementById('product-list');
    if (products.length === 0) {
      productList.innerHTML = '<p style="text-align:center;color:#888;">No products found.</p>';
      return;
    }
    productList.innerHTML = '';
    products.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'product-card visible';
      card.style.opacity = 0;
      card.style.transform = 'translateY(20px)';
      card.innerHTML = createCard(p);
      productList.appendChild(card);
      setTimeout(() => {
        card.style.opacity = 1;
        card.style.transform = 'none';
      }, i * 70);
    });
  }

  function filterProducts() {
    const searchText = searchInput.value.trim().toLowerCase();
    let filtered = allProducts.slice();
    if (selectedCategory !== 'Overall') {
      filtered = filtered.filter(p => p.category === selectedCategory);
    }
    if (searchText.length > 0) {
      filtered = filtered.filter(p => p.name.toLowerCase().includes(searchText));
    }
    displayProducts(filtered);
  }

  const darkToggleBtn = document.getElementById('darkModeToggle');
  const htmlEl = document.documentElement;
  const savedTheme = localStorage.getItem('theme');

  if (savedTheme) {
    htmlEl.setAttribute('data-theme', savedTheme);
    darkToggleBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
  }

  darkToggleBtn.addEventListener('click', () => {
    const currentTheme = htmlEl.getAttribute('data-theme');
    if (currentTheme === 'dark') {
      htmlEl.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
      darkToggleBtn.textContent = '🌙';
    } else {
      htmlEl.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      darkToggleBtn.textContent = '☀️';
    }
  });

  window.addEventListener('DOMContentLoaded', () => {
    loadProducts();
  });
</script>
</body>
</html>
