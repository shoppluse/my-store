<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop+ | Loading...</title>
  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --primary: #0047ab;
      --primary-2: #0099ff;
      --bg: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --border: #e5edf9;
      --shadow: rgba(0, 71, 171, 0.10);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: #ffffff;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(28px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
    }

    .splash-wrap {
      width: 100%;
      max-width: 460px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      color: #0047ab;
      padding: 14px 24px;
      border-radius: 20px;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 28px var(--shadow);
    }

    .brand .plus {
      color: #0099ff;
      font-size: 2.3rem;
      font-weight: 900;
      line-height: 1;
    }

    .title {
      margin: 4px 0 8px;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary);
    }

    .subtitle {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 360px;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid #e6eefb;
      border-top-color: var(--primary-2);
      border-radius: 50%;
      margin: 24px auto 0;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .small-text {
      margin-top: 16px;
      font-size: 0.88rem;
      color: #94a3b8;
    }

    .install-btn {
      display: none;
      width: 100%;
      max-width: 280px;
      margin-top: 22px;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 10px 24px rgba(0, 71, 171, 0.18);
      transition: 0.25s ease;
    }

    .install-btn:hover {
      transform: translateY(-2px);
    }

    .install-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 520px) {
      body {
        padding: calc(42px + env(safe-area-inset-top)) 16px calc(18px + env(safe-area-inset-bottom));
      }

      .brand {
        font-size: 1.6rem;
        padding: 12px 20px;
        border-radius: 18px;
      }

      .brand .plus {
        font-size: 1.9rem;
      }

      .title {
        font-size: 1.15rem;
      }

      .subtitle {
        font-size: 0.9rem;
      }

      .install-btn {
        font-size: 14px;
        padding: 12px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="splash-wrap">
    <div class="brand">Shop <span class="plus">+</span></div>
    <h1 class="title">Checking your session...</h1>
    <p class="subtitle">Please wait while we redirect you to the right page.</p>
    <div class="loader"></div>
    <div class="small-text">Secure access for ShopPlus users</div>

    <button id="installAppBtn" class="install-btn">Install ShopPlus</button>
  </div>

  <script>
    let deferredPrompt;
    const installBtn = document.getElementById("installAppBtn");

    // PWA Install Prompt
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "block";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log("Install prompt result:", outcome);

      deferredPrompt = null;
      installBtn.style.display = "none";
    });

    window.addEventListener("appinstalled", () => {
      console.log("ShopPlus installed successfully");
      installBtn.style.display = "none";
    });

    // Service Worker Registration
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
          .then((registration) => {
            console.log("Service Worker registered:", registration.scope);
          })
          .catch((error) => {
            console.error("Service Worker registration failed:", error);
          });
      });
    }

    // Auth Redirect Logic
    setTimeout(() => {
      const isLoggedIn = localStorage.getItem("shopplusLoggedIn");
      const user = localStorage.getItem("shopplusUser");

      if (isLoggedIn === "true" && user) {
        window.location.href = "home.html";
      } else {
        window.location.href = "login.html";
      }
    }, 1200);
  </script>
</body>
</html>
