<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Details - ShopPlus</title>

  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#0047ab" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gradient: linear-gradient(120deg, #0047ab 60%, #0099ff 100%);
      --bg: #f4f8ff;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --muted: #64748b;
      --primary: #0047ab;
      --primary-2: #0099ff;
      --border: #dbe7ff;
      --shadow: rgba(0, 71, 171, 0.14);

      --buy-bg: #0099ff;
      --buy-hover: #006cc0;

      --back-bg: #43a047;
      --back-hover: #38733b;

      --claim-bg: #7c3aed;
      --claim-hover: #6d28d9;

      --share-bg: #f59e0b;
      --share-hover: #d97706;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #60a5fa;
      --primary-2: #38bdf8;
      --border: #1e3a8a;
      --shadow: rgba(56, 189, 248, 0.15);

      --buy-bg: #3a8dde;
      --buy-hover: #2a5e9d;

      --back-bg: #2abf6a;
      --back-hover: #1e8f3f;

      --claim-bg: #8b5cf6;
      --claim-hover: #7c3aed;

      --share-bg: #f59e0b;
      --share-hover: #d97706;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #f8fbff 100%);
      margin: 0;
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .main-header {
      background: var(--gradient);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      box-shadow: 0 6px 20px var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 12px;
      flex-wrap: wrap;
    }

    .shopplus-logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      background: #ffffff;
      padding: 8px 22px;
      border-radius: 16px;
      letter-spacing: 0.5px;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0, 71, 171, 0.15);
    }

    .shopplus-logo .plus {
      color: var(--primary-2);
      font-size: 2.2rem;
      font-weight: 900;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header-btn {
      text-decoration: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.25s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .header-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.22);
    }

    .dark-mode-toggle {
      cursor: pointer;
      font-size: 1.4rem;
      background: transparent;
      border: none;
      color: #fff;
      padding: 6px 10px;
      border-radius: 50%;
      transition: 0.25s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .dark-mode-toggle:hover {
      background: rgba(255,255,255,0.15);
    }

    .page-wrap {
      max-width: 1180px;
      margin: 34px auto 60px;
      padding: 0 20px;
    }

    .loading-box,
    .error-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 50px var(--shadow);
      text-align: center;
      max-width: 650px;
      margin: 40px auto;
    }

    .loading-box h2,
    .error-box h2 {
      margin: 0 0 10px;
      color: var(--primary);
    }

    .loading-box p,
    .error-box p {
      margin: 0;
      color: var(--muted);
    }

    .product-layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: start;
    }

    .gallery-card,
    .details-card {
      background: var(--card-bg);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 50px var(--shadow);
      overflow: hidden;
    }

    .gallery-card {
      padding: 22px;
    }

    .carousel-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      border-radius: 18px;
      background: #ffffff;
      width: 100%;
      border: 1px solid #eef4ff;
      scroll-behavior: smooth;
    }

    [data-theme="dark"] .carousel-track {
      background: #0b1220;
      border-color: #1e293b;
    }

    .carousel-track::-webkit-scrollbar {
      height: 8px;
    }

    .carousel-track::-webkit-scrollbar-thumb {
      background: rgba(0, 153, 255, 0.25);
      border-radius: 999px;
    }

    .carousel-image {
      min-width: 100%;
      width: 100%;
      height: 460px;
      object-fit: contain;
      border-radius: 18px;
      scroll-snap-align: center;
      background: #ffffff;
      padding: 18px;
      box-sizing: border-box;
    }

    [data-theme="dark"] .carousel-image {
      background: #0b1220;
    }

    .carousel-thumbs {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 10px;
      width: 100%;
      flex-wrap: wrap;
    }

    .carousel-thumb {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      background: #fff;
      border: 2px solid transparent;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      cursor: pointer;
      opacity: 0.7;
      transition: border 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }

    .carousel-thumb.active,
    .carousel-thumb:hover {
      border: 2px solid var(--primary-2);
      opacity: 1;
      transform: translateY(-2px);
    }

    /* NEW: Buttons under image */
    .gallery-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .gallery-actions a,
    .gallery-actions button {
      width: 100%;
      text-decoration: none;
      color: white;
      border-radius: 14px;
      padding: 13px 10px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      font-size: 14px;
      transition: background-color 0.23s ease, transform 0.2s ease;
      user-select: none;
      border: none;
      font-family: inherit;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .details-card {
      padding: 26px 24px;
    }

    .product-category {
      display: inline-block;
      background: rgba(0, 153, 255, 0.08);
      color: var(--primary);
      border: 1px solid rgba(0, 153, 255, 0.16);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .product-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 12px;
      line-height: 1.3;
    }

    .product-rating {
      color: #f59e0b;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .product-price {
      font-size: 1.8rem;
      color: var(--primary-2);
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* NEW: better description style */
    .product-summary {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 18px;
      background: rgba(0, 153, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    [data-theme="dark"] .product-summary {
      background: rgba(96, 165, 250, 0.05);
    }

    .highlights-box {
      background: rgba(0, 71, 171, 0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 18px;
    }

    [data-theme="dark"] .highlights-box {
      background: rgba(96, 165, 250, 0.05);
    }

    .highlights-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .highlights-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .highlights-list li {
      color: var(--text);
      font-size: 0.96rem;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .highlights-list li span {
      flex: 1;
    }

    .info-list {
      display: grid;
      gap: 12px;
      margin-bottom: 8px;
    }

    .info-item {
      background: rgba(0, 71, 171, 0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    [data-theme="dark"] .info-item {
      background: rgba(96, 165, 250, 0.05);
    }

    .info-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 0.96rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .buy-btn {
      background-color: var(--buy-bg);
    }

    .buy-btn:hover {
      background-color: var(--buy-hover);
      transform: translateY(-2px);
    }

    .claim-btn {
      background-color: var(--claim-bg);
    }

    .claim-btn:hover {
      background-color: var(--claim-hover);
      transform: translateY(-2px);
    }

    .share-btn {
      background-color: var(--share-bg);
    }

    .share-btn:hover {
      background-color: var(--share-hover);
      transform: translateY(-2px);
    }

    .back-btn {
      background-color: var(--back-bg);
    }

    .back-btn:hover {
      background-color: var(--back-hover);
      transform: translateY(-2px);
    }

    .footer {
      text-align: center;
      color: white;
      background: var(--gradient);
      padding: 16px 12px;
      font-size: 15px;
      margin-top: 50px;
    }

    @media (max-width: 980px) {
      .product-layout {
        grid-template-columns: 1fr;
      }

      .carousel-image {
        height: 360px;
      }

      .gallery-actions {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .main-header {
        padding: 14px 14px;
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .shopplus-logo {
        font-size: 1.35rem;
        padding: 8px 14px;
        justify-content: center;
        width: 100%;
      }

      .shopplus-logo .plus {
        font-size: 1.6rem;
      }

      .header-actions {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .header-btn,
      .dark-mode-toggle {
        width: 100%;
        text-align: center;
        justify-content: center;
        padding: 10px 8px;
        font-size: 0.8rem;
        border-radius: 10px;
      }

      .dark-mode-toggle {
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.15);
      }

      .page-wrap {
        padding: 0 12px;
        margin-top: 20px;
      }

      .gallery-card,
      .details-card {
        border-radius: 18px;
        padding: 16px;
      }

      .carousel-image {
        height: 240px;
        padding: 12px;
      }

      .carousel-thumb {
        width: 52px;
        height: 52px;
      }

      .product-title {
        font-size: 1.4rem;
      }

      .product-price {
        font-size: 1.3rem;
      }

      .gallery-actions {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .gallery-actions a,
      .gallery-actions button {
        font-size: 13px;
        padding: 12px 8px;
        min-height: 48px;
      }

      .product-summary {
        font-size: 0.95rem;
        padding: 14px;
      }

      .highlights-list li {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-header">
    <a href="home.html" class="shopplus-logo">Shop<span class="plus">+</span></a>

    <div class="header-actions">
      <a href="profile.html" class="header-btn">Profile</a>
      <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <div class="page-wrap">
    <div id="product-root" class="loading-box">
      <h2>Loading product details...</h2>
      <p>Please wait while we fetch the product details.</p>
    </div>
  </div>

  <div class="footer">© 2026 ShopPlus. All rights reserved.</div>

  <script>
    // Protect page
    const isLoggedIn = localStorage.getItem("shopplusLoggedIn");
    const currentUser = localStorage.getItem("shopplusUser");

    if (isLoggedIn !== "true" || !currentUser) {
      window.location.href = "login.html";
    }

    const htmlEl = document.documentElement;
    const darkToggleBtn = document.getElementById("darkModeToggle");
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
      htmlEl.setAttribute("data-theme", savedTheme);
      darkToggleBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
    }

    darkToggleBtn.addEventListener("click", () => {
      const currentTheme = htmlEl.getAttribute("data-theme");

      if (currentTheme === "dark") {
        htmlEl.setAttribute("data-theme", "light");
        localStorage.setItem("theme", "light");
        darkToggleBtn.textContent = "🌙";
      } else {
        htmlEl.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        darkToggleBtn.textContent = "☀️";
      }
    });

    function formatPrice(price) {
      if (price === null || price === undefined || price === "") {
        return "Price not available";
      }

      if (typeof price === "number") {
        return `₹${price.toFixed(2)}`;
      }

      const numeric = Number(String(price).replace(/[^\d.]/g, ""));
      if (!isNaN(numeric) && numeric > 0) {
        return `₹${numeric.toFixed(2)}`;
      }

      return String(price);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function splitDescription(description) {
      const text = String(description || "No description available.").trim();

      const sentences = text
        .replace(/\s+/g, " ")
        .split(/(?<=[.!?])\s+/)
        .filter(Boolean);

      const summary = sentences.slice(0, 2).join(" ");
      const remaining = sentences.slice(2);

      let highlights = remaining.slice(0, 5);

      if (highlights.length === 0) {
        highlights = [
          "Premium quality product for daily use",
          "Stylish and practical design",
          "Suitable for home, office, or gifting",
          "Reliable build with good usability",
          "A smart addition to your collection"
        ];
      }

      const icons = ["✨", "🔹", "💡", "📌", "⭐"];

      return {
        summary: summary || text,
        highlights: highlights.map((item, index) => ({
          icon: icons[index % icons.length],
          text: item
        }))
      };
    }

    async function shareProduct(productId, productName) {
      const decodedName = decodeURIComponent(productName);

      const baseUrl = window.location.origin + "/my-store";
      const productUrl = `${baseUrl}/product.html?id=${productId}`;

      const shareData = {
        title: decodedName,
        text: `Check out this product on ShopPlus: ${decodedName}`,
        url: productUrl
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
        } else if (navigator.clipboard) {
          await navigator.clipboard.writeText(productUrl);
          alert(`Product link copied!\n\n${decodedName}\n\n${productUrl}`);
        } else {
          prompt("Copy this product link:", productUrl);
        }
      } catch (error) {
        console.log("Share cancelled or failed:", error);
      }
    }

    async function loadProductDetails() {
      const params = new URLSearchParams(window.location.search);
      const pid = params.get("id");
      const root = document.getElementById("product-root");

      if (!pid) {
        root.className = "error-box";
        root.innerHTML = `
          <h2>No product ID found</h2>
          <p>Please open a product from the store page.</p>
          <div style="margin-top:18px;">
            <a href="home.html" class="back-btn" style="max-width:220px; display:inline-flex; align-items:center; justify-content:center; text-decoration:none; color:white; padding:14px 16px; border-radius:14px;">Back to Store</a>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch("/my-store/products.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`Failed to load products.json: ${response.status}`);

        const products = await response.json();
        if (!Array.isArray(products)) throw new Error("products.json must contain an array");

        const product = products.find(p => String(p.id) === String(pid));

        if (!product) {
          throw new Error("Product not found in products.json");
        }

        const fallbackImage = "https://via.placeholder.com/600x600?text=No+Image";

        const safeImages = Array.isArray(product.images) && product.images.length
          ? product.images.filter(Boolean)
          : [];

        const finalImages = safeImages.length
          ? safeImages
          : [product.image || fallbackImage];

        const safeProduct = {
          id: product.id ?? pid,
          name: product.name || "Unnamed Product",
          description: product.description || "No description available.",
          price: formatPrice(product.price),
          link: product.link || "#",
          image: product.image || fallbackImage,
          images: finalImages,
          rating: product.rating || 4.5,
          category: product.category || "General"
        };

        const descData = splitDescription(safeProduct.description);

        const thumbs = safeProduct.images.length > 1
          ? `
            <div class="carousel-thumbs">
              ${safeProduct.images.map((src, i) => `
                <img class="carousel-thumb${i === 0 ? ' active' : ''}" src="${escapeHtml(src)}" data-idx="${i}" alt="Thumbnail ${i + 1}">
              `).join('')}
            </div>
          `
          : "";

        const buyButton = safeProduct.link && safeProduct.link !== "#"
          ? `<a href="${escapeHtml(safeProduct.link)}" target="_blank" rel="noopener noreferrer" class="buy-btn">Buy Now</a>`
          : `<button class="buy-btn" onclick="alert('Buy link not available for this product yet')">Buy Now</button>`;

        root.className = "";
        root.innerHTML = `
          <div class="product-layout">
            <div class="gallery-card">
              <div class="carousel-track" id="carousel-track">
                ${safeProduct.images.map((src, i) => `
                  <img class="carousel-image" src="${escapeHtml(src)}" alt="${escapeHtml(safeProduct.name)} image ${i + 1}">
                `).join('')}
              </div>
              ${thumbs}

              <div class="gallery-actions">
                ${buyButton}
                <button class="share-btn" onclick="shareProduct('${encodeURIComponent(safeProduct.id)}', '${encodeURIComponent(safeProduct.name)}')">Share Product</button>
                <a href="claim-reward.html?productId=${encodeURIComponent(safeProduct.id)}&productName=${encodeURIComponent(safeProduct.name)}" class="claim-btn">Claim Reward</a>
                <a href="home.html" class="back-btn">Back to Store</a>
              </div>
            </div>

            <div class="details-card">
              <div class="product-category">${escapeHtml(safeProduct.category)}</div>
              <h1 class="product-title">${escapeHtml(safeProduct.name)}</h1>
              <div class="product-rating">⭐ ${escapeHtml(String(safeProduct.rating))} / 5</div>
              <div class="product-price">${escapeHtml(safeProduct.price)}</div>

              <div class="product-summary">
                ✨ ${escapeHtml(descData.summary)}
              </div>

              <div class="highlights-box">
                <div class="highlights-title">Key Highlights</div>
                <ul class="highlights-list">
                  ${descData.highlights.map(item => `
                    <li><strong>${item.icon}</strong><span>${escapeHtml(item.text)}</span></li>
                  `).join('')}
                </ul>
              </div>

              <div class="info-list">
                <div class="info-item">
                  <div class="info-label">Product ID</div>
                  <div class="info-value">${escapeHtml(String(safeProduct.id))}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Category</div>
                  <div class="info-value">${escapeHtml(safeProduct.category)}</div>
                </div>
              </div>
            </div>
          </div>
        `;

        const imgElements = root.querySelectorAll(".carousel-image");
        const thumbElements = root.querySelectorAll(".carousel-thumb");

        function setCurrent(index) {
          if (!imgElements[index]) return;

          imgElements[index].scrollIntoView({
            behavior: "smooth",
            block: "nearest",
            inline: "center"
          });

          thumbElements.forEach((thumb, i) => {
            thumb.classList.toggle("active", i === index);
          });
        }

        thumbElements.forEach((thumb, i) => {
          thumb.addEventListener("click", () => setCurrent(i));
        });
      } catch (error) {
        console.error("Error loading product:", error);

        root.className = "error-box";
        root.innerHTML = `
          <h2>Product not found or failed to load</h2>
          <p>Please try again later or return to the store.</p>
          <div style="margin-top:18px;">
            <a href="home.html" class="back-btn" style="max-width:220px; display:inline-flex; align-items:center; justify-content:center; text-decoration:none; color:white; padding:14px 16px; border-radius:14px;">Back to Store</a>
          </div>
        `;
      }
    }

    loadProductDetails();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
          .then((registration) => {
            console.log("Service Worker registered:", registration.scope);
          })
          .catch((error) => {
            console.error("Service Worker registration failed:", error);
          });
      });
    }
  </script>
