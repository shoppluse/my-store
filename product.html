<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Details - ShopPlus</title>
  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link rel="icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <script>
    (function () {
      const t = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
    })();
  </script>

  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f3f0;
      --bg-2:        #eceae5;
      --surface:     #ffffff;
      --surface-2:   #f9f8f6;
      --text:        #111010;
      --text-2:      #3d3c3a;
      --muted:       #8a8884;
      --border:      #e3e1dc;
      --border-2:    #f0ede9;
      --accent:      #e8520a;
      --accent-2:    #ff7a3d;
      --accent-glow: rgba(232,82,10,0.15);
      --shadow-sm:   0 2px 8px rgba(0,0,0,0.06);
      --shadow-md:   0 6px 20px rgba(0,0,0,0.09);
      --shadow-lg:   0 16px 40px rgba(0,0,0,0.13);
      --radius-xs:   10px;
      --radius-sm:   16px;
      --radius-md:   22px;
      --radius-lg:   28px;
      --pad:         clamp(12px,3vw,28px);
      --max-w:       1320px;
      --font-display:'Syne', sans-serif;
      --font-body:   'DM Sans', sans-serif;
      --star:        #f59e0b;

      /* Button colours */
      --btn-buy-bg:    #111010;
      --btn-buy-text:  #ffffff;
      --btn-share-bg:  #f59e0b;
      --btn-claim-bg:  #7c3aed;
      --btn-back-bg:   #1f2937;
    }

    [data-theme="dark"] {
      --bg:          #0d0d0b;
      --bg-2:        #141410;
      --surface:     #1a1916;
      --surface-2:   #201f1c;
      --text:        #f5f3ee;
      --text-2:      #ccc9c2;
      --muted:       #7a7870;
      --border:      #2a2925;
      --border-2:    #222120;
      --accent:      #ff6b25;
      --accent-2:    #ff9060;
      --accent-glow: rgba(255,107,37,0.18);
      --shadow-sm:   0 2px 8px rgba(0,0,0,0.3);
      --shadow-md:   0 6px 20px rgba(0,0,0,0.4);
      --shadow-lg:   0 16px 40px rgba(0,0,0,0.55);
      --btn-buy-bg:  #f5f3ee;
      --btn-buy-text:#111010;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    button { border: none; background: none; cursor: pointer; font-family: inherit; }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: calc(env(safe-area-inset-top) + 10px) var(--pad) 10px;
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
    }

    .header-pill {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: min(100%, 920px);
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px;
      box-shadow: var(--shadow-md);
    }

    .hdr-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 50px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      background: var(--bg-2);
      border: 1px solid var(--border);
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .hdr-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

    /* ===== PAGE WRAP ===== */
    .page-wrap {
      max-width: calc(var(--max-w) + 2 * var(--pad));
      margin: 0 auto;
      padding: 20px var(--pad) 48px;
    }

    /* ===== STATE BOXES ===== */
    .state-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 28px;
      text-align: center;
      max-width: 560px;
      margin: 40px auto;
      box-shadow: var(--shadow-lg);
      animation: fade-up 0.4s ease both;
    }
    .state-box h2 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .state-box p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; }
    .state-box .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 22px;
      padding: 13px 24px;
      border-radius: var(--radius-sm);
      background: var(--btn-back-bg);
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.88rem;
      transition: all 0.2s;
    }
    .state-box .back-link:hover { opacity: 0.88; transform: translateY(-1px); }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border-2) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ===== PRODUCT LAYOUT ===== */
    .product-layout {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 22px;
      align-items: start;
      animation: fade-up 0.4s ease both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== GALLERY CARD ===== */
    .gallery-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 18px;
      position: sticky;
      top: calc(env(safe-area-inset-top) + 86px);
    }

    /* Carousel */
    .carousel-wrap {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: #fff;
      border: 1px solid var(--border-2);
    }
    .carousel-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    .carousel-track::-webkit-scrollbar { display: none; }
    .carousel-image {
      min-width: 100%;
      width: 100%;
      height: 580px;
      object-fit: contain;
      scroll-snap-align: center;
      background: #fff;
      padding: 20px;
      transition: transform 0.3s ease;
    }

    /* Dot indicators */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 10px 0 4px;
    }
    .carousel-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.2s;
      cursor: pointer;
    }
    .carousel-dot.active {
      background: var(--text);
      width: 20px;
      border-radius: 99px;
    }

    /* Thumbnails */
    .carousel-thumbs {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .carousel-thumb {
      width: 58px;
      height: 58px;
      border-radius: var(--radius-xs);
      object-fit: contain;
      background: #fff;
      border: 2px solid transparent;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      opacity: 0.65;
      transition: all 0.2s;
      padding: 4px;
    }
    .carousel-thumb:hover { opacity: 0.9; transform: translateY(-2px); }
    .carousel-thumb.active {
      border-color: var(--accent);
      opacity: 1;
      transform: translateY(-2px);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Action buttons */
    .gallery-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .act-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 48px;
      padding: 10px 6px;
      border-radius: var(--radius-sm);
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      white-space: nowrap;
      line-height: 1.2;
    }
    .act-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

    .btn-buy   { background: var(--btn-buy-bg); color: var(--btn-buy-text) !important; }
    .btn-share { background: var(--btn-share-bg); }
    .btn-claim { background: var(--btn-claim-bg); }
    .btn-back  { background: var(--btn-back-bg); }

    /* ===== DETAILS CARD ===== */
    .details-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 26px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Category badge */
    .cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 99px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      font-size: 0.72rem;
      font-weight: 700;
      font-family: var(--font-display);
      color: var(--text-2);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      width: fit-content;
    }

    /* Title */
    .product-title {
      font-family: var(--font-display);
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    /* Rating */
    .product-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--star);
    }
    .rating-count { color: var(--muted); font-size: 0.8rem; font-weight: 500; }

    /* Price */
    .product-price {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .price-note { font-size: 0.75rem; color: var(--muted); font-weight: 500; font-family: var(--font-body); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border-2);
      border-radius: 99px;
    }

    /* Summary */
    .summary-block {
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-size: 0.88rem;
      color: var(--text-2);
      line-height: 1.75;
      position: relative;
    }
    .summary-block::before {
      content: "✨";
      position: absolute;
      top: -10px;
      left: 14px;
      font-size: 1rem;
      background: var(--surface);
      padding: 0 4px;
    }

    /* Highlights */
    .section-label {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .highlights-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .highlights-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.87rem;
      color: var(--text-2);
      line-height: 1.55;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-xs);
      transition: border-color 0.2s;
    }
    .highlights-list li:hover { border-color: var(--border); }
    .hl-icon { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .info-item {
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: border-color 0.2s;
    }
    .info-item:hover { border-color: var(--border); }
    .info-label {
      font-size: 0.66rem;
      font-weight: 800;
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .info-value {
      font-size: 0.87rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-all;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 16px var(--pad) calc(env(safe-area-inset-bottom) + 24px);
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 960px) {
      .product-layout { grid-template-columns: 1fr; }
      .gallery-card { position: static; }
      .carousel-image { height: 460px; }
    }

    @media (max-width: 680px) {
      :root { --pad: 12px; }
      body { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }

      .header-pill { border-radius: var(--radius-sm); gap: 6px; padding: 6px; }
      .hdr-btn { min-height: 46px; font-size: 0.78rem; }

      .page-wrap { padding-top: 14px; padding-bottom: 32px; }
      .gallery-card, .details-card { border-radius: var(--radius-md); padding: 14px; }

      .carousel-image { height: 300px; padding: 12px; }
      .carousel-thumb { width: 48px; height: 48px; }

      .product-title { font-size: 1.4rem; }
      .product-price { font-size: 1.5rem; }

      .gallery-actions { gap: 6px; }
      .act-btn { font-size: 0.65rem; min-height: 42px; padding: 8px 4px; border-radius: var(--radius-xs); white-space: normal; line-height: 1.1; }

      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-pill">
      <a href="./home.html" class="hdr-btn">← Home</a>
      <a href="./profile.html" class="hdr-btn">👤 Profile</a>
    </div>
  </header>

  <!-- MAIN -->
  <div class="page-wrap">
    <div id="product-root">
      <!-- skeleton -->
      <div class="product-layout">
        <div class="gallery-card">
          <div class="carousel-wrap">
            <div class="skeleton" style="height:580px;border-radius:var(--radius-md);"></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;justify-content:center;">
            <div class="skeleton" style="width:58px;height:58px;border-radius:10px;"></div>
            <div class="skeleton" style="width:58px;height:58px;border-radius:10px;"></div>
            <div class="skeleton" style="width:58px;height:58px;border-radius:10px;"></div>
          </div>
          <div class="gallery-actions" style="margin-top:14px;">
            <div class="skeleton" style="height:48px;border-radius:var(--radius-sm);"></div>
            <div class="skeleton" style="height:48px;border-radius:var(--radius-sm);"></div>
            <div class="skeleton" style="height:48px;border-radius:var(--radius-sm);"></div>
            <div class="skeleton" style="height:48px;border-radius:var(--radius-sm);"></div>
          </div>
        </div>
        <div class="details-card" style="gap:14px;">
          <div class="skeleton" style="height:24px;width:90px;border-radius:99px;"></div>
          <div class="skeleton" style="height:48px;border-radius:8px;"></div>
          <div class="skeleton" style="height:20px;width:120px;border-radius:8px;"></div>
          <div class="skeleton" style="height:36px;width:160px;border-radius:8px;"></div>
          <div class="skeleton" style="height:80px;border-radius:var(--radius-sm);"></div>
          <div class="skeleton" style="height:140px;border-radius:var(--radius-sm);"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div class="skeleton" style="height:64px;border-radius:var(--radius-sm);"></div>
            <div class="skeleton" style="height:64px;border-radius:var(--radius-sm);"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">© 2026 ShopPlus. All rights reserved.</div>

  <script>
    "use strict";
    const BACKEND = "https://my-store-e28j.onrender.com";
    const FALLBACK_IMG = "https://via.placeholder.com/600x600/f4f3f0/aaa?text=No+Image";

    /* Auth guard */
    if (localStorage.getItem("shopplusLoggedIn") !== "true" || !localStorage.getItem("shopplusUser")) {
      window.location.href = "./login.html";
    }

    /* ===== UTILS ===== */
    function esc(text) {
      const d = document.createElement("div");
      d.textContent = text ?? "";
      return d.innerHTML;
    }

    function formatPrice(p) {
      if (p == null || p === "") return "Price not available";
      if (typeof p === "number") return `₹${p.toFixed(2)}`;
      const n = Number(String(p).replace(/[^\d.]/g, ""));
      return (!isNaN(n) && n > 0) ? `₹${n.toFixed(2)}` : String(p);
    }

    function getRating(v) {
      if (v == null || v === "") return null;
      const n = parseFloat(String(v).replace(/[^\d.]/g, ""));
      return (!isNaN(n) && n > 0) ? n.toFixed(1) : null;
    }

    function getImages(product) {
      const list = [];
      if (product.image?.trim()) list.push(product.image.trim());
      if (Array.isArray(product.images)) product.images.forEach(i => { if (i?.trim()) list.push(i.trim()); });
      const unique = [...new Set(list)];
      return unique.length ? unique : [FALLBACK_IMG];
    }

    function splitDescription(desc) {
      const text = String(desc || "No description available.").trim().replace(/\s+/g, " ");
      const sentences = text.split(/(?<=[.!?])\s+/).filter(Boolean);
      const summary = sentences.slice(0, 2).join(" ") || text;
      let highlights = sentences.slice(2, 7);
      if (!highlights.length) highlights = [
        "Premium quality product for daily use",
        "Stylish and practical design",
        "Suitable for home, office, or gifting",
        "Reliable build with good usability",
        "A smart addition to your collection",
      ];
      const icons = ["✦", "◈", "◉", "◆", "◇"];
      return { summary, highlights: highlights.map((t, i) => ({ icon: icons[i % icons.length], text: t })) };
    }

    async function shareProduct(id, name, source) {
      /* Build URL from the actual current page location so it always works
         whether hosted on GitHub Pages, custom domain, or localhost.
         e.g. https://shoppluse.github.io/my-store/product.html?id=...  */
      const currentPage = window.location.href.split("?")[0]; // strip existing params
      const url = `${currentPage}?id=${id}&source=${encodeURIComponent(source || "json")}`;
      const nm = decodeURIComponent(name);
      const shareText = `🛍️ Check out "${nm}" on ShopPlus!\n\n${url}`;

      try {
        if (navigator.share) {
          /* Native share sheet — works on Android Chrome, iOS Safari, etc.
             Opens WhatsApp, Telegram, Instagram, Gmail, SMS — whatever the user picks */
          await navigator.share({
            title: `${nm} — ShopPlus`,
            text: `🛍️ Check out "${nm}" on ShopPlus!`,
            url: url,
          });
        } else if (navigator.clipboard) {
          /* Desktop fallback — copy to clipboard */
          await navigator.clipboard.writeText(shareText);
          showToast("🔗 Product link copied to clipboard!");
        } else {
          /* Last resort */
          prompt("Copy this product link:", url);
        }
      } catch (e) {
        /* User cancelled native share — not an error */
        if (e.name !== "AbortError") {
          console.warn("Share failed:", e);
          /* Try clipboard as backup */
          try {
            await navigator.clipboard.writeText(shareText);
            showToast("🔗 Link copied to clipboard!");
          } catch {
            prompt("Copy this product link:", url);
          }
        }
      }
    }

    /* Toast notification for clipboard copy feedback */
    function showToast(msg) {
      const existing = document.getElementById("sp-toast");
      if (existing) existing.remove();

      const toast = document.createElement("div");
      toast.id = "sp-toast";
      toast.textContent = msg;
      toast.style.cssText = `
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom) + 24px);
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #111010;
        color: #fff;
        padding: 12px 22px;
        border-radius: 99px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
        box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        z-index: 9999;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.25s ease, transform 0.25s ease;
        pointer-events: none;
      `;
      document.body.appendChild(toast);

      requestAnimationFrame(() => {
        toast.style.opacity = "1";
        toast.style.transform = "translateX(-50%) translateY(0)";
      });

      setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transform = "translateX(-50%) translateY(10px)";
        setTimeout(() => toast.remove(), 300);
      }, 2800);
    }

    /* ===== FETCH ===== */
    async function fetchProduct(pid, source) {
      if (source === "backend") {
        const r = await fetch(`${BACKEND}/api/products`, { cache: "no-store" });
        if (!r.ok) throw new Error(`Backend error ${r.status}`);
        const arr = await r.json();
        return arr.find(p => String(p._id || p.id) === String(pid));
      }
      const r = await fetch("/my-store/products.json", { cache: "no-store" });
      if (!r.ok) throw new Error(`products.json error ${r.status}`);
      const arr = await r.json();
      const data = Array.isArray(arr) ? arr : (arr.products || arr.data || []);
      return data.find(p => String(p._id || p.id) === String(pid));
    }

    /* ===== RENDER ===== */
    function renderError(root, msg) {
      root.innerHTML = `
        <div class="state-box">
          <h2>Oops!</h2>
          <p>${esc(msg)}</p>
          <a href="./home.html" class="back-link">← Back to Store</a>
        </div>`;
    }

    function buildCarousel(images, name) {
      const slides = images.map((src, i) => `
        <img class="carousel-image" src="${esc(src)}" alt="${esc(name)} ${i + 1}"
          loading="${i === 0 ? 'eager' : 'lazy'}"
          onerror="this.src='${FALLBACK_IMG}'" />`).join("");

      const dots = images.length > 1
        ? `<div class="carousel-dots">${images.map((_, i) =>
            `<div class="carousel-dot${i === 0 ? ' active' : ''}" data-dot="${i}"></div>`
          ).join("")}</div>`
        : "";

      const thumbs = images.length > 1
        ? `<div class="carousel-thumbs">${images.map((src, i) =>
            `<img class="carousel-thumb${i === 0 ? ' active' : ''}" src="${esc(src)}" data-idx="${i}"
              alt="Thumb ${i + 1}" loading="lazy" onerror="this.src='${FALLBACK_IMG}'" />`
          ).join("")}</div>`
        : "";

      return { slides, dots, thumbs };
    }

    function setupCarousel(root) {
      const track = root.querySelector(".carousel-track");
      if (!track) return;
      const images = root.querySelectorAll(".carousel-image");
      const thumbs = root.querySelectorAll(".carousel-thumb");
      const dots   = root.querySelectorAll(".carousel-dot");
      if (images.length <= 1) return;

      function setActive(idx) {
        images[idx]?.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
        thumbs.forEach((t, i) => t.classList.toggle("active", i === idx));
        dots.forEach((d, i) => d.classList.toggle("active", i === idx));
      }

      thumbs.forEach((t, i) => t.addEventListener("click", () => setActive(i)));
      dots.forEach((d, i) => d.addEventListener("click", () => setActive(i)));

      // Intersection observer for auto-updating active state on scroll
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const idx = Array.from(images).indexOf(entry.target);
            thumbs.forEach((t, i) => t.classList.toggle("active", i === idx));
            dots.forEach((d, i) => d.classList.toggle("active", i === idx));
          }
        });
      }, { root: track, threshold: 0.6 });

      images.forEach(img => observer.observe(img));
    }

    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const pid    = params.get("id");
      const source = params.get("source") || "json";
      const root   = document.getElementById("product-root");

      if (!pid) { renderError(root, "No product ID provided. Please open a product from the store."); return; }

      try {
        const raw = await fetchProduct(pid, source);
        if (!raw) throw new Error("Product not found");

        const images  = getImages(raw);
        const rating  = getRating(raw.rating);
        const price   = formatPrice(raw.price);
        const descData = splitDescription(raw.description);
        const name    = raw.name || "Unnamed Product";
        const id      = String(raw._id || raw.id || pid);
        const cat     = raw.category || "General";
        const link    = raw.link || "#";

        const { slides, dots, thumbs } = buildCarousel(images, name);

        const buyBtn = link !== "#"
          ? `<a href="${esc(link)}" target="_blank" rel="noopener noreferrer" class="act-btn btn-buy">Buy Now</a>`
          : `<button class="act-btn btn-buy" onclick="alert('Buy link not available yet')">Buy Now</button>`;

        const ratingHtml = rating
          ? `<span>⭐ ${esc(rating)}</span><span class="rating-count">out of 5</span>`
          : `<span style="color:var(--muted);font-size:0.85rem;">No rating yet</span>`;

        root.innerHTML = `
          <div class="product-layout">

            <!-- GALLERY -->
            <div class="gallery-card">
              <div class="carousel-wrap">
                <div class="carousel-track">${slides}</div>
              </div>
              ${dots}
              ${thumbs}
              <div class="gallery-actions">
                ${buyBtn}
                <button class="act-btn btn-share"
                  onclick="shareProduct('${encodeURIComponent(id)}','${encodeURIComponent(name)}','${encodeURIComponent(source)}')">
                  Share
                </button>
                <a href="./claim-reward.html?productId=${encodeURIComponent(id)}&productName=${encodeURIComponent(name)}"
                  class="act-btn btn-claim">Claim Reward</a>
                <a href="./home.html" class="act-btn btn-back">← Back</a>
              </div>
            </div>

            <!-- DETAILS -->
            <div class="details-card">
              <div class="cat-badge">🏷 ${esc(cat)}</div>

              <h1 class="product-title">${esc(name)}</h1>

              <div class="product-rating">${ratingHtml}</div>

              <div>
                <div class="product-price">${esc(price)}</div>
                <div class="price-note">Inclusive of all taxes</div>
              </div>

              <div class="divider"></div>

              <div class="summary-block">${esc(descData.summary)}</div>

              <div>
                <div class="section-label">Key Highlights</div>
                <ul class="highlights-list">
                  ${descData.highlights.map(h => `
                    <li>
                      <span class="hl-icon">${h.icon}</span>
                      <span>${esc(h.text)}</span>
                    </li>`).join("")}
                </ul>
              </div>

              <div class="divider"></div>

              <div>
                <div class="section-label">Product Info</div>
                <div class="info-grid">
                  <div class="info-item">
                    <div class="info-label">Product ID</div>
                    <div class="info-value">${esc(id)}</div>
                  </div>
                  <div class="info-item">
                    <div class="info-label">Category</div>
                    <div class="info-value">${esc(cat)}</div>
                  </div>
                  <div class="info-item">
                    <div class="info-label">Source</div>
                    <div class="info-value">${esc(source)}</div>
                  </div>
                  <div class="info-item">
                    <div class="info-label">Rating</div>
                    <div class="info-value">${rating ? `${rating} / 5` : "—"}</div>
                  </div>
                </div>
              </div>
            </div>

          </div>`;

        setupCarousel(root);

      } catch (err) {
        console.error(err);
        renderError(root, "Product not found or failed to load. Please try again later.");
      }
    }

    loadProduct();

    /* Service Worker */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
          .catch(e => console.error("SW registration failed:", e));
      });
    }
  </script>
</body>
</html>
