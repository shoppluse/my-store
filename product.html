<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Details - ShopPlus</title>

  <link rel="manifest" href="/my-store/manifest.json" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="/my-store/icons/icon-192.png" />
  <link rel="icon" href="/my-store/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", savedTheme === "dark" ? "dark" : "light");
    })();
  </script>

  <style>
    :root {
      --bg: #f7f7f8;
      --bg-2: #efeff2;
      --card-bg: #ffffff;
      --text: #111111;
      --muted: #777777;
      --muted-2: #9b9b9b;
      --primary: #111111;
      --primary-2: #2d2d2d;
      --border: #e9e9ec;
      --soft-border: #f0f0f2;
      --shadow: rgba(0, 0, 0, 0.06);
      --shadow-2: rgba(0, 0, 0, 0.09);

      --buy-bg: #111111;
      --buy-hover: #2b2b2b;
      --back-bg: #1f2937;
      --back-hover: #111827;
      --claim-bg: #7c3aed;
      --claim-hover: #6d28d9;
      --share-bg: #f59e0b;
      --share-hover: #d97706;
    }

    [data-theme="dark"] {
      --bg: #0f1115;
      --bg-2: #171a20;
      --card-bg: #161a22;
      --text: #f8fafc;
      --muted: #a1a1aa;
      --muted-2: #8b95a7;
      --primary: #ffffff;
      --primary-2: #d1d5db;
      --border: #232833;
      --soft-border: #1d2330;
      --shadow: rgba(0, 0, 0, 0.25);
      --shadow-2: rgba(0, 0, 0, 0.32);

      --buy-bg: #ffffff;
      --buy-hover: #e5e7eb;
      --back-bg: #374151;
      --back-hover: #4b5563;
      --claim-bg: #8b5cf6;
      --claim-hover: #7c3aed;
      --share-bg: #f59e0b;
      --share-hover: #d97706;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 22%, var(--bg) 100%);
      margin: 0;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .main-header {
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(10px + env(safe-area-inset-top)) 12px 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 10px;
      backdrop-filter: blur(10px);
    }

    .header-actions {
      width: 100%;
      max-width: 920px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      align-items: stretch;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 24px;
      padding: 10px;
      box-shadow: 0 8px 24px var(--shadow);
    }

    [data-theme="dark"] .header-actions {
      background: rgba(22,26,34,0.88);
      border-color: rgba(255,255,255,0.04);
    }

    .header-btn {
      width: 100%;
      min-height: 58px;
      text-decoration: none;
      background: var(--card-bg);
      color: var(--text);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 10px;
      border-radius: 18px;
      border: 1px solid var(--border);
      transition: 0.25s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: inherit;
      box-shadow: 0 4px 14px var(--shadow);
    }

    .header-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px var(--shadow-2);
    }

    .page-wrap {
      max-width: 1320px;
      margin: 20px auto 40px;
      padding: 0 16px;
    }

    .loading-box,
    .error-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 30px 24px;
      box-shadow: 0 14px 34px var(--shadow);
      text-align: center;
      max-width: 680px;
      margin: 30px auto;
    }

    .loading-box h2,
    .error-box h2 {
      margin: 0 0 10px;
      color: var(--primary);
      font-size: 1.4rem;
      font-weight: 800;
    }

    .loading-box p,
    .error-box p {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .product-layout {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 22px;
      align-items: start;
    }

    .gallery-card,
    .details-card {
      background: var(--card-bg);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 14px 34px var(--shadow);
      overflow: hidden;
    }

    .gallery-card { padding: 18px; }
    .details-card { padding: 24px 22px; }

    .carousel-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      border-radius: 20px;
      background: #ffffff;
      width: 100%;
      border: 1px solid #f0f0f2;
      scroll-behavior: smooth;
    }

    [data-theme="dark"] .carousel-track {
      background: #ffffff;
      border-color: #2a3040;
    }

    .carousel-track::-webkit-scrollbar {
      height: 8px;
    }

    .carousel-track::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 999px;
    }

    [data-theme="dark"] .carousel-track::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
    }

    .carousel-image {
      min-width: 100%;
      width: 100%;
      height: 620px;
      object-fit: contain;
      border-radius: 20px;
      scroll-snap-align: center;
      background: #ffffff;
      padding: 16px;
    }

    .carousel-thumbs {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 10px;
      width: 100%;
      flex-wrap: wrap;
    }

    .carousel-thumb {
      width: 62px;
      height: 62px;
      border-radius: 14px;
      object-fit: cover;
      background: #ffffff;
      border: 2px solid transparent;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      cursor: pointer;
      opacity: 0.7;
      transition: border 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }

    .carousel-thumb.active,
    .carousel-thumb:hover {
      border: 2px solid #111111;
      opacity: 1;
      transform: translateY(-2px);
    }

    [data-theme="dark"] .carousel-thumb.active,
    [data-theme="dark"] .carousel-thumb:hover {
      border-color: #ffffff;
    }

    .gallery-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .gallery-actions a,
    .gallery-actions button {
      width: 100%;
      text-decoration: none;
      color: white;
      border-radius: 16px;
      padding: 13px 8px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      font-size: 13px;
      transition: background-color 0.23s ease, transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
      border: none;
      font-family: inherit;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .gallery-actions a:hover,
    .gallery-actions button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.16);
    }

    .product-category {
      display: inline-block;
      background: rgba(17, 17, 17, 0.06);
      color: var(--primary);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    [data-theme="dark"] .product-category {
      background: rgba(255,255,255,0.06);
    }

    .product-title {
      font-size: 1.95rem;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 10px;
      line-height: 1.28;
      letter-spacing: -0.2px;
    }

    .product-rating {
      color: #f59e0b;
      font-size: 0.98rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .no-rating-text {
      color: var(--muted);
      font-weight: 600;
    }

    .product-price {
      font-size: 1.7rem;
      color: var(--primary);
      font-weight: 800;
      margin-bottom: 14px;
    }

    .product-summary {
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.75;
      margin-bottom: 16px;
      background: rgba(17, 17, 17, 0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    [data-theme="dark"] .product-summary {
      background: rgba(255,255,255,0.03);
    }

    .highlights-box {
      background: rgba(17, 17, 17, 0.025);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }

    [data-theme="dark"] .highlights-box {
      background: rgba(255,255,255,0.025);
    }

    .highlights-title {
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .highlights-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .highlights-list li {
      color: var(--text);
      font-size: 0.93rem;
      line-height: 1.55;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .highlights-list li span { flex: 1; }

    .info-list {
      display: grid;
      gap: 10px;
      margin-bottom: 6px;
    }

    .info-item {
      background: rgba(17, 17, 17, 0.025);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    [data-theme="dark"] .info-item {
      background: rgba(255,255,255,0.025);
    }

    .info-label {
      font-size: 0.76rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .buy-btn {
      background-color: var(--buy-bg);
      color: #ffffff !important;
    }

    .buy-btn:hover {
      background-color: var(--buy-hover);
    }

    [data-theme="dark"] .buy-btn {
      color: #111111 !important;
    }

    .claim-btn { background-color: var(--claim-bg); }
    .claim-btn:hover { background-color: var(--claim-hover); }

    .share-btn { background-color: var(--share-bg); }
    .share-btn:hover { background-color: var(--share-hover); }

    .back-btn { background-color: var(--back-bg); }
    .back-btn:hover { background-color: var(--back-hover); }

    .footer {
      text-align: center;
      color: var(--muted);
      background: transparent;
      padding: 16px 12px 26px;
      font-size: 14px;
      margin-top: 24px;
      font-weight: 600;
    }

    @media (max-width: 980px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .carousel-image {
        height: 500px;
      }

      .gallery-actions {
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .gallery-actions a,
      .gallery-actions button {
        font-size: 11px;
        padding: 10px 5px;
        min-height: 46px;
      }
    }

    @media (max-width: 700px) {
      body {
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
      }

      .main-header {
        padding: calc(10px + env(safe-area-inset-top)) 10px 6px;
      }

      .header-actions {
        gap: 8px;
        border-radius: 20px;
        padding: 8px;
      }

      .header-btn {
        min-height: 50px;
        font-size: 0.78rem;
        padding: 10px 6px;
        border-radius: 16px;
      }

      .page-wrap {
        padding: 0 10px;
        margin-top: 12px;
      }

      .gallery-card,
      .details-card {
        border-radius: 18px;
        padding: 14px;
      }

      .carousel-track {
        border-radius: 16px;
      }

      .carousel-image {
        height: 320px;
        padding: 10px;
        border-radius: 16px;
      }

      .carousel-thumb {
        width: 50px;
        height: 50px;
        border-radius: 12px;
      }

      .product-title {
        font-size: 1.35rem;
      }

      .product-price {
        font-size: 1.25rem;
      }

      .product-summary,
      .highlights-box,
      .info-item {
        padding: 13px;
        border-radius: 14px;
      }

      .gallery-actions {
        grid-template-columns: repeat(4, 1fr);
        gap: 7px;
      }

      .gallery-actions a,
      .gallery-actions button {
        font-size: 9px;
        padding: 9px 4px;
        min-height: 42px;
        border-radius: 10px;
        white-space: normal;
        line-height: 1.12;
      }

      .loading-box,
      .error-box {
        border-radius: 18px;
        padding: 22px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="main-header">
    <div class="header-actions">
      <a href="./home.html" class="header-btn">← Home</a>
      <a href="./profile.html" class="header-btn">Profile</a>
    </div>
  </div>

  <div class="page-wrap">
    <div id="product-root" class="loading-box">
      <h2>Loading product details...</h2>
      <p>Please wait while we fetch the product details.</p>
    </div>
  </div>

  <div class="footer">© 2026 ShopPlus. All rights reserved.</div>

  <script>
    const BACKEND_URL = "https://my-store-e28j.onrender.com";

    const isLoggedIn = localStorage.getItem("shopplusLoggedIn");
    const currentUser = localStorage.getItem("shopplusUser");

    if (isLoggedIn !== "true" || !currentUser) {
      window.location.href = "./login.html";
    }

    function formatPrice(price) {
      if (price === null || price === undefined || price === "") return "Price not available";
      if (typeof price === "number") return `₹${price.toFixed(2)}`;

      const numeric = Number(String(price).replace(/[^\d.]/g, ""));
      if (!isNaN(numeric) && numeric > 0) return `₹${numeric.toFixed(2)}`;

      return String(price);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function getDisplayRating(rating) {
      if (rating === null || rating === undefined || rating === "") return null;

      const numeric = Number(String(rating).replace(/[^\d.]/g, ""));
      if (!isNaN(numeric) && numeric > 0) return numeric.toFixed(1);

      return null;
    }

    function splitDescription(description) {
      const text = String(description || "No description available.").trim();

      const sentences = text
        .replace(/\s+/g, " ")
        .split(/(?<=[.!?])\s+/)
        .filter(Boolean);

      const summary = sentences.slice(0, 2).join(" ");
      const remaining = sentences.slice(2);

      let highlights = remaining.slice(0, 5);

      if (highlights.length === 0) {
        highlights = [
          "Premium quality product for daily use",
          "Stylish and practical design",
          "Suitable for home, office, or gifting",
          "Reliable build with good usability",
          "A smart addition to your collection"
        ];
      }

      const icons = ["✨", "🔹", "💡", "📌", "⭐"];

      return {
        summary: summary || text,
        highlights: highlights.map((item, index) => ({
          icon: icons[index % icons.length],
          text: item
        }))
      };
    }

    function getProductImages(product) {
      const fallbackImage = "https://via.placeholder.com/600x600?text=No+Image";
      const imageList = [];

      if (product.image && String(product.image).trim()) {
        imageList.push(String(product.image).trim());
      }

      if (Array.isArray(product.images)) {
        product.images.forEach((img) => {
          if (img && String(img).trim()) imageList.push(String(img).trim());
        });
      }

      const uniqueImages = [...new Set(imageList)];
      return uniqueImages.length ? uniqueImages : [fallbackImage];
    }

    async function shareProduct(productId, productName, source) {
      const decodedName = decodeURIComponent(productName);
      const baseUrl = window.location.origin + "/my-store";
      const productUrl = `${baseUrl}/product.html?id=${productId}&source=${encodeURIComponent(source || "json")}`;

      const shareData = {
        title: decodedName,
        text: `Check out this product on ShopPlus: ${decodedName}`,
        url: productUrl
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
        } else if (navigator.clipboard) {
          await navigator.clipboard.writeText(productUrl);
          alert(`Product link copied!\n\n${decodedName}\n\n${productUrl}`);
        } else {
          prompt("Copy this product link:", productUrl);
        }
      } catch (error) {
        console.log("Share cancelled or failed:", error);
      }
    }

    async function getProductBySource(pid, source) {
      if (source === "backend") {
        const response = await fetch(`${BACKEND_URL}/api/products`, { cache: "no-store" });
        if (!response.ok) throw new Error(`Backend fetch failed: ${response.status}`);

        const products = await response.json();
        if (!Array.isArray(products)) throw new Error("Backend products must be array");

        return products.find(p => String(p._id || p.id) === String(pid));
      }

      const response = await fetch("/my-store/products.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`products.json fetch failed: ${response.status}`);

      const products = await response.json();
      if (!Array.isArray(products)) throw new Error("products.json must be array");

      return products.find(p => String(p.id) === String(pid));
    }

    async function loadProductDetails() {
      const params = new URLSearchParams(window.location.search);
      const pid = params.get("id");
      const source = params.get("source") || "json";
      const root = document.getElementById("product-root");

      if (!pid) {
        root.className = "error-box";
        root.innerHTML = `
          <h2>No product ID found</h2>
          <p>Please open a product from the store page.</p>
          <div style="margin-top:18px;">
            <a href="./home.html" class="back-btn" style="max-width:220px; display:inline-flex; align-items:center; justify-content:center; text-decoration:none; color:white; padding:14px 16px; border-radius:14px;">Back to Store</a>
          </div>
        `;
        return;
      }

      try {
        const product = await getProductBySource(pid, source);

        if (!product) {
          throw new Error("Product not found");
        }

        const safeImages = getProductImages(product);
        const displayRating = getDisplayRating(product.rating);

        const safeProduct = {
          id: String(product._id || product.id || pid),
          source,
          name: product.name || "Unnamed Product",
          description: product.description || "No description available.",
          price: formatPrice(product.price),
          link: product.link || "#",
          images: safeImages,
          rating: product.rating,
          displayRating,
          category: product.category || "General"
        };

        const descData = splitDescription(safeProduct.description);

        const thumbs = safeProduct.images.length > 1
          ? `
            <div class="carousel-thumbs">
              ${safeProduct.images.map((src, i) => `
                <img class="carousel-thumb${i === 0 ? ' active' : ''}" src="${escapeHtml(src)}" data-idx="${i}" alt="Thumbnail ${i + 1}" onerror="this.src='https://via.placeholder.com/100x100?text=No+Image';">
              `).join('')}
            </div>
          `
          : "";

        const buyButton = safeProduct.link && safeProduct.link !== "#"
          ? `<a href="${escapeHtml(safeProduct.link)}" target="_blank" rel="noopener noreferrer" class="buy-btn">Buy Now</a>`
          : `<button class="buy-btn" onclick="alert('Buy link not available for this product yet')">Buy Now</button>`;

        const ratingHtml = safeProduct.displayRating
          ? `⭐ ${escapeHtml(String(safeProduct.displayRating))} / 5`
          : `<span class="no-rating-text">No rating yet</span>`;

        root.className = "";
        root.innerHTML = `
          <div class="product-layout">
            <div class="gallery-card">
              <div class="carousel-track" id="carousel-track">
                ${safeProduct.images.map((src, i) => `
                  <img class="carousel-image" src="${escapeHtml(src)}" alt="${escapeHtml(safeProduct.name)} image ${i + 1}" onerror="this.src='https://via.placeholder.com/600x600?text=No+Image';">
                `).join('')}
              </div>
              ${thumbs}

              <div class="gallery-actions">
                ${buyButton}
                <button class="share-btn" onclick="shareProduct('${encodeURIComponent(safeProduct.id)}', '${encodeURIComponent(safeProduct.name)}', '${encodeURIComponent(safeProduct.source)}')">Share Product</button>
                <a href="./claim-reward.html?productId=${encodeURIComponent(safeProduct.id)}&productName=${encodeURIComponent(safeProduct.name)}" class="claim-btn">Claim Reward</a>
                <a href="./home.html" class="back-btn">Back to Store</a>
              </div>
            </div>

            <div class="details-card">
              <div class="product-category">${escapeHtml(safeProduct.category)}</div>
              <h1 class="product-title">${escapeHtml(safeProduct.name)}</h1>
              <div class="product-rating">${ratingHtml}</div>
              <div class="product-price">${escapeHtml(safeProduct.price)}</div>

              <div class="product-summary">
                ✨ ${escapeHtml(descData.summary)}
              </div>

              <div class="highlights-box">
                <div class="highlights-title">Key Highlights</div>
                <ul class="highlights-list">
                  ${descData.highlights.map(item => `
                    <li><strong>${item.icon}</strong><span>${escapeHtml(item.text)}</span></li>
                  `).join('')}
                </ul>
              </div>

              <div class="info-list">
                <div class="info-item">
                  <div class="info-label">Product ID</div>
                  <div class="info-value">${escapeHtml(String(safeProduct.id))}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Category</div>
                  <div class="info-value">${escapeHtml(safeProduct.category)}</div>
                </div>
              </div>
            </div>
          </div>
        `;

        const imgElements = root.querySelectorAll(".carousel-image");
        const thumbElements = root.querySelectorAll(".carousel-thumb");

        function setCurrent(index) {
          if (!imgElements[index]) return;

          imgElements[index].scrollIntoView({
            behavior: "smooth",
            block: "nearest",
            inline: "center"
          });

          thumbElements.forEach((thumb, i) => {
            thumb.classList.toggle("active", i === index);
          });
        }

        thumbElements.forEach((thumb, i) => {
          thumb.addEventListener("click", () => setCurrent(i));
        });
      } catch (error) {
        console.error("Error loading product:", error);

        root.className = "error-box";
        root.innerHTML = `
          <h2>Product not found or failed to load</h2>
          <p>Please try again later or return to the store.</p>
          <div style="margin-top:18px;">
            <a href="./home.html" class="back-btn" style="max-width:220px; display:inline-flex; align-items:center; justify-content:center; text-decoration:none; color:white; padding:14px 16px; border-radius:14px;">Back to Store</a>
          </div>
        `;
      }
    }

    loadProductDetails();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/my-store/sw.js", { scope: "/my-store/" })
          .then((registration) => {
            console.log("Service Worker registered:", registration.scope);
          })
          .catch((error) => {
            console.error("Service Worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
